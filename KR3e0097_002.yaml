body:
  text: 蘭臺軌範卷二吳江徐大椿撰風靈素素問風論黃帝問曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其病各異其名不同或內至五臟六腑不知其解願聞其說岐伯對曰風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰食飲其熱也則消肌肉故使人怢栗而不能食名曰寒熱風氣與陽明入胃循脉而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣與太陽俱入行諸脉俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有痬衛風有所凝而不行是故其肉有不仁也癘者有營氣熱腑其氣不清故使鼻柱壞而色敗皮膚痬潰風寒客於脈而不去名曰癘風或名寒熱以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為痺風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風風中五臟六腑之俞亦為臟腑之風各入其門户所中則為偏風風氣循風腑而上則為腦風風入係頭則為目風眼寒飲酒中風則為漏風入房汗出中風則為內風新沐中風則為首風久風入中則為腸風飱泄外在腠理則為泄風故風者百病之長也至其變化乃為他病也肺風之狀多汗惡風色皏然白時咳短氣晝日則差暮則甚診在眉上其色白心風之狀多汗惡風焦絶善怒嚇赤色病甚則言不可快診在口其色赤肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診目下其色青脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃腎風之狀多汗惡風面龎然浮腫脊痛不能正立其色照隱曲不利診在肌上其色黑胃風之狀頸多汗惡風食飲不下膈塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事泄風之狀多汗汗出泄衣上口中乾上漬其風不能勞事身體盡痛則寒諸風病狀各殊其多汗惡風則傷風畏風傷風自汗凡七情六淫之病必有現症能辨症斷不至誤治也平人氣象論面腫曰風風厥勞風評熱病論岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥氣逆甚即名風厥帝曰願卒聞之岐伯曰巨陽生氣故先受邪少隂與其為表裏也得熱則上從之從之則厥也必少隂之氣上乃能厥帝曰治之奈何岐伯曰表裏刺之飲之服湯帝曰勞風為病何如岐伯曰勞風法在肺下其為病也使人強上冥視唾出若涕惡風而振寒此為勞風之病帝曰治之奈何岐伯曰以救俯仰巨陽引精者三日中年者五日不精者七日咳出青黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死也此等病最當體認若誤以為肺癰肺痿則失之逺矣蓋肺癰乃肺生癰肺痿乃肺痿􅂒此則風寒入肺痰涎凝結也酒風病能論帝曰有病身熱解墮汗出如浴惡風少氣此為何病岐伯曰病名曰酒風偏枯生氣通天論汗出偏沮使人偏枯痱靈樞熱病痱之為病身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也金匱夫風之為病當半身不遂或但臂不遂者此為痺脉微而數中風使然寸口脉浮而緊緊則為寒浮則為虛寒虛相摶邪在皮膚浮為血虛絡脉空虛賊邪不㵼或左或右邪氣反緩正氣即急病在緩處故外治必塗其緩者正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口吐涎此辨症之要訣寸口脉遲而緩遲則為寒緩則為虛榮緩則為亡血衛緩則為中風邪氣中經則身癢而癮疹心氣不足邪氣入中則胸滿而短氣傷寒論脉浮而大浮為風虛大為氣強風氣相摶必成癮疹身體為癢癢者名泄風久風為痂癩病源風癔風邪之氣若先發於隂病發於五臟者其狀奄忽不知人喉裏噫噫然有聲舌強不能言發汗身軟者可治眼下及鼻人中左右上白者可治黑赤吐沫者不可治汗不出體直者七日死口噤諸陽經筋皆在於頭三陽之筋并絡入領頰夾於口諸陽為風寒所客則筋急故口噤不開也疹其脉遲者生舌強脾脉絡胃夾咽連舌本散舌下心之别脉係舌本今心脾二臟受風邪故舌強不得語也賊風冬至之日有疾風從南方來名曰虛風其傷人也但痛不可按抑轉動傷風冷則骨解深痛按之乃應骨痛也但覺身內索索冷欲得熱物尉痛處即小寬時有汗久不去重遇冷氣相摶結成瘰癧及偏枯遇風熱相摶乃變附骨疽也附骨疽亦由風冷所致風痙口噤不開背強而直如發癎之狀其重者耳中策策痛卒然身體痙直者死也由風邪傷於太陽經復遇寒濕則發痙也此與病後壞症之痙不同角弓反張風邪傷人令腰背反折不能俯仰似角弓者由邪入諸陽經故也柔風血氣俱虛風邪并入在於陽則皮膚緩在於隂則腹裏急柔風之狀四肢不能收裏急不能仰不仁由榮氣虛衛氣實風寒入於肌肉使血氣不宣流其狀搔之皮膚如隔衣是也風驚悸由心氣不足心府為風邪所乘則驚不自安悸動不定其狀目精不轉而不得呼刺風由體虛膚腠開為風所侵如刃錐所刺也蠱風由體虛受風其風在於皮膚隱隱躍躍若畫若刺一身盡痛侵傷氣血其動作如蠱毒也鬚眉墮落皆由風濕冷得之邪客於經絡與血氣相干使榮衛不和故面色敗皮膚傷鼻柱壞鬚眉落此乃癘風也惡風風病有四百四種總不出五種黃風青風赤風白風黑風人身有八萬尸蟲若無八萬尸蟲人身不成不立復有諸惡橫病諸風害人所謂五種風生五種蟲能害於人口喎養生方云夜卧當耳勿得有孔風入耳中喜食口喎口喎見金匱此又是一病當內服藥而外提出風邪外臺風猥退四肢不收身體疼痛肌肉虛滿骨節懈怠腰腳緩弱由分肉流於血脉久成風水之病嚲曵肢體弛緩不收攝也人以胃氣養肌肉經脉胃氣衰損則經脉虛而筋肉懈惰故風邪摶於筋而使嚲曵也風毒發眼疼腳縱中指疼連肘邊牽心裏悶肋脹少氣喘氣欲絶不能食風方酒風素問治身熱懈惰汗出如浴惡風少氣澤㵼术各十分麋銜五分合以三指撮為後飯麋銜即薇銜一名無心草南人呼為無風草味苦平微寒主治風濕三指為一撮約二三錢飯後藥先為後飯凡按麋銜疑即鹿銜草為後飯服在飯後非飯前也古方須將神農本草細參藥性乃能深知其義侯氏黑散金匱治大風四肢煩重心中惡寒不足者菊花四十分白术十分細辛三分茯苓三分牡蠣三分桔梗八分防風十分人參礬石各三分黃芩五分當歸乾薑芎窮桂枝各三分右十四味杵為散酒服方寸七日一服初服二十日溫酒調服禁一切魚肉大蒜常宜冷服六十日止即藥積在腹中不下也熱食即下矣冷食自能助藥力腸腹空虛則邪易留此填滿空隙使邪氣不能容風引湯金匱除熱癱癎巢氏云腳氣宜風引湯大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩寒水石滑石赤石脂白石脂紫石英石膏各六兩右十二味杵粗篩以韋囊盛之取三指撮井花水三升煮三沸溫服一升此乃臟腑之熱非草木之品所能散故以金石重藥清其裏防已地黃湯金匱治病如狂狀妄行獨語不休無寒熱其脉浮防已一分桂枝防風各二分甘草一分右四味以酒一杯浸之一宿絞取汁生地黃二斤㕮咀蒸之如斗米飯久以銅器盛其汁更絞地黃汁和分再服此方他藥輕而生地獨重乃治血中之風也此等法最宜細玩凡風勝則燥又風能發火故治風藥中無純用燥熱之理頭風摩散金匱大附子一枚泡鹽等分右二味為散沐了以方寸七已摩疢上令藥力行越脾湯金匱風水惡風一身悉腫脉浮不渴續自汗出無大汗者主之麻黃六兩石膏半斤生薑三兩甘草二兩大棗十五枚右五味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服惡風加附子一枚本方加白术四兩即越脾加术湯越脾寒散之方也治風熱在表之症小續命湯千金治卒中風欲死身體緩急口目不正舌強不能言奄奄忽忽神精悶亂諸風服之皆驗麻黃防已人參黃芩桂心芍藥甘草川芎杏仁各一兩防風一兩半附子一枚生薑五兩右十二味㕮咀以水一斗二升先煮麻黃三沸去沫內諸藥煮取三升分三服不瘥更合三四劑隨人風輕重虛實腳弱服之亦瘥恍惚者加茯神逺志骨節疼煩有熱者去附子倍芍藥外臺加白术一兩石膏當歸各二兩無防已續命為中風之主方因症加减變化由人而總不能舍此以立法後人不知此義人自為說流弊無窮而中風一症遂十不愈一矣人參附桂何嘗不用必實見其有寒象而後可加然尤宜於西北人若東南人則當詳審勿輕試録驗續命湯治中風痱身體不能自收口不能言冒昧不知痛處或拘急不得轉側麻黃桂枝當歸人參石膏乾薑甘草各三兩川芎杏仁四十枚右九味以水一斗煮取四升溫服一升當小汗薄覆脊憑几坐汗出則愈不汗更服無所禁勿當風并治但伏不得卧咳逆上氣面目浮腫虛而感風則成痱此治痱症之主方近效术附湯治風虛頭重眩苦極不知食味暖肌補中益精氣白术二兩附子一枚半泡去皮甘草一兩炙右三味銼每五錢七薑五片棗一枚水盞半煎七分去滓溫服此治中風後陽虛之症書按古今録驗近效二種乃唐以前之方今全本末見外臺中引二書之方極多金匱要略宋人校書者往往以本集中載方太少故亦採取二書并千金外臺之方擇其精要者附一二方於每病之後而方首亦必不沒其所本之書古人之不苟如此今人見其方載入金匱中即以為仲景所定之方誤矣須知之地黃煎千金治熱風心煩悶及脾胃間熱不下食方生地黃汁枸杞根汁各二兩生薑汁酥各三升荆瀝竹瀝各五升天門冬人參各八兩茯苓六兩大黃梔子各四兩右十一味搗篩五物為散先煎地黃等汁成膏內散攪勻每服一七日再漸加至三七覺利减風行必燥古人治風必用潤藥乃真訣也今人反以剛燥辛熱之品治之是益其疾矣三黃湯千金治中風手足拘急百節疼痛煩熱心亂惡寒經日不欲飲食麻黃五分獨活四分細辛黃茋各二分黃芩三分右五味以水六升煮取二升分溫三服一服小汗二服大汗心熱加大黃二分腹滿加枳實一枚氣逆加人參三分悸加牡蠣三分渴加栝蔞根三分先有寒加附子一枚此方專以驅風為治風痱方千金治手足不遂殭直伏龍肝五升為末冷水八升攪取汁飲之能盡為善蒸半身不遂方千金蠶沙兩石熟蒸分作直袋三枚熱盛一袋著患處如冷換熱者數易之瘥後須羊肚釀粳米葱白薑椒豉等爛煮熱吃日食一具十日止按此法尉痺症亦良治風懿方竹瀝一升治半身不遂手足拘急身冷強直不語或狂言角弓反張或食或不食或大小便不利治風懿之法與治風痱之法不相逺口眼喎僻方千金翼治中風面目相引偏僻牙車急舌不轉牡蠣熬礬石燒附子泡去皮伏龍肝等分右四味搗篩為散以三歲雄雞血和藥敷上預候看勿令太過偏右塗左偏左塗右正則洗去之又方大皂莢五兩去皮子搗篩以三年大醋和塗緩處又方千金翼治風著人面引口偏著耳牙車急舌不得轉生地黃汁竹瀝各一升獨活三兩切右三味合煎取一升頓服之即愈驅風舒經活血開心肥健方千金翼人參五兩大猪肪八枚右二味搗人參為散猪肪煎取凝每服以人參一分猪脂十分以酒半升和服之一百日骨髓充盈日記千言身體潤澤去熱風冷風心頭等風月服二升半即有大效此方治老人及風燥者最宜一切風虛方千金翼杏仁九升去尖及兩仁曝乾右一味搗為末以水九升研濾如作粥法緩火煎令如麻浮上匙取和羮粥酒內一匙服之每食即服不限多少服七日後大汗出二十日後汗止慎風冷猪魚雞蒜大醋一劑後諸風减差春夏恐酸少作服之秋九月後煎之此法神妙可深祕之此即作杏酪之法服食最宜竹瀝湯外臺治諸中風竹瀝二升生葛根一升用按亦當汁生薑汁三合右三味分三服日三此通經絡之法卒不得語方外臺以苦酒煮芥子薄頸一周以衣包之一日一夕乃解瘥中風不語方寶鑑取龜尿㸃舌取龜尿法置龜於新荷葉上以猪髮鼻內戳之立出地黃飲子宣明治中風舌瘖不能言足廢不能行此少隂氣厥不至名曰風痱急當溫之熟地山茱茰五味子蓯蓉酒浸石斛麥冬石菖蒲逺志茯苓桂心附子炮巴㦸去心等分薄荷七葉右十三味每服三錢生薑五片棗一枚煎服風氣甚而有火多痰者忌服之此治少隂氣厥之方所謂類中風也故全屬補腎藥庸醫不察竟以之治一切中風之症輕則永無愈期甚則益其病而致死醫者病家終身不悟也稀涎散局方治中風牙關緊急并治單蛾雙蛾江子仁六粒牙皂三錢明礬一兩右先化開礬入二味待礬枯為末每用三分吹入喉中此急救弔痰開喉之法豨蘞丸本事方治口眼喎斜偏風失音不語時時吐涎久服并眼目清明髭鬚烏黑筋骨強健豨蘞五月中取葉及嫩枝洗九蒸九晒微焙為末煉蜜丸桐子大溫酒或米飲下三四十丸按余取豨蘞瀝汁熬膏打末為丸尤有力法此緩治之劑非一時救病之控涎丹三因方甘遂大㦸白芥子等分右為末煮糊丸桐子大晒乾卧時淡薑湯或熱湯下五七丸至十丸此乃下痰之方人實症實者用之滌痰散嚴氏治中風痰迷心竅舌強不能言南星薑製半夏各二錢半枳實茯苓各二錢橘紅一錢五分石菖蒲人參各一錢竹茹七分甘草右九味加薑五片水煎服此治心經之痰勝金丸本事方治中風忽然昏倒若醉形體昏悶四肢不收風涎潮於上膈氣閉不通生薄荷半兩猪牙皂角二兩捶碎水一升二味一處浸取汁研成膏瓜蒂末一兩藜蘆二兩硃砂五錢許研右將硃砂末二分與二味研勻用膏子搜和丸如龍眼大以硃砂一分為衣溫酒化下一丸甚者二丸以吐為度得吐即醒不醒者不治實見其痰在上膈則可用否則提氣上升反成厥冒等疾銀液丹局方治諸風痰涎藴結心膈滿悶頭痛目運面熱心忪痰唾稠黏精神昏􅀈及風涎潮搐並宜服之天南星三分為末硃砂半兩研飛鐵粉水銀各三兩結砂子膩粉一兩研黑鉛煉十遍􅱨三兩與水銀結沙為小塊同甘草十兩水煮半日候冷研右研勻麵糊丸梧桐子大每服二丸同薄荷蜜湯下生薑湯亦可微為度食後服如治風癎不計時候服痰涎逆上用此鎮壓亦不可少在前方提之使出此方鎮之使下隨宜施治全辨症之確癘風方治眉落鼻壞遍體生瘡出神仙感遇傳角刺一二升燒灰大黃九蒸晒右為末再煎大黃湯服方寸七旬日即愈青州白圓局方見通治痺歷節靈素靈周痺論黃帝曰願聞衆痺岐伯對曰此各在其處更發更止更居更起以右應左以左應右非能周也更發更休也帝曰善願聞周痺何如岐伯對曰周痺者在於血脉之中隨脉以上隨脉以下不能左右各當其所帝曰善此痛安在何因而有名岐伯對曰風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也經中無痰字沫即痰也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痺發發則如是此內不在臟而外未發於皮獨居分肉之間真氣不能周故曰周痺深痺九針十二原篇八風傷人內舍於骨解腰脊節腠理之間為深痺風痺壽夭剛柔篇病在陽者命曰風病在隂者命曰痺隂陽俱病者命曰風痺二病之殊兩言而定寒痺壽夭剛柔篇寒痺之為病也留而不去時痛而皮不仁素問痺論帝問痺之安生岐伯對曰風寒濕三氣雜至合而為痺也其風氣勝者為行痺寒氣勝者為痛痺濕氣勝者為著痺也凡痺之客五臟者客五臟痺氣入內而生內症矣肺痺者煩滿喘而嘔心痺者脉不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐肝痺者夜卧則驚多飲數小便上為引如懷腎痺者善脹尻以代踵脊以代頭脾痺者四肢解墮發咳嘔汁上為大塞腸痺者數飲而出不得中氣喘爭時發飱泄胞痺者少腹膀胱按之內痛若沃以湯澀於小便上為清涕隂氣者靜則神藏躁則消亡飲食自倍腸胃乃傷淫氣喘息痺聚在肺淫氣憂思痺聚在心淫氣遺溺痺聚在腎淫氣乏竭痺聚在肝淫氣肌絶痺聚在脾諸痺不已亦益內也其風氣勝者其人易已也帝曰痺其時有死者有疼久者有易已者其故何也岐伯曰其入臟者死其留連筋骨間者疼久其留皮膚間者易已帝曰其客於六腑者何也岐伯曰此亦其食飲居處為其病本也帝曰榮衛之氣亦令人痺乎岐伯曰榮者水榖之精氣也和調於五臟灑陳於六腑乃能入於脉也故循脉上下貫五臟絡六腑也衛者水榖之悍氣也其氣慓疾滑利不能入於脉也故循皮膚之中分肉之間熏於盲膜散於胸腹逆其氣則病從其氣則愈不與風寒濕氣合故不為痺帝曰善痺或痛或不痛或不仁或寒或熱或燥或濕其故何也岐伯曰痛者寒氣多也有寒故痛也其不痛不仁者病久入深榮衛之行澀經絡時疏故不通皮膚不營故為不仁其寒者陽氣少隂氣多與病相益故寒其熱者陽氣多隂氣少病氣勝陽遭隂故為痺熱其多汗而濡者此其逢濕甚也陽氣少隂氣盛兩氣相感故汗出而濡也帝曰夫痺之為病不痛何也岐伯曰痺在於骨則重在於脉則血凝而不流在於筋則屈不伸在於肉則不仁在於皮則寒故具此五者則不痛也凡痺之類逢寒則蟲逢熱則縱隂痺至真要大論隂痺者按之不得腰脊頭頂痛時眩大便難隂氣不用饑不欲食咳唾則有血心如懸病本於腎筋肌骨痺長刺莭論病在筋筋攣莭痛不可以行名曰筋痺病在肌膚肌膚盡痛名曰肌痺病在骨骨重不可舉骨髓酸痛寒氣至名曰骨痺肉苛逆調論帝曰人之肉苛者雖近於衣絮猶尚苛也是為何疾岐伯曰營氣虛衛氣實也營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用肉如故也人身與志不相有曰死金匱問曰血痺病從何得之師曰夫尊榮人骨肉肌膚盛重因疲勞汗出卧不時動搖加被微風遂得之但以脉自微澀在寸口關上小緊宜針引陽氣令脉和緊去則愈寸口脉沉而弱沉即主骨弱即主筋沉即為腎弱即為肝汗出入水中如水傷心歷節痛黃汗出故曰歷節少隂脉浮而弱弱則血不足浮則為風風血相摶即疼痛如掣盛人脉澀小短氣自汗出歷節疼不可屈伸此皆飲酒汗出當風所致味酸則傷筋筋傷則緩名曰泄醎則傷骨骨傷則痿名曰枯枯泄相摶名曰斷泄榮氣不通衛不獨行榮衛俱微三焦無所御四屬斷絶身體羸瘦獨足腫大黃汗出脛冷假令發熱便為歷節也痺歷節方痺症方靈樞治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鈎鈎之即以生桑炭置之坎中髙下以坐等以膏尉急頰且飲美酒噉美炙肉不飲酒者自強也為之三拊而已馬膏馬脂也其性味甘平柔潤能養筋治痺故可以膏其急者白酒辣桂性味辛溫能通經絡行血脉故可以塗其緩者桑之性平能利關節除風寒濕痺諸痛故以桑鈎鈎之者鈎正其口也復以生桑火炭置之地坎之中髙下以坐等者欲其淺深適中便於坐而得其暖也然後以前膏尉其急頰且飲之美酒噉之美肉皆助血舒筋之法也雖不善飲亦自強之三拊而已言再三拊摩其患處則病亦已矣外筋骨之病總在軀殼古法多用治今人不能知矣寒痺尉法靈樞用淳酒二十升蜀椒一升乾薑一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈并內酒中置酒馬矢煴中馬矢煴中者燃馬屎而煨之也蓋封塗勿使泄五日五夜出布綿絮曝乾之乾後復漬以盡其汁每漬必晬晬周日也其日乃出乾并用滓與綿絮復布為復巾重布為巾如今之夾袋所以盛貯綿絮藥滓也長六七尺為六七巾則用生桑炭炙巾以尉寒痺所刺之處令熱入至於病所尉寒痺所刺則知先已刺過然後尉之若不刺而徒尉恐藥性不易入則刺法亦當考明寒復炙巾以尉之三十遍而止汗出以巾拭身亦三十遍而止黃茋桂枝五物湯金匱治血痺隂陽俱微寸口關上微尺中小緊外症身體不仁如風痺狀黃茋芍藥桂枝各三兩生薑六兩大棗十二枚右五味以水六升煮取二升溫服七合日三服一方有人參此即桂枝湯以黃茋易甘草乃衛虛營弱之方固衛即以護營桂枝芍藥知母湯金匱治肢節疼痛身體尩羸腳腫如脫頭眩短氣溫溫欲吐桂枝四兩芍藥三兩甘草麻黃附子炮各二兩生薑白术各五兩知母四兩右九味以水七升煮取二升溫服七合日三服此為陽虛之症烏頭湯金匱治歷節疼痛不可屈伸麻黃芍藥黃茋甘草炙各三兩烏頭三枚㕮咀以蜜二升煮取一升即出烏頭右五味㕮咀四味水三升煮取一升去滓內蜜煎中更煎之服七合不知更服之其煎法精妙可師風寒入節非此不能通逹陽氣獨活寄生湯千金治風寒濕痺偏枯腳氣獨活三兩桑寄生秦芄細辛歸身生地白芍川芎桂心茯苓杜仲牛膝人參甘草各等分一方有防風右十四味為粗末每服四錢煎服此驅風通治之方舒筋飲治臂痛不能舉由氣血凝滯經絡不能行所致非風非濕腰以下食前服腰以上食後服片薑黃二錢如無以莪术代之赤芍當歸海桐皮去粗皮白术各一錢五分羌活炙甘草各一錢右七味加薑三片煎服磨冲沉香汁少許拔痺膏用生半夏為末同廣膠等分先用薑汁將膏煎煬調入半夏塗史國公酒方聖惠治中風語言塞澀手足拘攣半身不遂痿痺不仁當歸酒洗虎脛骨酒浸一日焙乾醋炙羌活鱉甲炙萆薢防風秦芄牛膝松節晚蠶沙二兩枸杞子五兩茄根八兩蒸右為粗末絹袋盛浸無灰酒一斗十日取飲半身不遂外治方見風門大活絡丹指迷茯苓丸俱見通治痿素問素問痿論黃帝問曰五臟使人痿何也岐伯對曰肺主身之皮毛心主身之血脉肝主身之筋膜脾主身之肌肉腎主身之骨髓故肺熱葉焦則皮毛虛弱急薄著則生痿躄也心氣熱而下脉厥而上上則下脉虛虛則生脉痿樞折挈脛縱而不任地也肝氣熱則膽泄口苦筋膜乾筋脉乾則脛急而攣發為筋痿脾氣熱則胃乾而渴肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿帝曰何以得之岐伯曰肺者臟之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦故曰五臟因肺熱葉焦發為痿躄此之謂也痿症總屬熱而皆關於肺後人治痿而用燥熱之藥俱誤悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也故本病曰大經空虛發為肌痺傳為脈痿思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫故下經曰筋痿者生於肝使內也有漸於濕以水為事若有所留居處相濕肌肉濡漬痺而不仁發為肉痿故下經曰肉痿者得之濕地也有所逺行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨枯而髓虛故足不任身發為骨痿故下經曰骨痿者生於大熱也黃帝曰何以别之岐伯曰肺熱者色白而毛散心熱者色赤而絡溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒槁帝曰如夫子言可矣論言治痿者獨取陽明何也岐伯曰陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋隂陽總宗筋之㑹㑹於氣街氣街一名氣衝足陽明經穴在毛際兩旁鼠鼷上一寸動脈處而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用也帝曰治之奈何岐伯曰各補其榮諸經所溜為榮而通其俞諸經所注為俞調其虛實和其順逆筋脈骨肉各以其時受月則病已矣時受月王氷注謂病所受之時月未知是否生氣通天論濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿難經五損損於骨骨痿不能起於牀痿方金剛丸保命治腎損骨痿不能起於牀萆薢杜仲炒去絲蓯蓉酒浸等分右為末酒煮腰子搗丸如桐子大每服五七十丸溫酒下虎骨四斤丸局方治腳痿宣木瓜天麻蓯蓉牛膝各焙乾一斤附子虎骨各一兩酥炙右以上各如法修製先將前四味用無灰酒浸春秋各五日夏三冬十日取出焙乾入附子虎骨共研為末用浸藥酒打麵糊丸梧子大每服五十丸食前鹽湯下加減四斤丸三因治腎肝虛熱淫於內致筋骨痿弱足不任地驚恐戰掉潮熱時作飲食無味不生氣力肉蓯蓉酒浸牛膝酒浸木瓜乾鹿茸酥炙熟地五味子酒浸兔絲子酒浸各等分右為末煉蜜丸桐子大每服五十丸溫酒米飲下一方不用五味有杜仲煨腎丸保命治腎肝虛及脾損榖不化牛膝萆薢杜仲炒去絲白蒺藜防風兔絲子酒浸蓯蓉酒浸葫蘆巴破故紙等分桂枝減半右為末將猪腰子製如食法搗爛蜜丸如桐子大每服五七十丸溫酒送下又治腰痛不起亦治腎痿續骨丹本事治兩腳軟弱虛羸無力及小兒不能行天麻酒浸白附子牛膝木鱉子各半兩羌活半兩烏頭一錢泡地龍去土一分乳香沒藥各二錢硃砂一錢右以生南星末一兩無灰酒炙糊丸雞頭大硃砂為衣此加味活絡丹也舒筋最宜思仙續斷圓本事治肝腎風虛氣弱腳不可踐地腰脊疼痛風毒流注下經行止艱難小便餘瀝此補五臟內傷調中益精凉血堅強筋骨益智輕身耐老思仙术生地各五兩五加皮防風米仁羌活川斷牛膝各三兩萆薢四兩右為細末好酒三升化青鹽三兩用大木瓜半斤去皮子以鹽酒煮木瓜成膏杵丸如桐子大每服三四十丸空心食前溫酒鹽湯下膏少和酒可也此方治下焦風濕腳氣亦效而內經針痿之法獨取陽明以陽明為諸筋總㑹也用藥則補腎為多以腎為筋骨之總司也養其精血而逐其風痰則大略無誤矣虎潛丸丹溪大活絡丹以上二方俱見通治厥靈素靈癲狂篇厥逆為病也足暴清胸若將裂腸若將以刀切之煩而不能食脈大小皆澀厥之象如此甚則不知人矣素厥論黃帝問曰厥之寒熱者何也岐伯對曰陽氣衰於下則為寒厥隂氣衰於下則為熱厥帝曰熱厥之為熱也必起於足下者何也岐伯曰陽氣起於足五指之表隂脈者集於足下而聚於足心故陽氣勝則足下熱也帝曰寒厥之為寒也必從五指而上於膝者何也岐伯曰隂氣起於五指之裏集於膝下而聚於膝上故隂氣勝則從五指至膝上寒其寒也不從外皆從內也解精微論厥則目無所見夫人厥則陽氣并於上隂氣并於下陽并於上則火獨光也隂并於下則足寒足寒則脹也厥則無不因陽氣在上若不能通隂納陽而用辛熱滋膩之藥貽害無窮調經論血之與氣并走於上則為大厥厥則暴死氣復反則生不反則死陽明脈解論厥逆連藏則死連經則生瘖俳煎厥素脈解篇內奪而厥則為瘖俳此腎虛也少隂不至者厥也肝氣當治而未得故善怒善怒者名曰煎厥劉河間地黃引子專治瘖俳生氣通天論陽氣者煩勞則張精絶辟積於夏使人煎厥此當治肝脾之逆薄厥素生通天論陽氣者大怒則形氣絶而血菀於上使人薄厥此當治血逆陽明厥素陽明脈解論陽明厥則喘而惋惋則惡人少隂厥素脈要精微論脈俱沉細數者少隂厥也風厥素評熱論汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥此當治風尸厥素刺繆論五絡俱竭令人身脈皆動而形無知也其狀若尸或曰尸厥難經督之為病脊強而厥金匱問曰寸脈沉大而滑沉則為實滑則為氣實氣相摶血氣入臟即死入腑即愈此為卒厥何謂也師曰唇口青身冷為入臟即死如身和汗自出為入腑即愈卒厥之症頗似中風一或誤治死不旋踵傷寒論寸口諸微亡陽諸濡亡血諸弱發熱諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無榖氣脾澀不通口急不能言戰而慓也少隂脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸隂股與隂相動令身不仁此為尸厥少陽厥隂俱病耳聾囊縮而厥水漿不入不知人者六日死此為寒厥諸四逆厥者不可下之虛家亦然以下所論諸條皆指傷寒症手足逆冷而言非氣逆不知人之厥也傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚勝必愈傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤此為熱厥凡厥者隂陽氣不相順接便為厥此致厥之由厥者手足逆冷是也此厥之象傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥傷寒熱少厥微指頭寒默默不欲食煩躁數小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿其後必便血熱入裏病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也傷寒發熱下利厥逆躁不卧者死傷寒發熱下利至甚厥不止者死傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死傷寒脈促手足厥逆者可灸之下利手足厥冷無脈者灸之不溫若脈不還反微喘者死虛寒之厥下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死病人手足厥冷脈乍結以客氣在胸中心中滿而煩欲食不能食者病在胸中當吐之傷寒論中厥症諸條有寒有熱有虛有實有寒熱互乘其變不一隨病異形非厥之正病也尤不可不潛心體察凡一病其變態不同如此何可執一說以人命為兒戲耶厥方尸厥方素問以竹管吹其兩耳鬄鬄剃同其左角之髮方一寸燔治飲以美酒燔治燒為末也赤圓金匱寒氣厥逆主之茯苓半夏各四兩洗一方用桂烏頭二兩泡細辛一兩千金作人參右六味末之內真朱為色煉蜜丸如麻子大先食酒飲下三丸日再夜一服不知稍增之以知為度真朱即硃砂茯苓甘草湯傷寒論傷寒厥而心下悸者宜先治水當服此湯却治其厥不爾水漬入胃必作利也茯苓二兩桂枝二兩生草一兩炙生薑二兩右四味水四升煮取二升分溫三服尸蹶方金匱治尸蹶脈動而無氣氣閉不通故靜而死也草蒲屑內鼻兩孔中吹之令人以桂屑著舌下白薇湯本事方人平居無苦疾忽如死人身不動搖默默不知人目閉不能開口瘖不能言或微知人或惡聞人聲但如眩冒移時方寤此由出汗過多血少氣併於陽獨上而不下氣壅塞而不行故身如死氣過血還隂陽復通移時方寤名曰鬱冒亦名血厥婦人多有之宜服白薇當歸各一兩人參甘草各一錢右為粗末每服五錢水二盞煎至一盞去滓溫服此病最多而婦科皆不知無不誤治四逆湯傷寒論下利厥逆而惡寒者主之大汗若大下利而冷厥者亦主之方見傷寒通脈四逆湯傷寒論下利清榖裏寒外熱汗出而厥者主之方見通治附加減法如面色赤者加葱九莖腹中痛者去葱加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參一兩當歸四逆湯傷寒論手足厥冷脈細欲絶者主之方見傷寒以上三方皆治寒極之厥與熱厥正相反須辨之瓜蒂散白虎湯此治熱厥二方俱見傷寒烏梅丸此治蟲厥見蟲門蘇合香丸此治氣厥四磨飲至寶丹以上三方俱見通治虛勞金匱夫男子平人脈大為勞極虛亦為勞男子面色薄者主渴及亡血卒喘悸脈浮者裏虛也男子脈虛沉弦無寒熱短氣裏急小便不利面赤白時目瞑兼衄少腹滿此為勞使之然勞之為病其脉浮大手足煩春夏劇秋冬瘥隂寒精自出酸削不能行男子脈浮弱而澀為無子精氣清冷男子平人脈虛弱細微者喜盜汗也人年五六十其病脈大者痺俠背行若腸鳴馬刀俠癭者皆為勞得之脈沉小遲名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化也脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相摶此名為草婦人則半産漏下男子則亡血失精古人所謂虛勞皆是純虛無陽之症與近日之隂虛火旺吐血咳嗽者正相反誤治必斃近日吐血咳嗽之病乃是血症有似虛勞其實非虛勞也病源夫虛勞者五勞六極七傷是也五勞者一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞六極者一曰氣極二曰血極三曰筋極四曰骨極五曰肌極六曰精極七傷者一曰隂寒二曰隂萎三曰隂急四曰精連連五曰精少隂下濕六曰精清七曰小便苦數臨事不卒五蒸一骨蒸根在腎二脈蒸根在心三皮蒸根在肺四肉蒸根在脾五內蒸亦名血蒸必外寒而內熱把手附骨而內熱甚根在五臟六腑又有二十三蒸各有症名肺勞者短氣面腫鼻不聞香臭肝勞者面目乾黑口苦精神不守恐畏不能獨卧目視不明心勞者忽忽喜忘大便苦難或時鴨糖口內生瘡脾勞者舌苦直不能咽唾腎勞者背難以俯仰小便不利色赤黃而有餘瀝莖內痛隂濕囊生瘡小腹滿急此乃五臟之勞虛勞方桂枝加龍骨牡蠣湯金匱失精家少腹弦急隂頭寒目弦一作頭眶痛髮落脈極虛芤遲為清榖亡血失精脈得諸芤動微緊男子失精女子夢交此湯主之桂枝二兩芍藥生薑各三兩甘草二兩大棗十二枚龍骨牡蠣各三兩右七味以水七升煮取三升分溫三服脈極虛芤遲乃為虛寒之症故用桂枝及建中等湯若嗽血而脈數者乃隂虛之症與此相反誤用必斃薯蕷丸金匱虛勞諸不足風氣百疾主之薯蕷三十分當歸桂枝麴乾地黃豆黃卷各十分甘草二十八分人參十分芎藭芍藥白术麥門冬各六分柴胡桔梗茯苓各五分阿膠七分杏仁六分乾薑三分白斂二分防風六分大棗百枚為膏右二十一味末之煉蜜和丸如彈子大空腹酒服一丸一百丸為劑大黃䗪蟲丸金匱五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷饑傷勞傷經絡榮衛氣傷內有乾血肌膚甲錯兩目暗黑此丸主之大黃十分蒸黃芩二兩甘草三兩桃仁一升杏仁一升芍藥四兩乾地黃十兩蠐螬一升乾漆一兩虻蟲一升水蛭百枚䗪蟲半斤右十二味末之煉蜜為丸小豆大酒飲服五丸日三服血乾則結而不散非草木之品所能下必用食血之蟲以化之此方專治瘀血成勞之症瘀不除則正氣永無復理故去病即所以補虛也治夢泄精方千金韭子一升右為末酒服方寸七日三服立效羌活補體丸千金療髓虛腦痛不安膽腑中寒羌活川芎當歸各三兩桂心二兩人參四兩酥一升大麻仁二升熬研脂棗肉一斤研脂牛髓羊髓各一升右十味先篩前五味為散後用棗肉麻仁打勻再下二髓及酥重湯煮之為丸桐子大酒服三十丸日再服肘後獺肝散金匱附方治冷勞又主鬼疰一門相染獺肝一具炙乾末之右水服方寸七日三服骨蒸方千金療熱骨蒸羸瘦煩悶短氣喘息兩鼻孔張日西即發龍膽黃連栝蔞各一兩梔子二七枚擘芒硝半兩青葙子苦參大黃黃芩芍藥各半兩右十一味搗篩為末煉蜜和丸如梧子大飲服十丸日二服以知為度此為純寒之劑實熱者宜之救急療瘦疾方外臺炙甘草三兩右一味小便煮服用小便竒此方亦治咽痛口乾方外臺療脾熱脅痛熱滿不歇目赤不止口唇乾裂石膏碎綿裹生地汁赤蜜各一升淡竹葉五升切右四味水一斗二升先煮竹葉取七升去滓煮石膏取一升五合去滓納地黃汁煮二三沸下蜜煎三升細服傳尸勞方外臺獺肝一具破乾炙鱉甲一枚炙野狸頭一枚炙紫苑四分漢防已一兩半蜀漆洗麥冬甘草炙各一兩右藥搗篩已成煉煬羊腎脂二分合蜜一分煬令和丸桐子大每服十丸加至十五丸日再其藥合和分一分懸門頞上一分著頭邊一分繫臂上先服頭邊次服臂上次服門上大驗秦芄鱉甲散寶鑑治骨蒸壯熱肌肉消瘦舌紅頰赤氣粗困倦盜汗鱉甲柴胡地骨皮各一兩秦芄知母當歸各五錢右為末每半兩入烏梅一枚青蒿五葉同煎臨卧空心溫服秦芄扶羸湯直指治肺痿骨蒸勞嗽聲嗄自汗體倦鱉甲秦芄當歸人參各一錢半柴胡二錢地骨皮紫苑半夏甘草各一錢右九味加薑棗煎服十味煎外臺治凡病在胸膈上者宜飽服而在夜肺既居上則病在上晝宜服丸夜宜合桑白皮汁等服桑白皮一升地骨皮三升二味以水七升煮取三升去渣澄清生地汁五升麥冬汁二升生薑汁一升竹瀝生葛根汁各三升白蜜一升牛酥三合大棗一升右十味先煮生地以下葛根以上和煎減半則內桑皮等和煎之三分減一則內酥蜜棗等藥攪之勿停手如稠飴狀每服胡桃大一枚唅之滋潤肺經此為第一薑汁宜用少許百花煎類方竒要治吐血咳嗽補肺生地汁藕汁黃牛乳各一升胡桃十枚研細黃明膠炙燥末半兩阿膠尤佳生薑汁半升乾柿五枚細研大棗二十一枚煮去皮核研爛清酒一升秦芄半兩末秦芄味太苦當用薄荷或蘇子汁杏仁三兩研細右藥煎減半入好蜜四兩漫火養成入磁器服一匙米飲調下日三方內薑汁太多宜減去大半人參蛤蚧散寶鑑治二三年間肺逆喘嗽咯吐膿血滿面生瘡遍身黃腫蛤蚧一對全者河水浸五宿逐日換水洗去腥氣酥炙黃杏仁五兩甘草炙三兩人參茯苓貝母知母桑白皮各二兩右為細末磁器內盛每日如茶㸃服神效金鎖固精丸治夢遺滑精芡實蓮鬚蒺藜各二兩龍骨一兩酥炙牡蠣煆四兩右以蓮子粉糊丸服鹽湯送下金鎖丹本事方治夢泄遺精關鎖不固茴香葫蘆巴破故紙炒白龍骨各一兩木香一兩五錢胡桃三十個研膏羊腎三對切開用鹽擦炙熟搗膏右為末和二膏研勻酒浸煮熟丸桐子大每服三五十丸鹽湯下金鎖正元丹局方治真氣不足元臟虛弱四肢倦怠百節酸疼精神昏困手足多冷心忪盜汗飲食減少小便滑數遺精白濁五倍子茯苓各八兩補骨脂十兩微炒紫巴㦸去心葫蘆巴炒蓯蓉洗淨各一斤硃砂别研龍骨各三兩右為細末入研令勻酒糊為丸如桐子大每服十五丸至二十丸空心食前溫酒或鹽湯下犀角紫河車丸寶鑑治傳尸勞三月必平復其餘勞症即消數服神效紫河車一具米泔浸一宿洗淨焙乾鱉甲酥炙桔梗胡黃連白芍敗鼓皮心醋炙大黃貝母龍膽草黃藥子知母各二錢半芒硝犀角鎊硃砂各二錢研右為末蜜丸桐子大硃砂為衣空心溫酒服二十丸如膈熱食後服重病不過一料小建中湯金匱黃茋建中湯金匱炙甘草湯金匱附方大建中湯八味地黃丸金匱人參養榮湯局方瓊玉膏生地黃煎外臺四物二連湯元戎見以上九方俱通治消症附強中靈素靈師傅篇胃中熱則消榖令人懸心善饑素氣厥論心移寒於肺肺消肺消者飲一㳛二死不治隂陽别論二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁死不治氣厥論心移熱於肺傳為鬲消金匱厥隂之為病消渴氣上衝心心中疼熱饑而不欲食食即吐蛔下之不肯止此症不可誤認蛔厥病源夫消渴者渴不止小便多是也其病變多發癰疽此坐熱氣留於經絡血氣壅澀故成癰膿內消病者不渴而小便多是也利多不得潤養五臟臟衰則生諸病由腎盛之時恣意快情致使虛耗故不渴而小便多也強中病者莖長興盛不痿精液自出由少服五石熱住於腎中下焦虛少壯之時血氣尚豐能制於五石及至年衰血氣減少腎虛不復能制津液若精液竭則諸病生矣消症方文蛤散金匱渴欲飲水不止者主之傷寒論治心煩肉上粟起意欲飲水反不渴者文蛤五兩上一味杵為散以沸湯五合和服方寸七欲飲而不渴乃胸中有水而口燥也消渴方千金栝蔞根生薑麥冬蘆根切各二升茅根切三升右五味㕮咀以水一斗煮取三升分三服此清胃之主方茯神湯千金泄熱止渴治胃腑實熱引飲常渴者茯神二兩栝蔞根五兩生麥冬五兩萎蕤四兩知母四兩生地黃六兩小麥二升大棗二十枚淡竹葉切三升右九味以水三斗煮小麥竹葉取九升去渣下藥煮取四升分四服不問早晚但渴即進通治渴患熱者黃連圓治渴方千金黃連一斤生地黃一斤右二味絞地黃汁浸黃連出曝燥復內汁中令汁盡乾搗末蜜丸桐子大服二十丸日三食前後無拘亦可為散酒服方寸七此治胃中有伏火之方製法神妙本事方用冬瓜汁收入黃連內為丸即以冬瓜汁煎大麥仁湯下亦仿此義則知多吃冬瓜亦妙也桑根湯千金翼主日飲一石水方桑根白皮切五升入地三尺者良炙令黃黑右一味水煮以味濃為度適寒溫任性飲戒食鹽神效散本事方治渴疾飲水不止白浮石蛤粉蟬脫各等分右細末用鯽魚膽七個調三錢服不拘時候神效猪腎薺苨湯千金強中之病莖長興盛不交精液自出消渴之後即作癰疽皆由石熱凡如此等宜服猪腎一只大豆一升薺苨三兩人參石膏各三兩茯神磁石綿裹知母葛根黃芩甘草栝蔞根各二兩右十二味㕮咀以水一斗五升先煮猪腎大豆取一斗去渣下藥煮取三升分三服渴即飲之下焦熱者夜輒合一劑病勢漸歇即止此乃腎熱之症因藥毒所發與胃熱之消渴各殊腎氣丸見通治白虎人參湯見暘門栝蔞瞿麥圓方見淋閉療唇口乾裂方見虛勞蘭臺軌範卷二
