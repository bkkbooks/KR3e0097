body:
  text: 蘭臺軌範卷二呉江徐大椿撰風靈素素問風論黄帝問曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其病各異其名不同或内至五臟六腑不知其解願聞其說岐伯對曰風氣藏於皮膚之間内不得通外不得泄風者善行而數變腠理開則洒然寒閉則熱而悶其寒也則衰食飲其熱也則消肌肉故使人怢慄而不能食名曰寒熱風氣與陽明入胃循脉而上至目内眥其人肥則風氣不得外泄則為熱中而目黄人痩則外泄而寒則為寒中而泣出風氣與太陽俱入行諸脉俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有痬衛風有所凝而不行是故其肉有不仁也癘者有營氣熱腑其氣不清故使鼻柱壊而色敗皮膚痬潰風寒客於脈而不去名曰癘風或名寒熱以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為痺風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風風中五臟六腑之俞亦為臟腑之風各入其門户所中則為偏風風氣循風腑而上則為腦風風入係頭則為目風眼寒飲酒中風則為漏風入房汗出中風則為内風新沐中風則為首風乆風入中則為腸風飱泄外在腠理則為泄風故風者百病之長也至其變化乃為他病也肺風之狀多汗惡風色皏然白時欬短氣晝日則差暮則甚診在眉上其色白心風之狀多汗惡風焦絶善怒嚇赤色病甚則言不可快診在口其色赤肝風之狀多汗惡風善悲色㣲蒼嗌亁善怒時憎女子診目下其色青脾風之狀多汗惡風身體怠惰四肢不欲動色薄㣲黄不嗜食診在鼻上其色黄腎風之狀多汗惡風面龎然浮腫脊痛不能正立其色炤隠曲不利診在肌上其色黒胃風之狀頸多汗惡風食飲不下膈塞不通腹善滿失衣則䐜脹食寒則泄診形痩而腹大首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出内至其風日則病少愈漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口亁善渇不能勞事泄風之狀多汗汗出泄衣上口中亁上漬其風不能勞事身體盡痛則寒諸風病狀各殊其多汗惡風則傷風畏風傷風自汗凡七情六淫之病必有現症能辨症斷不至誤治也平人氣象論面腫曰風風厥勞風評熱病論岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥氣逆甚即名風厥帝曰願卒聞之岐伯曰巨陽生氣故先受邪少隂與其為表裏也得熱則上從之從之則厥也必少隂之氣上乃能厥帝曰治之奈何岐伯曰表裏刺之飲之服湯帝曰勞風為病何如岐伯曰勞風法在肺下其為病也使人強上㝠視唾出若涕惡風而振寒此為勞風之病帝曰治之奈何岐伯曰以救俛仰巨陽引精者三日中年者五日不精者七日欬出青黄涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死也此等病最當體認若誤以為肺癰肺痿則失之逺矣葢肺癰乃肺生癰肺痿乃肺痿􅂒此則風寒入肺痰涎凝結也酒風病能論帝曰有病身熱解墮汗出如浴惡風少氣此為何病岐伯曰病名曰酒風偏枯生氣通天論汗出偏沮使人偏枯痱靈樞熱病痱之為病身無痛者四肢不收智亂不甚其言㣲知可治甚則不能言不可治也金匱夫風之為病當半身不遂或但臂不遂者此為痺脉㣲而數中風使然寸口脉浮而𦂳𦂳則為寒浮則為虚寒虚相摶邪在皮膚浮為血虚絡脉空虚賊邪不㵼或左或右邪氣反緩正氣即急病在緩處故外治必塗其緩者正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口吐涎此辨症之要訣寸口脉遲而緩遲則為寒緩則為虚榮緩則為亡血衛緩則為中風邪氣中經則身痒而瘾疹心氣不足邪氣入中則胸滿而短氣傷寒論脉浮而大浮為風虚大為氣強風氣相摶必成瘾疹身體為痒痒者名泄風乆風為痂癩病源風癔風邪之氣若先發於隂病發於五臟者其狀奄忽不知人喉裏噫噫然有聲舌強不能言發汗身軟者可治眼下及鼻人中左右上白者可治黒赤吐沫者不可治汗不出體直者七日死口噤諸陽經筋皆在於頭三陽之筋并絡入領頰夾於口諸陽為風寒所客則筋急故口噤不開也胗其脉遲者生舌強脾脉絡胃夾咽連舌本散舌下心之别脉係舌本今心脾二臟受風邪故舌強不得語也賊風冬至之日有疾風從南方來名曰虚風其傷人也但痛不可按抑轉動傷風冷則骨解深痛按之乃應骨痛也但覺身内索索冷欲得熱物熨痛處即小寛時有汗乆不去重遇冷氣相摶結成瘰癧及偏枯遇風熱相摶乃變附骨疽也附骨疽亦由風冷所致風痙口噤不開背強而直如發癎之狀其重者耳中策策痛卒然身體痙直者死也由風邪傷於太陽經復遇寒濕則發痙也此與病後壊症之痙不同角弓反張風邪傷人令腰背反折不能俛仰似角弓者由邪入諸陽經故也柔風血氣俱虚風邪并入在於陽則皮膚緩在於隂則腹裏急柔風之狀四肢不能收裏急不能仰不仁由榮氣虚衛氣實風寒入於肌肉使血氣不宣流其狀搔之皮膚如隔衣是也風驚悸由心氣不足心府為風邪所乗則驚不自安悸動不定其狀目精不轉而不得呼刺風由體虚膚腠開為風所侵如刃錐所刺也蠱風由體虚受風其風在於皮膚隠隠躍躍若畫若刺一身盡痛侵傷氣血其動作如蠱毒也鬚眉墮落皆由風濕冷得之邪客於經絡與血氣相干使榮衛不和故面色敗皮膚傷鼻柱壊鬚眉落此乃癘風也惡風風病有四百四種總不出五種黄風青風赤風白風黒風人身有八萬尸虫若無八萬尸虫人身不成不立復有諸惡横病諸風害人所謂五種風生五種虫能害於人口喎養生方云夜卧當耳勿得有孔風入耳中喜食口喎口喎見金匱此又是一病當内服藥而外提出風邪外臺風猥退四肢不收身體疼痛肌肉虚滿骨節懈怠腰脚緩弱由分肉流於血脉乆成風水之病嚲曵肢體弛緩不收攝也人以胃氣養肌肉經脉胃氣衰損則經脉虚而筋肉懈惰故風邪摶於筋而使嚲曵也風毒發眼疼脚縱中指疼連肘邊牽心裏悶肋脹少氣喘氣欲絶不能食風方酒風素問治身熱懈惰汗出如浴惡風少氣澤㵼术各十分麋銜五分合以三指撮為後飯麋銜即薇銜一名無心草南人呼為無風草味苦平㣲寒主治風濕三指為一撮約二三錢飯後藥先為後飯凡按麋銜疑即鹿啣草為後飯服在飯後非飯前也古方須將神農本草細㕘藥性乃能深知其義侯氏黒散金匱治大風四肢煩重心中惡寒不足者菊花四十分白术十分細辛三分茯苓三分牡蠣三分桔梗八分防風十分人參礬石各三分黄芩五分當歸亁薑芎窮桂枝各三分右十四味杵為散酒服方寸七日一服初服二十日温酒調服禁一切魚肉大蒜常宜冷服六十日止即藥積在腹中不下也熱食即下矣冷食自能助藥力腸腹空虚則邪易留此填滿空隙使邪氣不能容風引湯金匱除熱癱癎巢氏云脚氣宜風引湯大黄亁薑龍骨各四兩桂枝三兩甘草牡蠣各二兩寒水石滑石赤石脂白石脂紫石英石膏各六兩右十二味杵粗篩以韋嚢盛之取三指撮井花水三升煮三沸温服一升此乃臟腑之熱非草木之品所能散故以金石重藥清其裏防已地黄湯金匱治病如狂狀妄行獨語不休無寒熱其脉浮防已一分桂枝防風各二分甘草一分右四味以酒一杯浸之一宿絞取汁生地黄二斤㕮咀蒸之如斗米飯乆以銅器盛其汁更絞地黄汁和分再服此方他藥輕而生地獨重乃治血中之風也此等法最宜細玩凡風勝則燥又風能發火故治風藥中無純用燥熱之理頭風摩散金匱大附子一枚泡鹽等分右二味為散沐了以方寸七已摩疢上令藥力行越脾湯金匱風水惡風一身悉腫脉浮不渇續自汗出無大汗者主之麻黄六兩石膏半斤生薑三兩甘草二兩大棗十五枚右五味以水六升先煮麻黄去上沫内諸藥煮取三升分温三服惡風加附子一枚本方加白术四兩即越脾加术湯越脾寒散之方也治風熱在表之症小續命湯千金治卒中風欲死身體緩急口目不正舌強不能言奄奄忽忽神精悶亂諸風服之皆騐麻黄防已人參黄芩桂心芍藥甘草川芎杏仁各一兩防風一兩半附子一枚生薑五兩右十二味㕮咀以水一斗二升先煮麻黄三沸去沫内諸藥煮取三升分三服不瘥更合三四劑隨人風輕重虚實脚弱服之亦瘥恍惚者加茯神逺志骨節疼煩有熱者去附子倍芍藥外臺加白术一兩石膏當歸各二兩無防已續命為中風之主方因症加减變化由人而總不能舍此以立法後人不知此義人自為説流弊無窮而中風一症遂十不愈一矣人參附桂何嘗不用必實見其有寒象而後可加然尤宜於西北人若東南人則當詳審勿輕試録騐續命湯治中風痱身體不能自收口不能言冒昧不知痛處或拘急不得轉側麻黄桂枝當歸人參石膏亁薑甘草各三兩川芎杏仁四十枚右九味以水一斗煮取四升温服一升當小汗薄覆脊憑几坐汗出則愈不汗更服無所禁勿當風并治但伏不得卧咳逆上氣面目浮腫虚而感風則成痱此治痱症之主方近效术附湯治風虚頭重眩苦極不知食味暖肌補中益精氣白术二兩附子一枚半泡去皮甘草一兩炙右三味剉毎五錢七薑五片棗一枚水盞半煎七分去滓温服此治中風後陽虚之症書按古今録騐近效二種乃唐以前之方今全本末見外臺中引二書之方極多金匱要畧宋人校書者往往以本集中載方太少故亦採取二書并千金外臺之方擇其精要者附一二方於毎病之後而方首亦必不没其所本之書古人之不苟如此今人見其方載入金匱中即以為仲景所定之方誤矣須知之地黄煎千金治熱風心煩悶及脾胃間熱不下食方生地黄汁枸杞根汁各二兩生薑汁酥各三升荆瀝竹瀝各五升天門冬人參各八兩茯苓六兩大黄梔子各四兩右十一味搗篩五物為散先煎地黄等汁成膏内散攪匀毎服一七日再漸加至三七覺利减風行必燥古人治風必用潤藥乃真訣也今人反以剛燥辛熱之品治之是益其疾矣三黄湯千金治中風手足拘急百節疼痛煩熱心亂惡寒經日不欲飲食麻黄五分獨活四分細辛黄茋各二分黄芩三分右五味以水六升煮取二升分温三服一服小汗二服大汗心熱加大黄二分腹滿加枳實一枚氣逆加人參三分悸加牡蠣三分渇加栝蔞根三分先有寒加附子一枚此方專以驅風為治風痱方千金治手足不遂殭直伏龍肝五升為末冷水八升攪取汁飲之能盡為善蒸半身不遂方千金蚕沙兩石熟蒸分作直袋三枚熱盛一袋著患處如冷換熱者數易之瘥後須羊肚釀粳米葱白薑椒豉等爛煮熱吃日食一具十日止按此法熨痺症亦良治風懿方竹瀝一升治半身不遂手足拘急身冷強直不語或狂言角弓反張或食或不食或大小便不利治風懿之法與治風痱之法不相逺口眼喎僻方千金翼治中風面目相引偏僻牙車急舌不轉牡蠣熬礬石燒附子泡去皮伏龍肝等分右四味搗篩為散以三歳雄雞血和藥敷上預候看勿令太過偏右塗左偏左塗右正則洗去之又方大皂莢五兩去皮子搗篩以三年大醋和塗緩處又方千金翼治風著人面引口偏著耳牙車急舌不得轉生地黄汁竹瀝各一升獨活三兩切右三味合煎取一升頓服之即愈驅風舒經活血開心肥徤方千金翼人參五兩大猪肪八枚右二味搗人參為散猪肪煎取凝毎服以人參一分猪脂十分以酒半升和服之一百日骨髓充盈日記千言身體潤澤去熱風冷風心頭等風月服二升半即有大效此方治老人及風燥者最宜一切風虚方千金翼杏仁九升去尖及兩仁曝亁右一味搗為末以水九升研濾如作粥法緩火煎令如麻浮上匙取和羮粥酒内一匙服之毎食即服不限多少服七日後大汗出二十日後汗止慎風冷猪魚雞蒜大醋一劑後諸風减差春夏恐酸少作服之秋九月後煎之此法神妙可深秘之此即作杏酪之法服食最宜竹瀝湯外臺治諸中風竹瀝二升生葛根一升用按亦當汁生薑汁三合右三味分三服日三此通經絡之法卒不得語方外臺以苦酒煮芥子薄頸一周以衣包之一日一夕乃解瘥中風不語方寶鑑取龜尿㸃舌取龜尿法置龜於新荷葉上以猪髮鼻内戳之立出地黄飲子宣明治中風舌瘖不能言足廢不能行此少隂氣厥不至名曰風痱急當温之熟地山茱茰五味子蓯蓉酒浸石斛麥冬石菖蒲逺志茯苓桂心附子炮巴㦸去心等分薄荷七葉右十三味毎服三錢生薑五片棗一枚煎服風氣甚而有火多痰者忌服之此治少隂氣厥之方所謂類中風也故全屬補腎藥庸醫不察竟以之治一切中風之症輕則永無愈期甚則益其病而致死醫者病家終身不悟也稀涎散局方治中風牙關𦂳急并治單蛾雙蛾江子仁六粒牙皂三錢明礬一兩右先化開礬入二味待礬枯為末毎用三分吹入喉中此急救弔痰開喉之法豨薟丸本事方治口眼喎斜偏風失音不語時時吐涎乆服并眼目清明髭鬚烏黒筋骨強徤豨薟五月中取葉及嫩枝洗九蒸九晒㣲焙為末煉蜜丸桐子大温酒或米飲下三四十丸按余取豨薟瀝汁熬膏打末為丸尤有力法此緩治之劑非一時救病之控涎丹三因方甘遂大㦸白芥子等分右為末煮糊丸桐子大晒亁卧時淡薑湯或熱湯下五七丸至十丸此乃下痰之方人實症實者用之滌痰散嚴氏治中風痰迷心竅舌強不能言南星薑製半夏各二錢半枳實茯苓各二錢橘紅一錢五分石菖蒲人參各一錢竹茹七分甘草右九味加薑五片水煎服此治心經之痰勝金丸本事方治中風忽然昏倒若醉形體昏悶四肢不收風涎潮於上膈氣閉不通生薄荷半兩猪牙皂角二兩搥碎水一升二味一處浸取汁研成膏𤓰蒂末一兩藜蘆二兩硃砂五錢許研右將硃砂末二分與二味研匀用膏子搜和丸如龍眼大以硃砂一分為衣温酒化下一丸甚者二丸以吐為度得吐即醒不醒者不治實見其痰在上膈則可用否則提氣上升反成厥冐等疾銀液丹局方治諸風痰涎藴結心膈滿悶頭痛目運面熱心忪痰唾稠黏精神昏􅀈及風涎潮搐並宜服之天南星三分為末硃砂半兩研飛鐵粉水銀各三兩結砂子膩粉一兩研黒鉛煉十遍􅱨三兩與水銀結沙為小塊同甘草十兩水煮半日候冷研右研匀麺糊丸梧桐子大毎服二丸同薄荷蜜湯下生薑湯亦可㣲為度食後服如治風癎不計時候服痰涎逆上用此鎮壓亦不可少在前方提之使出此方鎮之使下隨宜施治全辨症之確癘風方治眉落鼻壊徧體生瘡出神仙感遇傳角刺一二升燒灰大黄九蒸晒右為末再煎大黄湯服方寸七旬日即愈青州白圓局方見通治痺歴節靈素靈周痺論黄帝曰願聞衆痺岐伯對曰此各在其處更發更止更居更起以右應左以左應右非能周也更發更休也帝曰善願聞周痺何如岐伯對曰周痺者在於血脉之中隨脉以上隨脉以下不能左右各當其所帝曰善此痛安在何因而有名岐伯對曰風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也經中無痰字沫即痰也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痺發發則如是此内不在臟而外未發於皮獨居分肉之間真氣不能周故曰周痺深痺九鍼十二原篇八風傷人内舍於骨解腰脊節腠理之間為深痺風痺壽夭剛柔篇病在陽者命曰風病在隂者命曰痺隂陽俱病者命曰風痺二病之殊兩言而定寒痺壽夭剛柔篇寒痺之為病也留而不去時痛而皮不仁素問痺論帝問痺之安生岐伯對曰風寒濕三氣雜至合而為痺也其風氣勝者為行痺寒氣勝者為痛痺濕氣勝者為著痺也凡痺之客五臟者客五臟痺氣入内而生内症矣肺痺者煩滿喘而嘔心痺者脉不通煩則心下鼓暴上氣而喘嗌亁善噫厥氣上則恐肝痺者夜卧則驚多飲數小便上為引如懐腎痺者善脹尻以代踵脊以代頭脾痺者四肢解墮發欬嘔汁上為大塞腸痺者數飲而出不得中氣喘爭時發飱泄胞痺者少腹膀胱按之内痛若沃以湯澁於小便上為清涕隂氣者靜則神藏躁則消亡飲食自倍腸胃乃傷淫氣喘息痺聚在肺淫氣憂思痺聚在心淫氣遺溺痺聚在腎淫氣乏竭痺聚在肝淫氣肌絶痺聚在脾諸痺不已亦益内也其風氣勝者其人易已也帝曰痺其時有死者有疼久者有易已者其故何也岐伯曰其入臟者死其留連筋骨間者疼久其留皮膚間者易已帝曰其客於六腑者何也岐伯曰此亦其食飲居處為其病本也帝曰榮衛之氣亦令人痺乎岐伯曰榮者水榖之精氣也和調於五臟灑陳於六腑乃能入於脉也故循脉上下貫五臟絡六腑也衛者水榖之悍氣也其氣慓疾滑利不能入於脉也故循皮膚之中分肉之間熏於盲膜散於胸腹逆其氣則病從其氣則愈不與風寒濕氣合故不為痺帝曰善痺或痛或不痛或不仁或寒或熱或燥或濕其故何也岐伯曰痛者寒氣多也有寒故痛也其不痛不仁者病乆入深榮衛之行濇經絡時疎故不通皮膚不營故為不仁其寒者陽氣少隂氣多與病相益故寒其熱者陽氣多隂氣少病氣勝陽遭隂故為痺熱其多汗而濡者此其逢濕甚也陽氣少隂氣盛兩氣相感故汗出而濡也帝曰夫痺之為病不痛何也岐伯曰痺在於骨則重在於脉則血凝而不流在於筋則屈不伸在於肉則不仁在於皮則寒故具此五者則不痛也凡痺之類逢寒則蟲逢熱則縱隂痺至真要大論隂痺者按之不得腰脊頭頂痛時眩大便難隂氣不用饑不欲食欬唾則有血心如懸病本於腎筋肌骨痺長刺莭論病在筋筋攣莭痛不可以行名曰筋痺病在肌膚肌膚盡痛名曰肌痺病在骨骨重不可舉骨髓酸痛寒氣至名曰骨痺肉苛逆調論帝曰人之肉苛者雖近於衣絮猶尚苛也是為何疾岐伯曰營氣虚衛氣實也營氣虚則不仁衛氣虚則不用營衛俱虚則不仁且不用肉如故也人身與志不相有曰死金匱問曰血痺病從何得之師曰夫尊榮人骨肉肌膚盛重因疲勞汗出卧不時動摇加被㣲風遂得之但以脉自㣲濇在寸口關上小𦂳宜鍼引陽氣令脉和𦂳去則愈寸口脉沉而弱沉即主骨弱即主筋沉即為腎弱即為肝汗出入水中如水傷心歴節痛黄汗出故曰歴節少隂脉浮而弱弱則血不足浮則為風風血相摶即疼痛如掣盛人脉濇小短氣自汗出歴節疼不可屈伸此皆飲酒汗出當風所致味酸則傷筋筋傷則緩名曰泄醎則傷骨骨傷則痿名曰枯枯泄相摶名曰斷泄榮氣不通衛不獨行榮衛俱㣲三焦無所御四屬斷絶身體羸瘦獨足腫大黄汗出脛冷假令發熱便為歴節也痺歴節方痺症方靈樞治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鈎鈎之即以生桑炭置之坎中髙下以坐等以膏熨急頰且飲美酒噉美炙肉不飲酒者自強也為之三拊而已馬膏馬脂也其性味甘平柔潤能養筋治痺故可以膏其急者白酒辣桂性味辛温能通經絡行血脉故可以塗其緩者桑之性平能利關節除風寒濕痺諸痛故以桑鈎鈎之者鈎正其口也復以生桑火炭置之地坎之中髙下以坐等者欲其淺深適中便於坐而得其暖也然後以前膏熨其急頰且飲之美酒噉之美肉皆助血舒筋之法也雖不善飲亦自強之三拊而已言再三拊摩其患處則病亦已矣外筋骨之病總在軀殻古法多用治今人不能知矣寒痺熨法靈樞用淳酒二十升蜀椒一升亁薑一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈并内酒中置酒馬矢煴中馬矢煴中者燃馬屎而煨之也蓋封塗勿使泄五日五夜出布綿絮曝亁之亁後復漬以盡其汁毎漬必晬晬周日也其日乃出亁并用滓與綿絮複布為複巾重布為巾如今之夾袋所以盛貯綿絮藥滓也長六七尺為六七巾則用生桑炭炙巾以熨寒痺所刺之處令熱入至於病所熨寒痺所刺則知先已刺過然後熨之若不刺而徒熨恐藥性不易入則刺法亦當考明寒復炙巾以熨之三十遍而止汗出以巾拭身亦三十遍而止黄茋桂枝五物湯金匱治血痺隂陽俱㣲寸口關上㣲尺中小𦂳外症身體不仁如風痺狀黄茋芍藥桂枝各三兩生薑六兩大棗十二枚右五味以水六升煮取二升温服七合日三服一方有人參此即桂枝湯以黄茋易甘草乃衛虚營弱之方固衛即以䕶營桂枝芍藥知母湯金匱治肢節疼痛身體尩羸脚腫如脫頭眩短氣温温欲吐桂枝四兩芍藥三兩甘草麻黄附子炮各二兩生薑白术各五兩知母四兩右九味以水七升煮取二升温服七合日三服此為陽虚之症烏頭湯金匱治歴節疼痛不可屈伸麻黄芍藥黄茋甘草炙各三兩烏頭三枚㕮咀以蜜二升煮取一升即出烏頭右五味㕮咀四味水三升煮取一升去滓内蜜煎中更煎之服七合不知更服之其煎法精妙可師風寒入節非此不能通逹陽氣獨活寄生湯千金治風寒濕痺偏枯脚氣獨活三兩桑寄生秦芄細辛歸身生地白芍川芎桂心茯苓杜仲牛膝人參甘草各等分一方有防風右十四味為粗末毎服四錢煎服此驅風通治之方舒筋飲治臂痛不能舉由氣血凝滯經絡不能行所致非風非濕腰以下食前服腰以上食後服片薑黄二錢如無以莪术代之赤芍當歸海桐皮去粗皮白术各一錢五分羌活炙甘草各一錢右七味加薑三片煎服磨冲沉香汁少許拔痺膏用生半夏為末同廣膠等分先用薑汁將膏煎烊調入半夏塗史國公酒方聖惠治中風語言塞澁手足拘攣半身不遂痿痺不仁當歸酒洗虎脛骨酒浸一日焙亁醋炙羌活鱉甲炙萆薢防風秦芄牛膝松節晩蠶沙二兩枸杞子五兩茄根八兩蒸右為粗末絹袋盛浸無灰酒一斗十日取飲半身不遂外治方見風門大活絡丹指迷茯苓丸俱見通治痿素問素問痿論黄帝問曰五臟使人痿何也岐伯對曰肺主身之皮毛心主身之血脉肝主身之筋膜脾主身之肌肉腎主身之骨髓故肺熱葉焦則皮毛虚弱急薄著則生痿躄也心氣熱而下脉厥而上上則下脉虚虚則生脉痿樞折挈脛縱而不任地也肝氣熱則胆泄口苦筋膜亁筋脉亁則脛急而攣發為筋痿脾氣熱則胃亁而渇肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿帝曰何以得之岐伯曰肺者臟之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦故曰五臟因肺熱葉焦發為痿躄此之謂也痿症總屬熱而皆關於肺後人治痿而用燥熱之藥俱誤悲哀太甚則胞絡絶胞絡絶則陽氣内動發則心下崩數溲血也故本病曰大經空虚發為肌痺傳為脈痿思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫故下經曰筋痿者生於肝使内也有漸於濕以水為事若有所留居處相濕肌肉濡漬痺而不仁發為肉痿故下經曰肉痿者得之濕地也有所逺行勞倦逢大熱而渇渇則陽氣内伐内伐則熱舍於腎腎者水臟也今水不勝火則骨枯而髓虚故足不任身發為骨痿故下經曰骨痿者生於大熱也黄帝曰何以别之岐伯曰肺熱者色白而毛散心熱者色赤而絡溢肝熱者色蒼而爪枯脾熱者色黄而肉蠕動腎熱者色黒而齒槁帝曰如夫子言可矣論言治痿者獨取陽明何也岐伯曰陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海也主滲灌谿谷與陽明合於宗筋隂陽總宗筋之㑹㑹於氣街氣街一名氣衝足陽明經穴在毛際兩旁鼠鼷上一寸動脈處而陽明為之長皆屬於帶脈而絡於督脈故陽明虚則宗筋縱帶脈不引故足痿不用也帝曰治之奈何岐伯曰各補其榮諸經所溜為榮而通其俞諸經所注為俞調其虚實和其順逆筋脈骨肉各以其時受月則病已矣時受月王氷注謂病所受之時月未知是否生氣通天論濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿難經五損損於骨骨痿不能起於牀痿方金剛丸保命治腎損骨痿不能起於牀萆薢杜仲炒去絲蓯蓉酒浸等分右為末酒煮腰子搗丸如桐子大毎服五七十丸温酒下虎骨四觔丸局方治脚痿宣木𤓰天麻蓯蓉牛膝各焙亁一斤附子虎骨各一兩酥炙右以上各如法修製先將前四味用無灰酒浸春秋各五日夏三冬十日取出焙亁入附子虎骨共研為末用浸藥酒打麺糊丸梧子大毎服五十丸食前鹽湯下加減四觔丸三因治腎肝虚熱淫於内致筋骨痿弱足不任地驚恐戰掉潮熱時作飲食無味不生氣力肉蓯蓉酒浸牛膝酒浸木𤓰亁鹿茸酥炙熟地五味子酒浸兎絲子酒浸各等分右為末煉蜜丸桐子大毎服五十丸温酒米飲下一方不用五味有杜仲煨腎丸保命治腎肝虚及脾損榖不化牛膝萆薢杜仲炒去絲白蒺藜防風兎絲子酒浸蓯蓉酒浸葫蘆巴破故紙等分桂枝減半右為末將猪腰子製如食法搗爛蜜丸如桐子大毎服五七十丸温酒送下又治腰痛不起亦治腎痿續骨丹本事治兩脚輭弱虚羸無力及小兒不能行天麻酒浸白附子牛膝木鱉子各半兩羗活半兩烏頭一錢泡地龍去土一分乳香没藥各二錢硃砂一錢右以生南星末一兩無灰酒炙糊丸雞頭大硃砂為衣此加味活絡丹也舒筋最宜思仙續斷圓本事治肝腎風虚氣弱脚不可踐地腰脊疼痛風毒流注下經行止艱難小便餘瀝此補五臟内傷調中益精凉血堅強筋骨益智輕身耐老思仙术生地各五兩五加皮防風米仁羗活川斷牛膝各三兩萆薢四兩右為細末好酒三升化青鹽三兩用大木𤓰半斤去皮子以鹽酒煮木𤓰成膏杵丸如桐子大毎服三四十丸空心食前温酒鹽湯下膏少和酒可也此方治下焦風濕脚氣亦效而内經針痿之法獨取陽明以陽明為諸筋總㑹也用藥則補腎為多以腎為筋骨之總司也養其精血而逐其風痰則大畧無誤矣虎潛丸丹溪大活絡丹以上二方俱見通治厥靈素靈癲狂篇厥逆為病也足暴清胸若將裂腸若將以刀切之煩而不能食脈大小皆濇厥之象如此甚則不知人矣素厥論黄帝問曰厥之寒熱者何也岐伯對曰陽氣衰於下則為寒厥隂氣衰於下則為熱厥帝曰熱厥之為熱也必起於足下者何也岐伯曰陽氣起於足五指之表隂脈者集於足下而聚於足心故陽氣勝則足下熱也帝曰寒厥之為寒也必從五指而上於膝者何也岐伯曰隂氣起於五指之裏集於膝下而聚於膝上故隂氣勝則從五指至膝上寒其寒也不從外皆從内也解精㣲論厥則目無所見夫人厥則陽氣并於上隂氣并於下陽并於上則火獨光也隂并於下則足寒足寒則脹也厥則無不因陽氣在上若不能通隂納陽而用辛熱滋膩之藥貽害無窮調經論血之與氣并走於上則為大厥厥則暴死氣復反則生不反則死陽明脈解論厥逆連藏則死連經則生瘖俳煎厥素脈解篇内奪而厥則為瘖俳此腎虚也少隂不至者厥也肝氣當治而未得故善怒善怒者名曰煎厥劉河間地黄引子專治瘖俳生氣通天論陽氣者煩勞則張精絶辟積於夏使人煎厥此當治肝脾之逆薄厥素生通天論陽氣者大怒則形氣絶而血菀於上使人薄厥此當治血逆陽明厥素陽明脈解論陽明厥則喘而惋惋則惡人少隂厥素脈要精㣲論脈俱沉細數者少隂厥也風厥素評熱論汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥此當治風尸厥素刺繆論五絡俱竭令人身脈皆動而形無知也其狀若尸或曰尸厥難經督之為病脊強而厥金匱問曰寸脈沉大而滑沉則為實滑則為氣實氣相摶血氣入臟即死入腑即愈此為卒厥何謂也師曰唇口青身冷為入臟即死如身和汗自出為入腑即愈卒厥之症頗似中風一或誤治死不旋踵傷寒論寸口諸㣲亡陽諸濡亡血諸弱發熱諸𦂳為寒諸乗寒者則為厥鬱冒不仁以胃無榖氣脾濇不通口急不能言戰而慓也少隂脈不至腎氣㣲少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸隂股與隂相動令身不仁此為尸厥少陽厥隂俱病耳聾嚢縮而厥水漿不入不知人者六日死此為寒厥諸四逆厥者不可下之虚家亦然以下所論諸條皆指傷寒症手足逆冷而言非氣逆不知人之厥也傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚勝必愈傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥㣲者熱亦㣲厥應下之而反發汗者必口傷爛赤此為熱厥凡厥者隂陽氣不相順接便為厥此致厥之由厥者手足逆冷是也此厥之象傷寒脈㣲而厥至七八日膚冷其人躁無暫安時者此為臟厥傷寒熱少厥㣲指頭寒黙黙不欲食煩躁數小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脇煩滿其後必便血熱入裏病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也傷寒發熱下利厥逆躁不卧者死傷寒發熱下利至甚厥不止者死傷寒五六日不結胸腹濡脈虚復厥者不可下此為亡血下之死傷寒脈促手足厥逆者可灸之下利手足厥冷無脈者灸之不温若脈不還反㣲喘者死虚寒之厥下利後脈絶手足厥冷晬時脈還手足温者生脈不還者死病人手足厥冷脈乍結以客氣在胸中心中滿而煩欲食不能食者病在胸中當吐之傷寒論中厥症諸條有寒有熱有虚有實有寒熱互乗其變不一隨病異形非厥之正病也尤不可不潛心體察凡一病其變態不同如此何可執一説以人命為兒戯耶厥方尸厥方素問以竹管吹其兩耳鬄鬄剃同其左角之髮方一寸燔治飲以美酒燔治燒為末也赤圓金匱寒氣厥逆主之茯苓半夏各四兩洗一方用桂烏頭二兩泡細辛一兩千金作人參右六味末之内真朱為色煉蜜丸如麻子大先食酒飲下三丸日再夜一服不知稍増之以知為度真朱即硃砂茯苓甘草湯傷寒論傷寒厥而心下悸者宜先治水當服此湯却治其厥不爾水漬入胃必作利也茯苓二兩桂枝二兩生草一兩炙生薑二兩右四味水四升煮取二升分温三服尸蹷方金匱治尸蹷脈動而無氣氣閉不通故靜而死也草蒲屑内鼻兩孔中吹之令人以桂屑著舌下白薇湯本事方人平居無苦疾忽如死人身不動摇黙黙不知人目閉不能開口瘖不能言或微知人或惡聞人聲但如眩冒移時方寤此由出汗過多血少氣併於陽獨上而不下氣壅塞而不行故身如死氣過血還隂陽復通移時方寤名曰鬱冒亦名血厥婦人多有之宜服白薇當歸各一兩人參甘草各一錢右為粗末毎服五錢水二盞煎至一盞去滓温服此病最多而婦科皆不知無不誤治四逆湯傷寒論下利厥逆而惡寒者主之大汗若大下利而冷厥者亦主之方見傷寒通脈四逆湯傷寒論下利清榖裏寒外熱汗出而厥者主之方見通治附加減法如面色赤者加葱九莖腹中痛者去葱加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參一兩當歸四逆湯傷寒論手足厥冷脈細欲絶者主之方見傷寒以上三方皆治寒極之厥與熱厥正相反須辨之𤓰蒂散白虎湯此治熱厥二方俱見傷寒烏梅丸此治虫厥見虫門蘇合香丸此治氣厥四磨飲至寳丹以上三方俱見通治虚勞金匱夫男子平人脈大為勞極虚亦為勞男子面色薄者主渇及亡血卒喘悸脈浮者裏虚也男子脈虚沉弦無寒熱短氣裏急小便不利面赤白時目瞑兼衂少腹滿此為勞使之然勞之為病其脉浮大手足煩春夏劇秋冬瘥隂寒精自出酸削不能行男子脈浮弱而濇為無子精氣清冷男子平人脈虚弱細㣲者喜盜汗也人年五六十其病脈大者痺俠背行若腸鳴馬刀俠癭者皆為勞得之脈沉小遲名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化也脈弦而大弦則為減大則為芤減則為寒芤則為虚虚寒相摶此名為草婦人則半産漏下男子則亡血失精古人所謂虚勞皆是純虚無陽之症與近日之隂虚火旺吐血咳𠻳者正相反誤治必斃近日吐血咳𠻳之病乃是血症有似虚勞其實非虚勞也病源夫虚勞者五勞六極七傷是也五勞者一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞六極者一曰氣極二曰血極三曰筋極四曰骨極五曰肌極六曰精極七傷者一曰隂寒二曰隂萎三曰隂急四曰精連連五曰精少隂下濕六曰精清七曰小便苦數臨事不卒五蒸一骨蒸根在腎二脈蒸根在心三皮蒸根在肺四肉蒸根在脾五内蒸亦名血蒸必外寒而内熱把手附骨而内熱甚根在五臟六腑又有二十三蒸各有症名肺勞者短氣面腫鼻不聞香臭肝勞者面目亁黒口苦精神不守恐畏不能獨卧目視不明心勞者忽忽喜忘大便苦難或時鴨糖口内生瘡脾勞者舌苦直不能咽唾腎勞者背難以俛仰小便不利色赤黄而有餘瀝莖内痛隂濕囊生瘡小腹滿急此乃五臟之勞虚勞方桂枝加龍骨牡蠣湯金匱失精家少腹弦急隂頭寒目弦一作頭眶痛髪落脈極虚芤遲為清榖亡血失精脈得諸芤動㣲𦂳男子失精女子夢交此湯主之桂枝二兩芍藥生薑各三兩甘草二兩大棗十二枚龍骨牡蠣各三兩右七味以水七升煮取三升分温三服脈極虚芤遲乃為虚寒之症故用桂枝及建中等湯若𠻳血而脈數者乃隂虚之症與此相反誤用必斃薯蕷丸金匱虚勞諸不足風氣百疾主之薯蕷三十分當歸桂枝麹亁地黄豆黄卷各十分甘草二十八分人參十分芎藭芍藥白术麥門冬各六分柴胡桔梗茯苓各五分阿膠七分杏仁六分亁薑三分白歛二分防風六分大棗百枚為膏右二十一味末之煉蜜和丸如彈子大空腹酒服一丸一百丸為劑大黄䗪虫丸金匱五勞虚極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷饑傷勞傷經絡榮衛氣傷内有亁血肌膚甲錯兩目暗黑此丸主之大黄十分蒸黄芩二兩甘草三兩桃仁一升杏仁一升芍藥四兩亁地黄十兩蠐螬一升亁漆一兩蝱虫一升水蛭百枚䗪虫半斤右十二味末之煉蜜為丸小豆大酒飲服五丸日三服血亁則結而不散非草木之品所能下必用食血之虫以化之此方專治瘀血成勞之症瘀不除則正氣永無復理故去病即所以補虚也治夢洩精方千金韭子一升右為末酒服方寸七日三服立效羌活補體丸千金療髓虚腦痛不安胆腑中寒羌活川芎當歸各三兩桂心二兩人參四兩酥一升大麻仁二升熬研脂棗肉一斤研脂牛髓羊髓各一升右十味先篩前五味為散後用棗肉麻仁打匀再下二髓及酥重湯煮之為丸桐子大酒服三十丸日再服肘後獺肝散金匱附方治冷勞又主鬼疰一門相染獺肝一具炙亁末之右水服方寸七日三服骨蒸方千金療熱骨蒸羸痩煩悶短氣喘息兩鼻孔張日西即發龍胆黄連栝蔞各一兩梔子二七枚擘芒硝半兩青葙子苦參大黄黄芩芍藥各半兩右十一味搗篩為末煉蜜和丸如梧子大飲服十丸日二服以知為度此為純寒之劑實熱者宜之救急療瘦疾方外臺炙甘草三兩右一味小便煮服用小便竒此方亦治咽痛口亁方外臺療脾熱脇痛熱滿不歇目赤不止口唇亁裂石膏碎綿裹生地汁赤蜜各一升淡竹葉五升切右四味水一斗二升先煮竹葉取七升去滓煮石膏取一升五合去滓納地黄汁煮二三沸下蜜煎三升細服傳屍勞方外臺獺肝一具破亁炙鱉甲一枚炙野狸頭一枚炙紫苑四分漢防已一兩半蜀漆洗麥冬甘草炙各一兩右藥搗篩已成煉烊羊腎脂二分合蜜一分烊令和丸桐子大毎服十丸加至十五丸日再其藥合和分一分懸門頞上一分著頭邊一分繫臂上先服頭邊次服臂上次服門上大驗秦芄鱉甲散寳鑑治骨蒸壯熱肌肉消痩舌紅頰赤氣粗困倦盜汗鱉甲柴胡地骨皮各一兩秦芄知母當歸各五錢右為末毎半兩入烏梅一枚青蒿五葉同煎臨卧空心温服秦芄扶羸湯直指治肺痿骨蒸勞𠻳聲嗄自汗體倦鱉甲秦芄當歸人參各一錢半柴胡二錢地骨皮紫苑半夏甘草各一錢右九味加薑棗煎服十味煎外臺治凡病在胸膈上者宜飽服而在夜肺既居上則病在上晝宜服丸夜宜合桑白皮汁等服桑白皮一升地骨皮三升二味以水七升煮取三升去渣澄清生地汁五升麥冬汁二升生薑汁一升竹瀝生葛根汁各三升白蜜一升牛酥三合大棗一升右十味先煮生地以下葛根以上和煎減半則内桑皮等和煎之三分減一則内酥蜜棗等藥攪之勿停手如稠飴狀毎服胡桃大一枚唅之滋潤肺經此為第一薑汁宜用少許百花煎類方竒要治吐血咳𠻳補肺生地汁藕汁黄牛乳各一升胡桃十枚研細黄明膠炙燥末半兩阿膠尤佳生薑汁半升亁柿五枚細研大棗二十一枚煮去皮核研爛清酒一升秦芄半兩末秦芄味太苦當用薄荷或蘇子汁杏仁三兩研細右藥煎減半入好蜜四兩漫火養成入磁器服一匙米飲調下日三方内薑汁太多宜減去大半人參蛤蚧散寳鑑治二三年間肺逆喘𠻳咯吐膿血滿面生瘡遍身黄腫蛤蚧一對全者河水浸五宿逐日換水洗去腥氣酥炙黄杏仁五兩甘草炙三兩人參茯苓貝母知母桑白皮各二兩右為細末磁器内盛毎日如茶㸃服神效金鎻固精丸治夢遺滑精芡實蓮鬚蒺藜各二兩龍骨一兩酥炙牡蠣煆四兩右以蓮子粉糊丸服鹽湯送下金鎻丹本事方治夢泄遺精關鎻不固茴香葫蘆巴破故紙炒白龍骨各一兩木香一兩五錢胡桃三十個研膏羊腎三對切開用鹽擦炙熟搗膏右為末和二膏研匀酒浸煮熟丸桐子大毎服三五十丸鹽湯下金鎻正元丹局方治真氣不足元臟虚弱四肢倦怠百節酸疼精神昏困手足多冷心忪盜汗飲食減少小便滑數遺精白濁五倍子茯苓各八兩補骨脂十兩微炒紫巴㦸去心葫蘆巴炒蓯蓉洗淨各一斤硃砂别研龍骨各三兩右為細末入研令匀酒糊為丸如桐子大毎服十五丸至二十丸空心食前温酒或鹽湯下犀角紫河車丸寳鑑治傳尸勞三月必平復其餘勞症即消數服神效紫河車一具米泔浸一宿洗淨焙亁鱉甲酥炙桔梗胡黄連白芍敗鼓皮心醋炙大黄貝母龍胆草黄藥子知母各二錢半芒硝犀角鎊硃砂各二錢研右為末蜜丸桐子大硃砂為衣空心温酒服二十丸如膈熱食後服重病不過一料小建中湯金匱黄茋建中湯金匱炙甘草湯金匱附方大建中湯八味地黄丸金匱人參養榮湯局方瓊玉膏生地黄煎外臺四物二連湯元戎見以上九方俱通治消症附強中靈素靈師傅篇胃中熱則消榖令人懸心善饑素氣厥論心移寒於肺肺消肺消者飲一㳛二死不治隂陽别論二陽之病發心脾有不得隠曲女子不月其傳為風消其傳為息賁死不治氣厥論心移熱於肺傳為鬲消金匱厥隂之為病消渇氣上衝心心中疼熱饑而不欲食食即吐蚘下之不肯止此症不可誤認蚘厥病源夫消渇者渇不止小便多是也其病變多發癰疽此坐熱氣留於經絡血氣壅澁故成癰膿内消病者不渇而小便多是也利多不得潤養五臟臟衰則生諸病由腎盛之時恣意快情致使虚耗故不渇而小便多也強中病者莖長興盛不痿精液自出由少服五石熱住於腎中下焦虚少壯之時血氣尚豐能制於五石及至年衰血氣減少腎虚不復能制津液若精液竭則諸病生矣消症方文蛤散金匱渇欲飲水不止者主之傷寒論治心煩肉上粟起意欲飲水反不渇者文蛤五兩上一味杵為散以沸湯五合和服方寸七欲飲而不渇乃胸中有水而口燥也消渇方千金栝蔞根生薑麥冬蘆根切各二升茅根切三升右五味㕮咀以水一斗煮取三升分三服此清胃之主方茯神湯千金洩熱止渇治胃腑實熱引飲常渇者茯神二兩栝蔞根五兩生麥冬五兩萎蕤四兩知母四兩生地黄六兩小麥二升大棗二十枚淡竹葉切三升右九味以水三斗煮小麥竹葉取九升去渣下藥煮取四升分四服不問早晩但渇即進通治渇患熱者黄連圓治渇方千金黄連一斤生地黄一斤右二味絞地黄汁浸黄連出曝燥復内汁中令汁盡亁搗末蜜丸桐子大服二十丸日三食前後無拘亦可為散酒服方寸七此治胃中有伏火之方製法神妙本事方用冬𤓰汁収入黄連内為丸即以冬𤓰汁煎大麥仁湯下亦仿此義則知多吃冬𤓰亦妙也桑根湯千金翼主日飲一石水方桑根白皮切五升入地三尺者良炙令黄黒右一味水煮以味濃為度適寒温任性飲戒食鹽神效散本事方治渇疾飲水不止白浮石蛤粉蟬脫各等分右細末用鯽魚胆七個調三錢服不拘時候神效猪腎薺苨湯千金強中之病莖長興盛不交精液自出消渇之後即作癰疽皆由石熱凡如此等宜服猪腎一只大豆一升薺苨三兩人參石膏各三兩茯神磁石綿裹知母葛根黄芩甘草栝蔞根各二兩右十二味㕮咀以水一斗五升先煮猪腎大豆取一斗去渣下藥煮取三升分三服渇即飲之下焦熱者夜輒合一劑病勢漸歇即止此乃腎熱之症因藥毒所發與胃熱之消渇各殊腎氣丸見通治白虎人參湯見暘門栝蔞瞿麥圓方見淋閉療唇口亁裂方見虚勞蘭臺軌範卷二
