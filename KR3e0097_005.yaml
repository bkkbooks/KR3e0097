body:
  text: 蘭臺軌範卷五吳江徐大椿撰喘素問經脈别論夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌仆喘出於腎與骨當是之時勇者氣行則已怯者則著而為病也陽明脈解篇陽明厥則喘而惋惋則惡人帝曰或喘而死或喘而生者何也岐伯曰厥逆連臟則死連經則生脈要精微論肝脈摶堅而長因血在脅下令人喘逆逆調論腎者水臟主津液主卧與喘也此句又為喘之總訣生氣通天論因於暑汗煩則喘喝靜則多言隂陽别論隂爭於內陽擾於外魄汗未藏四逆而起起則熏肺使人喘鳴水熱穴論水病者下為胕腫大腹上為喘呼不得卧者標本俱病故肺為喘呼腎為水腫肺為逆不得卧金匱上氣面浮腫肩息其脈浮大不治又加痢尤甚喘方麥冬湯金匱火逆上氣咽喉不利止逆下氣此主之麥冬七升半夏一升人參甘草各二兩粳米三合大棗十二枚右六味以水一斗二升煮取六升溫服一升日三夜一服此即竹葉石膏湯去竹葉石膏加大棗也專清肺胃之火若火逆甚仍用竹葉石膏為妙桂枝加厚朴杏子湯傷寒論喘家主之於桂枝湯方內加厚朴二兩杏仁五十個去皮尖餘依前法麻黃杏仁甘草石膏湯傷寒論發汗後不可更行桂枝湯汗出而喘無大熱者此湯主之麻黃四兩去節杏仁五十個去皮尖甘草二兩炙石膏半斤碎綿裹右四味以水七升先煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升即越婢湯加杏仁去薑棗定喘湯振生方治肺寒膈熱哮喘麻黃欵冬花半夏桑皮各三錢蘇子二錢杏仁一錢五分白果二十一枚碎炒黃芩甘草各一錢右以水煎徐徐服皺肺丸治喘欵冬花知母秦艽百部去心紫苑貝母阿膠糯米炒各一兩杏仁另研四兩右為末將羊肺一具先以水灌洗看容得水多少即更添些煮杏仁令沸濾過灌入肺中繫定以糯米泔煮熟研爛成膏搜和前藥末杵數千下丸梧子大每服五十丸食前桑白皮煎湯下清燥救肺湯治膹鬱喘嘔桑葉三錢經霜者石膏二錢半炒甘草一錢胡麻仁一錢炒研阿膠八分人參七分麥冬一錢二分杏仁七分去皮尖炒黃枇杷葉一片去毛蜜炙右九味以水一碗煎六分頻頻二三次滚熱服小青龍加石膏湯越婢加半夏湯俱見咳嗽按此二方為喘病之主方其餘衆方意不能外此即有他法必有别因當隨症增減也麻黃湯見傷寒資生腎氣丸㵼白散錢乙黑錫丸俱見通治按黑錫丸鎮納元氣為治喘必備之藥當蓄在平時非一時所能驟合也臌脹水腫靈素靈脹論黃帝問曰願聞脹之舍岐伯曰夫脹者皆在於臟腑之外四字總括明透排臟腑而廓胸脅脹皮膚故命曰脹帝曰未解其意岐伯曰夫胸腹臟腑之郭也膻中者心主之宫城也胃者太倉也咽喉小腸者傳送也胃之五竅者閭里門户也亷泉玉英者津液之道也故五臟六腑者各有畔界其病各有形狀營氣循脈衛氣逆為脈脹衛氣並脈循分為膚脹水脹篇黃帝問於岐伯曰水與膚脹臌脹腸覃石瘕石水何以别之岐伯答曰水始起也目窠上微腫如新卧起之狀其頸脈動時咳隂股間寒足脛瘇腹乃大其水已成矣以手按其腹隨手而起如褁水之狀此其候也黃帝曰膚脹何以候之岐伯曰膚脹者寒氣客於皮膚之間􅠻􅠻然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也臌脹何如岐伯曰腹脹身皆大大與膚脹等也色蒼黃腹筋起此其候也腸覃何如岐伯曰寒氣客於腸外與衛氣相摶氣不得榮因有所繫癖而內著惡氣乃起瘜肉內生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也石瘕何如岐伯曰石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當㵼不㵼衃則留止日以益大狀如懷子月事不以時下皆生於女子可導而下隂陽别論云隂陽結邪多隂少陽曰石水少腹腫邪氣臟腑病形篇督脈微大為石水起臍已下至小腹睡睡然上至胃腕死不治水為有形之物故按之即起膚脹為無形之氣故按之不起腸覃乃腸外惡氣所結故月事仍下石瘕乃胞中惡血所凝故月事不行各有定理也至石水則在少腹之中水結不散之症若臌脹則非氣非水臟腑皮肉俱堅腫邪盛正衰難為治矣素腹中論黃帝問曰有病心腹滿旦食則不暮食此為何病岐伯對曰名為臌脹帝曰治之奈何岐伯曰治之以雞矢醴一劑知二劑已水熱穴論黃帝問曰少隂何以主腎腎何以主水岐伯對曰腎者至隂也至隂者盛水也肺者太隂也少隂者冬脈也故其本在腎其末在肺皆聚水也腎者胃之關也關門不利故聚水而從其類也故凡水病下為胕腫大腹上為喘呼不得卧者標本俱病氣厥論肺移寒於腎為涌水涌水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊褁漿水之病也隂陽應象大論濁氣在上則生䐜脹金匱師曰病有風水有皮水有正水有石水有黃汗風水其脈自浮外證骨節疼痛惡風皮水其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰膿脈浮而洪浮則為風洪則為氣風氣相摶風強為􅂒疹身體為癢癢為泄風久為痂癩氣強則為水難以俯仰風氣相擊身體洪腫汗出乃愈惡風則虛此為風水不惡風者小便通利上焦有寒其口多涎此為黃汗寸口脈沉滑者中有水氣面目腫大有熱名曰風水視人之目褁上微擁如蠶新卧起狀其頸脈動時時咳按其手足上陷而不起者風水太陽病脈浮而緊法當骨節疼痛反不疼身體反重而酸其人不渴汗出即愈此為風水惡寒者此為極虛發汗得之渴而不惡寒者此為皮水身腫而冷狀如周痺胸中窒不能食反聚痛暮躁不得眠此為黃汗痛在骨節咳而喘不渴者此為肺脹其狀如腫發汗即愈然諸病此者渴而下利小便數者皆不可發汗裏水者一身面目黃腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴也越婢加白术湯主之少隂脈緊而沉緊則為痛沉則為水小便即難脈得諸沉當責有水身體腫重水病脈出者死夫水病人目下有卧蠶靣目鮮澤脈伏其人消渴病水腹大小便不利其脈沉絶者有水可下之問曰病下痢後渴飲水小便不利腹滿因腫者何也答曰此法當病水若小便自利及汗出者自當愈心水者其身重而少氣不得卧煩而躁其人隂腫肝水者其腹大不能自轉側脅下腹痛時時津液微生小便續通肺水者其身腫小便難時時鴨溏脾水者其腹大四肢苦重津液不生但苦少氣小便難腎水者其腹大臍腫腰痛不得溺隂下濕如牛鼻上汗其足逆冷面反瘦師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈師曰寸口脈沉而遲沉則為水遲則為寒寒水相摶趺陽脈伏水榖不化脾氣衰則鶩溏胃氣衰則身腫少陽脈卑少隂脈細男子則小便不利婦人則經水不通經為血血不利則為水名血分師曰寸口脈遲而澀遲則為寒澀為血不足趺陽脈微而遲微則為氣遲則為寒寒氣不足則手足逆冷手足逆冷則榮衛不利榮衛不利則腹滿脅鳴相逐氣轉膀胱榮衛俱勞陽氣不通即身冷隂氣不通即骨疼陽前通則惡寒隂前通則痺不仁隂陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺溺名曰氣分氣分非水病但此病無所附因血分而類及之也然金匱云氣分心下堅大如盤水飲所作則氣分似為水在氣中之病病源水分候水分者言腎氣虛弱不能制水令水氣分散流布四肢故云水分但四肢皮膚虛腫聶聶而動者名水分也燥水候燥水謂水氣溢於皮膚因令腫滿以指畫肉上則隱隱成文字者名曰燥水也水腫之病千頭萬緒雖在形體而實內連臟腑不但難愈即愈最易復病復即更難再愈所以內經針水病之穴多至百外而調養亦須百日反不若臌脹之症一愈可以不發治此症者非醫者能審定病症神而明之病者能隨時省察潛心調攝鮮有獲全者臌脹水腫方此卷載水腫之方最備但病情不同各有所宜當細辨之雞矢醴方素問治心腹滿旦食不暮食羯雞矢八合研炒焦無灰酒三碗右共煎乾至一半許用布濾取汁五更熱飲則腹鳴辰巳時行二三次皆黑水也次日覺足面漸有皺紋又飲一次則漸皺至膝上而病愈矣防己茯苓湯金匱皮水為病四肢腫水氣在皮膚中四肢聶聶動者主之防己黃茋桂枝各三兩甘草二兩茯苓六兩右五味以水六升煮取二升分溫三服甘草麻黃湯金匱裏水主之甘草二兩麻黃四兩右二味以水五升先煮麻黃去上沫內甘草煮取三升溫服一升重覆汗出不汗再服慎風寒麻黃附子湯金匱水之為病其脈沉小屬少隂浮者為風無水虛脹者為氣水發其汗即已脈沉者宜麻黃附子湯浮者宜杏子湯金匱注云杏子湯未見恐是麻黃杏仁甘草石膏湯麻黃三兩甘草二兩附子一枚泡右三味以水七升先煮麻黃去上沫內諸藥煮取二升半溫服八分日三服發汗為治水要訣此乃發腎水之汗也桂枝去芍藥加麻黃細辛附子湯金匱氣分心下堅大如盤邊如旋杯水飲所作此方主之桂枝生薑各三兩甘草二兩大棗十二枚麻黃細辛各二兩附子一枚泡右七味以水七升先煮麻黃去上沫內諸藥煮取二升分溫三服當汗出如蟲行皮中即愈枳术湯金匱心下堅大如盤邊如旋盤水飲所作此方主之枳實七枚白术二兩右二味以水五升煮取三升分溫三服腹中耎即散蒲灰散金匱治小便不利蒲灰七分滑石三分右二味杵為散飲服方寸七日三服已椒藶黃圓金匱腹滿口舌乾燥此腸間有水氣此主之防己椒目葶藶熬大黃各一兩右四味末之蜜丸如桐子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩此治腸間之水外症不必有水象也牡蠣澤㵼散傷寒論大病差後從腰以下有水氣者主之牡蠣熬澤㵼栝蔞根蜀漆洗去腥葶藶熬商陸根熬海藻洗去鹹各等分右七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服日三大腹水腫方千金治氣息不通命在旦夕者牛黃二分椒目三分昆布海藻牽牛子桂心各八分葶藶六分右七味為末别搗葶藶如膏合和丸如桐子飲服十丸日二稍加小便利為度貞觀九年漢陽王患水醫所不治余處此方日夜尿一二斗五六日即瘥麻豆湯千金翼治遍身腫小便澀者麻黃二升熬研烏豆一斗以水四斗煮取汁一斗桑根白皮切五升右三味以豆汁內藥煮取六升一服一升日二服三日令盡豆不多不能取效十水丸千金翼第一之水先從面目腫遍一身名曰青水其根在肝大戟主之第二之水先從心腫名曰赤水其根在心葶藶主之第三之水先從腹腫名曰黃水其根在脾甘遂主之第四之水先從腳腫上氣而咳名曰白水其根在肺藁本主之第五之水先從足趺腫名曰黑水其根在腎連翹主之第六之水先從面至足腫名曰元水其根在膽芫花主之第七之水先從四肢起腹滿大身盡腫名曰風水其根在胃澤漆主之第八之水先四肢小腫其腹獨大名曰石水其根在膀胱桑根白皮主之第九之水先從小腸滿名曰暴水其根在小腸巴豆主之第十之水乍盛乍虛乍來乍去名曰氣水其根在大腸赤小豆主之右十病藥皆等分與病狀同者則倍之白蜜和先食服一丸如小豆日三欲下病者服三丸弱者當以意節之十水之名病源亦詳載其狀今立此十方想當時本有此分别也姑存之舟車神祐方河間治水腫水脹形氣俱實者黑牽牛四兩大黃二兩酒浸甘遂一兩麵褁煨橘紅大戟麵褁煨芫花醋炒青皮炒各一兩木香五錢檳榔五錢輕粉一錢右為末水丸每服五分五更滚水下大便利三次為度若一二次不通利次日漸加至一錢若服後大便利四五次或形氣不支則減其服三分二分俱可或隔一二三日服一次以愈為度甚者忌鹽醬百日大聖濬川丸類方大黃牽牛郁李仁各一兩木香芒硝各三錢甘遂半錢右為末蜜丸桐子大諒人虛實服之此下水之峻劑木香散類方治單腹脹木香青皮白术薑黃豆蔲各半兩阿魏蓽澄茄各一兩右為末醋丸如豆大每服二十丸薑湯送下葶藶丸外臺治水腫及腳並虛腫葶藶子半兩牽牛子半兩生熟各半澤漆葉海藻洗去鹽炙昆布如上炙桑根白皮炙甘遂熬椒目郁李仁各三分桂心一分右為末蜜丸桐子大一服十五丸日再加至二十丸療水病洪腫氣脹不消食方外臺香薷內釡中以水淹之出香薷上數寸煮濃汁去滓煎令可丸桐子大服五丸日三小便多為度又一丸法療患氣兼水身面腫垂死方外臺桑白皮茯苓郁李仁各四兩橘皮二兩海藻三兩洗赤小豆一升右六味以水八升煮二升半分三服五香散局方升降諸氣宣利三焦疏導壅滯發散邪熱治隂陽之氣鬱結不消諸熱藴毒腫痛結核中脘不快心腹脹滿木香丁香沉香乳香藿香等分右為粗末每服三錢水一盞半煎八分去滓食後溫服此方治氣分亦宜五皮散局方治風濕客於脾經氣血凝滯以致面目虛浮四肢腫滿心腹膨脹上氣促急兼治皮水妊娠胎水五加皮地骨皮生薑皮大腹皮茯苓等分右五味每三錢水煎熱服一方加白术磨沉香木香治蠱脹方雜抄方大麥粉五錢敷藥類方治腹滿堅硬如石隂囊腫大先用甘草嚼後用此大戟芫花甘遂海藻各等分右為末用醋調麵和覆貼腫處仍以軟綿褁住沉香琥珀丸治水腫一切急難症小便不通琥珀杏仁紫蘇赤茯苓澤㵼各五錢葶藶郁李仁去皮尖沉香各一兩半陳皮防己各七錢半右為末蜜丸如梧子大以麝香為衣每服二十五丸加至五十丸空心人參湯送下量虛實加減之調榮飲治瘀血流滯血化為水四肢浮腫皮血赤紋名血分蓬术川芎當歸元胡索檳榔陳皮赤芍桑皮炒大腹皮赤茯苓葶藶瞿麥各一錢大黃一錢五分細辛官桂甘草炙各五分右以薑棗水煎服血分之病金匱有病無方此為至當烏鯉魚湯類方治水氣四肢浮腫烏鯉魚赤小豆桑皮白术陳皮各三錢蔥白五根右以水三碗同煮不可入鹽先吃魚後服藥不拘時小胃丹丹溪芫花醋炒過一宿瓦器內不住手攪炒令黑不可焦一兩半甘遂麵褁長流水浸半月煮晒乾一兩半大黃紙褁煨勿令焦焙乾切以酒浸炒熟焙乾一兩半大戟長流水煮一時再用水洗晒乾五錢黃柏三兩炒右為末以白术膏丸如蘿蔔子大臨卧津液吞下或白湯下取膈上濕痰熱積以意消息之欲痢空心服一方加木香檳榔各半兩此即十棗湯加大黃黃柏煨腎散治腎家水腫甘遂三錢獖豬腰子一個右細批破少鹽椒淹透摻藥末上荷葉包褁煨燒熟溫酒嚼服之禹餘糧丸治十種水氣腳膝腫上氣喘滿小便不利但是水氣悉皆治之許學士及丹溪皆云此治膨脹之要藥即釙砂丸又名蛇含石丸蛇含石大者三兩以新鐵銚盛入炭火中燒石與銚子一般紅用鉗取蛇黃傾入醋中候冷研極細末聽用禹餘糧三兩真針砂五兩以水淘淨炒乾入餘糧一處用米醋二升就銚內煮醋乾為度後用銚并藥入炭火中燒紅鉗出傾藥淨磚地上候冷研細以三物為主其次量人虛實入下項治水多是取轉惟此三物既非大戟甘遂芫花之比又有下項藥扶持故虛人老人亦可用羌活木香茯苓川芎牛膝桂心白豆蔲大茴香蓬术附子乾薑青皮三稜白蒺藜當歸各半兩酒浸一宿右為末入前藥拌勻以湯浸蒸餅捩去水和藥再杵為丸梧子大食前溫酒白湯任下三十丸至五十丸最忌鹽一毫不可入口否則發疾愈甚但試服藥即於小便內旋去不動臟腑病日三服兼以溫和調補氣血藥助之真神方也此方兼治有形之積塊越婢湯金匱越婢加术湯方見風門五苓散見通治甘草乾薑茯苓白术湯金匱即腎著湯見腰痛十棗湯見痰飲防己黃茋湯金匱見濕門肺痿附肺癰金匱問曰熱在上焦者因咳為肺痿肺痿之病從何得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下痢重亡津液故得之曰寸口脈數其人嗽口中反有濁唾涎沫者何師曰為肺痿之病若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿數實者為肺癰問曰病咳逆脈之何以知此為肺癰當有膿血吐之則死其脈何類師曰寸口脈微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴多唾濁沫時時振寒熱之所過血為之凝滯畜結癰膿吐如米粥始萌可救膿成則死肺癰之疾膿成亦有愈者全在用藥變化漢時治法或未全耳上氣面浮腫肩息其脈浮大不治又加痢尤甚上氣喘而躁者屬肺脹欲作風水發汗則愈肺痿方甘草乾薑湯金匱肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾甘草乾薑湯以溫之若服湯已渴者屬消渴甘草四兩炙乾薑二兩泡右二味以水三升煮取一升五合去滓分溫再服此乃治肺冷之方非肺痿通用之方也不得誤用桂枝去芍藥加皂莢湯千金治肺痿吐涎沫桂枝生薑各三兩甘草二兩炙棗十五枚皂莢一枚去皮子炙焦右五味以水七升煮取三升分三服肺症生薑不可輕用韋莖湯千金治咳有微熱煩滿胸中甲錯是為肺癰韋莖二升薏苡仁半升桃仁五十枚瓜瓣半升右四味以水一斗煮韋莖得五升去滓內諸藥煮取二升服一升再服當吐如膿此方最穩桔梗白散外臺治咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗貝母各三分巴豆一分去皮熬令如脂右三味為散強人飲服半錢七羸者減之病在上膈者吐膿血膈下者㵼出若下多不止飲冷水一杯則定肺痿全屬內症肺癰乃係外科輕者煎藥可愈重者膿血已聚必得清火消毒提膿保肺等藥方能挽回否則不治所以金匱云始萌可救膿成則死也甘草湯治肺痿見傷寒炙甘草湯見通治葶藶大棗㵼肺湯方見痰飲十味丸方見咳嗽諸血靈素靈玉版篇嘔血胸滿引背脈小而疾是逆也衄而不止脈大是逆也熱病篇咳而衄汗不出出不至足者死血枯素腹中論帝曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先吐血四肢清目眩時時前後血病名為何何以得之岐伯曰病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事少不來也溺血素氣厥論胞移熱於膀胱則癃溺血痿論悲哀大甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血金匱夫吐血咳逆上氣其脈數而有熱不得卧者死夫酒客咳者必至吐血此因極飲過度所致也師曰尺脈浮目睛暈黃衄未止暈黃去目睛慧了知衄今止又曰從春至夏衄者太陽從秋至冬衄者陽明衄家不可汗汗出必額上陷脈緊急直視不能眴不得眠病人面無血色無寒熱脈沉弦者衄浮弱手按之絶者下血煩咳者必吐血亡血不可發其表汗出即寒栗而振瘀血病人胸滿唇痿舌青口燥但欲潄水不欲咽無寒熱脈微大來遲腹不滿其人言我滿為有瘀血病者如熱狀煩滿口乾燥而渴其脈反無熱此為隂伏是瘀血也當下之病源吐血有三種一曰內衄二曰肺疽三曰傷胃內衄者出血如鼻衄但不從鼻孔出是近心肺間津出還流入胃內出如豆汁或如衄血凝停胃裏因即滿悶便吐或去數升乃至一斛是也肺疽者言飲酒之後毒滿便吐吐已後有一合二合或半升一升是也傷胃者是飲食大飽之後胃內冷不能消化則便煩悶強嘔吐之所食之物與氣共上衝蹙因傷損胃口便吐血色鮮正赤是也此三種皆是吐血與咳血迥别凡吐血之後體恆㤿㤿然心裏煩躁悶亂紛紛顛倒不安寸口脈微而弱血氣俱虛則吐血關上脈微而芤亦吐血脈細沉者生喘咳上氣浮大者死久不瘥面色黃黑無復血氣時寒時熱此三者乃吐血症若嗽血屬肺又是一症多難治舌血心臟有熱則舌上出血九竅出血榮衛大虛腑臟傷損血脈流散脈數不得卧者死汗血肝藏血心之液為汗肝心俱傷於邪則汗血外臺便血先血後便為逺血先便後血為近血諸血方血枯方素問以四烏鰂骨一藘茹二物并合之丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中及傷肝也後飯先藥後飯也烏鰂即烏賊治女子赤白漏下令人有子藘茹即茜草能益精通經雀卵即麻雀卵補精血治隂痿鮑魚即淡乾魚石首為勝能通血脈益隂氣柏葉湯金匱治吐血不止柏葉乾薑各三兩艾三把右三味以水五升取馬通汁一升合煮取一升分溫再服㵼心湯金匱治心氣不足吐血衄血此湯主之大黃二兩黃連黃芩各一兩右三味以水三升煮取一升頓服之滋血潤腸湯統旨治血枯及死血在膈飲食不下大便燥當歸三錢白芍煨生地各一錢半紅花桃仁炒大黃酒煨枳殼各一錢韭汁酒半盞右八味以水一鍾半煎七分食前服治吐血百治不瘥療十十差神驗不傳方千金地黃汁半斤大黃生末一方寸七右二味煎地黃汁三沸內大黃末調和空腹服之日三即差用大黃極少不過引生地下逹耳犀角地黃湯千金治傷寒及溫病應發汗而不汗之內蓄血者及鼻衄吐血不盡內餘瘀血大便黑面黃消瘀血犀角一兩生地黃八兩芍藥三兩丹皮二兩右四味㕮咀以水九升煮取三升分三服喜妄如狂者加大黃二兩黃芩三兩其人脈大來遲腹不滿自言滿者為無熱但依方二味不必加犀角地黃湯主脈浮客脈芤相合血積胸中熱之甚血在上焦此湯主之犀角大黃各一錢黃芩三錢黃連二錢生地四錢右五味水煎食後服四生丸類方治吐血衄血血熱妄行生荷葉生艾葉側柏葉生地等分右搗爛丸如雞子大每服一丸水煎去滓服以丸煎湯亦一法白芨枇杷丸戴氏治咯血白芨一兩枇杷葉去毛蜜炙藕節各五錢右為細末另以阿膠五錢蛤粉炒用生地汁調之火上頓化入前藥為丸如龍眼大每服一丸此治肺血之方枇杷藕節只宜作湯為丸非法皮膚血汗方聖濟郁李仁去皮研一錢以鵝梨搗汁調下汗血方經驗方用人中白新瓦焙乾入麝香少許溫酒調服立效諸竅出血方聖惠方頭髮敗稯陳蓮蓬並燒灰等分右三味每服三錢木香湯下療舌上出血如孔鑽者千金煎香薷飲汁服療舌血不止千金用槐花炒為末糝上蒲黃炭亦可糝紫霜丸治舌上出血竅如針孔紫金砂即露蜂房頂上實處研一兩蘆薈三錢貝母四錢右為細末蜜丸櫻桃大每服一丸煎化服吐血衄血用溫酒化服療齒齗血出外臺竹茹四兩醋浸一宿含之療酒醉牙齒涌血外臺燒釘赤炷血孔中即止此烙法也雄黃麝香散治牙齗腫爛出血雄黃血竭白礬枯各一錢半麝香一字銅緑輕粉黃連黃丹炒各一錢右共為末研勻敷患處治牙縫出血類方以紙絍子蘸乾蟾酥少許於血處按之立止黃連散治齒縫間出血吃食不得黃連白龍骨牙硝各一兩白礬一分龍腦一錢右為細末每用少許敷牙根上療滿口齒血出枸杞子為末煎湯潄之然後吞下立止根亦可一方用子汁含滿口更後吃治牙宣方用棉花核煆灰擦療鼻瀝血三升氣欲絶方千金龍骨末一棗核許微以氣吹入鼻中即斷更出者更吹之茅花湯活人書治鼻衄茅花每服三錢煎服不拘時地黃散元戎治鼻衄久不愈生地熟地地骨皮枸杞子右等分焙乾為末蜜湯調下療淋血方外臺苧麻根十枚水五升煮取二升服神驗療小便出血方外臺龍骨末二方寸匕酒一升服之日三瞿麥散竒效方治血淋尿血瞿麥穗赤芍車前子白茅根赤茯苓桑白皮石韋去毛生乾地黃阿膠炒滑石黃芩甘草炙各二錢右為細末每服二錢入血餘燒灰二錢調服神效方治血淋海螵蛸生乾地黃赤茯苓等分右為細末每服一錢用柏葉車前子煎湯下髮灰散治血淋小便出血如尿用亂髮燒灰入麝香少許每服一錢用米醋溫湯調下玉屑散治尿血并五淋砂石疼痛不可忍受者黃茋人參等分右為末用蘿蔔大者切一指厚三指大四五片蜜奄少時蘸蜜炙乾復蘸復炙盡蜜二兩為度勿令焦至熟蘸黃茋人參末吃不以時仍以鹽湯送下製法竒鹿角膠丸濟生治房勞傷小便尿血鹿角膠半兩沒藥另研油頭髮繩各三錢右為末茅根汁打麵糊丸桐子大每服五十丸鹽湯下黃土湯金匱治下血先便後血此近血也甘草乾地黃白术附子泡阿膠黃芩各三兩灶中黃土半斤右七味以水八升煮取三升分溫三服赤小豆當歸散金匱治下血先血後便此逺血也赤豆三升浸令芽出晒乾當歸三兩右二味杵散漿水服方寸七日三服牛角䚡灰散外臺治卒下血黃牛角䚡一具燒赤色為細末煮豉汁和二錢服重者日三豬臟丸治大人小兒大便下血日久多食易飢腹不痛裏不急先用海螵蛸炙黃去皮白者為末木賊草煎湯調下三日後效後用黃連二兩嫩豬臟二尺去肥右以黃連塞滿豬臟扎兩頭煮十分爛研細添糕糊丸梧子大每服三五十丸食前米飲送下此方治婦人血崩亦良又豬臟丸治痔漏下血豬臟一條洗淨揑乾槐花炒為末填入臟內兩頭扎定石器內米醋煮爛右搗和丸如梧子大每服五十丸食前當歸湯下抵當湯抵當丸俱治瘀血桃核承氣湯治熱結膀胱小腸急結者以上三方俱見傷寒大黃􅟟蟲丸百花煎人參蛤蚧散以上三方俱見虛勞瓊玉膏龍腦雞蘇丸千金地黃湯治亡血脫血鼻唇色白無力者方以上四方俱見通治噎膈嘔吐附關格靈素靈結根篇太隂為開厥隂為闔少隂為樞故開折則倉廪無所輸膈洞膈洞者取之太隂視有餘不足上膈篇黃帝曰氣為上膈者食飲入而還出余已知之矣蠱為下膈下膈名蠱似屬蟲為患當以治蟲之法治之下膈者食晬時乃出余未得其意願卒聞之岐伯曰喜怒不適食飲不節寒溫不時則寒汁流於腸中流於腸中則蟲寒蟲寒則積聚守於下管則腸胃充郭衛氣不營邪氣居之人食則蟲上食蟲上食則下管虛下管虛則邪氣勝之積聚已留留則癰成癰成則下管約其癰在管內者即而痛深其癰在外者則癰外而痛浮癰上皮熱五味篇苦走骨多食之令人變嘔苦入於胃五榖之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔四時氣篇善嘔嘔有苦長太息心中憺憺恐人將捕之邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔經脈篇足太隂病舌本強食則嘔胃脘痛腹脹善噫足厥隂所生病者胸滿嘔逆素隂陽别論一陽發病少氣善咳善泄其傳為膈三陽結謂之膈至真要大論諸嘔吐皆屬於熱關格六節臟象論人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽寸口一盛病在厥隂二盛病在少隂三盛病在太隂四盛以上為格隂人迎與寸口俱盛四格以上為關格關格之脈贏不能極於天地之精氣則死矣此指關格之脈非病名也金匱嘔家有癰膿不可治嘔膿盡自愈先嘔却渴者此為欲解先渴却嘔者為水停心下此屬飲家嘔家本渴今反不渴者以心下有支飲故也問曰病人脈數數為熱當消榖引食而反嘔者何也師曰以發其汗令陽微膈氣虛脈乃數數為客熱不能消榖胃中虛故也趺陽脈浮而澀浮則為虛虛則傷脾脾傷則不磨朝食暮吐暮食朝吐宿榖不化名曰胃反脈緊而澀其病難治病人欲吐者不可下之嘔而脈弱小便復利身有微熱見厥者難治傷寒論脈上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗可治有汗者死寸口脈浮而大浮則虛大為實在尺為關在寸為格關則不得小便格則吐逆趺陽脈伏而澀伏則吐逆水榖不化澀則食不得入名曰關格此乃關格之病按關格之症內經傷寒論所指不同內經所云是不治之症傷寒論所云則卒暴之疾當於通便止嘔方法隨宜施治可也千金走哺下焦熱氣逆不續嘔吐不禁外臺五噎夫五噎謂一曰氣噎二曰憂噎三曰食噎四曰勞噎五曰思噎雖有五名皆由隂陽不和三焦隔絶津液不行憂恚嗔怒所生謂之五噎噎者噎塞不通也氣噎隂陽不和寒氣填於胸膈故氣噎不通令人喘悸胸背痛也卒食噎由臟冷而不理津液少而不能傳行飲食也噎膈嘔吐方茱茰湯金匱嘔而胸滿者此湯主之乾嘔吐涎沫頭痛此亦主之茱茰一升人參三兩生薑六兩大棗十二枚右四味以水五升煮取三升溫服七合日三服生薑㵼心湯傷寒論治胃中不和心下痞鞕乾噫食臭脅下有水氣腹中雷鳴下痢生薑四兩甘草炙人參黃芩各三兩半夏乾薑各一兩大棗十二枚右七味以水一斗煮取六升去渣煎取三升溫服一升日三服生薑乾薑同用取辛以開之半夏㵼心湯金匱嘔而腸鳴心下痞者此湯主之半夏半斤洗黃芩乾薑人參各三兩黃連一兩大棗十二枚甘草三兩炙右七味以水一斗煮取六升去滓再煎取三升溫服一升日三服黃芩加半夏生薑湯金匱乾嘔而痢者此湯主之黃芩三兩甘草炙芍藥各二兩半夏半斤生薑三兩大棗十二枚右六味以水一斗煮取三升去渣溫服一升日再夜一豬苓散金匱嘔吐而病在膈上後思水者解急與之思水者此湯主之豬苓茯苓白术各等分右三味杵為散飲服方寸七日三服傷飲惡飲此乃常理若胸中有水則津液下流反口乾思水但不能多飲耳大半夏湯金匱反胃嘔吐者此湯主之半夏三升洗完用人參三兩白蜜一升右三味以水一斗二升和蜜揚之二百四十遍煮藥取二升半溫服一升餘分再服其妙在用甘爛水大黃甘草湯金匱食已即吐者此湯主之大黃四兩甘草一兩右二味以水三升煮取一升分溫再服此治上焦之吐茯苓澤㵼湯金匱胃反吐而渴欲飲水者此湯主之茯苓半斤澤㵼四兩甘草三兩桂枝二兩白术三兩生薑四兩右六味以水一斗煮取三升內澤㵼再煮取二升半溫服八合日三服此治蓄飲之吐內澤㵼再煮似先煮五味後煮澤㵼文蛤湯金匱吐後渴飲得水而貪飲者此湯主之兼主微風脈緊頭痛文蛤五兩麻黃甘草生薑各三兩石膏五兩杏仁五十個大棗十二枚右七味以水六升煮取二升溫服一升汗出愈文蛤亦入煎劑生薑半夏湯金匱病人胸中似喘不喘似嘔不嘔似噦不噦心中憒憒然無奈者此湯主之半夏半斤生薑汁一斤右二味以水七升煮取二升內生薑汁煮取一升半小冷分四服日三夜一服止停後服此治寒飲之症內汁再煮似先煮半夏半夏乾薑散金匱乾嘔吐逆吐涎沫此主之半夏乾薑各等分右二味杵為散取方寸七漿水一升半煎取七合頓服之此治胃寒之吐葛根加半夏湯傷寒論太陽陽明合病不下痢但嘔者主之葛根四兩麻黃三兩去節湯泡去黃汁焙乾生薑三兩甘草二兩炙芍藥二兩桂枝二兩去皮大棗十二枚半夏半斤泡右八味以水一斗先煮葛根麻黃減二升去白沫內諸藥煮取三升去渣溫服一升覆取微似汗橘皮湯金匱乾嘔噦若手足厥者此湯主之橘皮四兩生薑半斤右二味以水七升煮取三升溫服一升下咽即愈此治胃氣不通之吐橘皮竹茹湯金匱噦逆者此湯主之橘皮二升竹茹二升大棗三十枚生薑半斤甘草五兩人參一兩右六味以水一斗煮取三升溫服一升日三服黃連湯傷寒論傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者主之黃連甘草炙乾薑桂枝去皮各三兩人參二兩半夏半斤大棗十二枚右七味以水一斗煮取六升去渣溫服一升日三夜一服邪氣寒氣也故寒熱並用昆布丸治五噎咽塞食飲不下昆布洗麥冬天冬訶梨勒木通大黃朴硝各一兩五錢郁李仁桂心百合各一兩羚羊角杏仁蘇子射干各半兩柴胡陳皮檳榔各二錢五分右藥蜜丸桐子大熱酒下每服三十丸不拘時關格不通方千金翼芒硝芍藥杏仁各四兩枳實一兩炙大黃半斤地黃二兩右藥以水七升煮取三升分三服千金理諸噎方常食乾粳米飯即不噎又方竒方炭末細羅丸如彈子大含少許細細咽津即下中風客熱噦方千金翼竹茹四兩生米五合右二味以水六升煮米熟服之嘔噦方千金翼蘆根五兩以水五升煮取三升分三服兼服小兒尿一二合良消榖丸千金翼主數年不能飲食小麥蘗七月七日麴各一升乾薑烏梅各四兩右四味搗篩為末煉蜜丸如桐子大空腹酒服十五丸日再稍加至三十丸其寒在胸中及反胃番心皆差卒噦千金翼男噦女人丁壯氣盛者噓其肺俞女子男子噓之廣濟檳榔散外臺療吐酸水每食則變作醋水吐出檳榔十六分人參六分茯苓八分橘皮六分蓽撥六分右五味搗篩為散平晨空腹生薑五六兩合皮搗絞取汁溫內散方寸匕攪調頓服之日一服漸加至一七半純薑汁服末藥斷難入口祗宜取薑汁一滴拌藥别飲送下為妥崔氏方外臺療食則吐或朝食夜吐名曰胃反或氣噎不飲食數年羸削唯飲水亦同此方半夏六兩人參六兩生薑一兩橘皮二兩牛涎一升舂杵頭粳一升綿褁厚朴二兩炙羚羊角三兩削右以水八升煮取三升分溫三服頻服深師治噎方外臺羚羊角前胡甘草人參橘皮各二兩右五味以水六升煮取三升分四服反胃方本事方驢水即驢小便日服二合後食微吐一半晡時又服二合人定時食粥吐出便定丁香柿蒂湯嚴氏治寒厄丁香柿蒂各二錢人參一錢生薑五片煎服治冷厄方刀頭子炙存性酒服錢許撞氣阿魏丸局方治五種噎疾九般心痛痃癖氣塊冷氣攻刺及脾胃停寒胸滿膨脹嘔吐酸水丈夫小腸氣痛婦人氣血等疾茴香炒香陳皮去白青皮川芎丁香皮蓬莪术泡甘草泡各一兩縮砂仁肉桂去粗皮各半兩生薑四兩鹽醃炒黑白芷泡半兩胡椒二錢半阿魏二錢半醋浸一宿以麩為丸右為末用阿魏丸雞頭大每藥丸一斤用硃砂七錢為衣丈夫氣痛炒鹽湯下一粒至二粒婦人血氣醋湯下常服一粒爛嚼茶酒任下此方純用通氣溫熱之藥有火者不宜服此卷所載方論種種各殊然皆係嘔吐反胃水飲蟲積等症非真膈病也膈病乃胃口枯稿之症百無一治論中雖有格脈格症而其形象俱未詳載必臨症多乃能識其真耳旋復代赭湯四逆湯小柴胡湯以上三方俱見傷寒小半夏湯方見痰飲竹葉石膏湯加生薑見通治泄㵼靈素靈論疾疹尺篇飱泄脈小者手足寒難已飱泄脈小手足溫泄易已玉版篇其腹大脹四末清脫形泄甚逆也諸病暴注下迫皆屬於熱素隂陽應象大論清氣在下則生飱泄春傷於風夏生飱泄濕勝則濡泄脈要精微論久風為飱泄平人氣象論泄而脫血難治玉機真臟論泄而脈大難治難經泄凡有五其名不同有胃泄有脾泄有大腸泄有小腸泄有大瘕泄名曰後重胃泄者飲食不化色黃脾泄者腹脹滿泄注食即嘔吐逆大腸泄者食已窘迫大便色白腸鳴切痛小腸泄者溲而便膿血少腹痛大瘕泄者裏急後重數至圊而不能便莖中痛此五泄之要法也泄㵼方溫脾湯本事方主治錮冷在腸胃間泄㵼腹痛宜先取去然後調治不可謂虛以養病也厚朴乾薑甘草桂心附子各二兩大黃四錢右六味㕮咀取一兩水二鍾煎六分頓服不可謂虛以養病此千古之要訣後人反是訶梨勒丸濟生治大腸虛冷泄㵼不止腹脅引痛飲食不化訶梨勒麵褁煨附子泡肉豆蔲麵褁煨木香吳茱茰炒龍骨生用白茯苓蓽撥等分右為末生薑汁煮麵糊丸如梧子大每服七十丸空心米飲下香茸丸治飲酒多遂成酒泄骨立不能食但再飲一二盞泄作幾年矣嫩鹿茸酥炙黃肉豆蔲煨各一兩生麝香另研一錢右為末陳米飯為丸如梧子大每服五十丸空心米飲下固腸丸得效治臟腑滑泄晝夜無度吳茱茰御粟殼黃連各等分右為末醋糊丸如桐子大每服三十丸空心米飲下附子理中丸局方治脾胃冷弱心腹疼痛嘔吐㵼痢霍亂轉筋體冷微汗手足厥冷心下逆冷滿悶腹中雷鳴飲食不進及一切沉寒痼冷並皆治之人參一兩附子泡一枚乾薑泡甘草炙各一兩白术土炒二兩右為末蜜丸每藥一兩作十丸每服一丸以水一盞化開煎至七分稍熱食前服四君子湯局方六君子湯歸脾湯平胃散補中益氣湯枳實丸消痞積止泄㵼㵼黃散五苓散四神丸藿香正氣散局方見以上十方通治四逆散治少隂泄㵼大承氣湯小承氣湯調胃承氣湯敗毒散葛根湯葛根黃芩黃連湯以上八方俱見傷寒厚朴七物湯方見腹痛門按泄㵼乃一時寒暖不調水榖不化或冒暑傷濕等症當擇清淡消散之品一二劑即愈今所集方內多脾胃虛寒久病之方隨症酌用可也蘭臺軌範卷五
