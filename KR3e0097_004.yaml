body:
  text: 蘭臺軌範卷四呉江徐大椿撰濕金匱太陽病關節疼痛而煩脈沉而細者此名濕痺濕痺之候小便不利大便反快但當利其小便濕家之為病一身盡疼發熱身色如熏黄也此黄與黄疸各别濕家其人但頭汗出背強欲得被覆向火若下之早則噦或胸滿小便不利舌上如胎者以丹田有熱胸上有寒渇欲得飲而不能飲則口燥煩也濕家下之額上汗出㣲喘小便利者死若下利不止者亦死風濕相摶一身盡疼痛法當汗出而解值天隂雨不止醫云此可發汗汗之病不愈者何也蓋發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但㣲㣲欲出汗者風濕俱去也濕家病身疼發熱面黄而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞内藥鼻中則愈内鼻之藥金匱未載俟廣求其法以補之亦不過牙皂𤓰蒂之類濕方麻黄加术湯金匱濕家身煩疼可與麻黄加术湯發其汗為宜慎不可以火攻之麻黄三兩去節桂枝二兩去皮甘草一兩炙杏仁七十個去皮尖白术四兩右五味以水九升先煮麻黄减二升去上沫内諸藥煮取二升半去滓温服八合覆取㣲似汗此濕家發汗之主方防己黄茋湯金匱風濕脈浮身重汗出惡風者此湯主之防己一兩甘草半兩炒白术七錢半黄茋一兩一分去蘆惡風黄茋主之右剉麻豆大毎抄五錢七生薑四片大棗一枚水盞半煎八分去滓温服良乆再服喘者加麻黄半兩胃中不和者加芍藥三分氣上衝者加桂枝三分下有陳寒者加細辛三分服後當如虫行皮中從腰下如氷後坐被上又以一被繞腰下温令㣲汗差麻黄杏仁薏苡甘草湯金匱病者一身盡疼發熱日晡所劇者名風濕此病傷於汗出當風或乆傷取冷所致也麻黄半兩去節湯泡甘草一兩炙薏苡仁半兩杏仁十個去皮尖炒右剉麻豆大毎服四錢水一盞半煮八分去滓温服有㣲汗避風桂枝附子湯金匱傷寒八九日風濕相摶身體疼煩不能自轉側不嘔不渇脈浮虚而濇者桂枝附子湯主之若大便堅小便自利者去桂加白术湯主之桂枝四兩去皮生薑三兩切附子三枚泡去皮破八片甘草二兩炙大棗十二枚擘右五味以水六升煮取二升去滓分温三服白术附子湯金匱白术二兩附子一枚半泡去皮甘草一兩炙生薑一兩半切大棗六枚右五味以水三升煮取一升去滓分温三服一服覺身痺半日許再服三服多盡其人如冒狀勿怪即是术附並走皮中逐水氣未得除故耳甘草附子湯金匱風濕相摶骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身㣲腫者此湯主之甘草二兩炙附子二枚泡去皮白术二兩桂枝四兩去皮右四味以水六升煮取三升去滓温服一升日三服初服得㣲汗則解能食汗出復煩者服五合恐一升多者服六七合為妙此風濕而兼寒者二玅散丹溪治筋骨疼痛因濕熱者如有氣加氣藥如血虚加血藥如痛甚以薑汁熱辣服之黄柏炒蒼术炒去皮右為末生薑研沸湯調服如表實氣實者少酒佐之在表之濕當散之在裏之濕當燥之諸方之義不外乎此黑地黄丸方見通治暍金匱太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已洒洒然毛聳手足逆冷小有勞身即熱口開前板齒燥若發其汗則惡寒甚加温針則發熱甚若下之則淋甚此中暍乃中時行之熱氣與卒然中暑病象如霍亂者不同當别之暍方白虎人參湯金匱太陽中熱者暍是也汗出惡寒身熱而渇此湯主之知母六兩石膏一斤碎甘草二兩粳米六合人參三兩右五味以水一斗煮米熟湯成去滓温服一升日三服熱入裏則外惡寒清裏熱則惡寒自解然亦須詳審有表無表方為精宻况凡屬汗出多之病無不惡寒者以其惡寒汗出而誤認為寒用大順散等熱劑則立危矣一物𤓰蒂湯金匱太陽中暍身熱疼重而脈㣲弱此以夏月傷冷水水行皮中所致也𤓰蒂二十個右剉以水一升煮取五合去滓頓服此方服之當吐香薷飲局方治暑熱乗凉飲冷陽氣為隂邪所遏頭痛發熱惡寒煩燥口渇腹滿吐㵼者香薷一斤厚朴薑汁炒白扁豆炒各半斤右水煎浸冷服此治時行暑病之主方其分兩則五錢至一兩止十味香薷飲即前方加人參甘草黄茋木𤓰陳皮白术茯苓黄連香薷飲即香薷飲加黄連四兩薑汁同炒黄色枇杷散局方治中暑伏熱煩渇引飲嘔逆惡心頭目眩暈枇杷葉陳皮丁香厚朴各五錢白茅根麥冬木𤓰甘草炙各一兩香茹七錢半右為末毎二錢薑三片煎湯調服温服亦可如煩燥井水調下小兒三歳以下服五分量大小加減蟬酥丸秘方茅术雄黄各一兩辰砂五錢麝香一錢丁香牙皂各三錢蟬酥五錢右用火酒化蟬酥打丸如鳯仙子大辰砂為衣放舌底化下重者二三丸千金丹秘方即人馬平安散麝香氷片各二錢硃砂五錢雄黄硼砂硝各一兩金箔一百張或加牛黄右七味為末或水服二三分或嗅少許於鼻内又刮􅂒法用薄錢醮香油刮胸背及臂股灣令色紫疹起為度或用婦人縛髮油繩醮油刮亦可紫金錠蘇合丸局方藿香正氣散局方生脈飲六一散以上俱見通治痎瘧素問瘧論黄帝問曰夫痎瘧皆生於風其畜作有時者何也岐伯曰瘧之始發也先起於毫毛伸欠乃作寒慄鼓頷腰脊俱痛寒去則内外皆熱頭痛如破渇欲冷飲帝曰何氣使然岐伯曰隂陽上下交爭虚實更作隂陽相移也陽并於隂則隂實而陽虚陽明虚則寒慄鼓頷也巨陽虚則腰背頭項痛三陽俱虚則隂氣勝隂氣勝則骨寒而痛寒生於内故中外皆寒陽盛則外熱隂虚則内熱外内皆熱則喘而渇故欲冷飲也此皆得之夏傷於暑熱氣盛藏於皮膚之内腸胃之外此營氣之所舍也此令人汗空疎腠理開因得秋氣汗出遇風及得之以浴水氣舍於皮膚之内與衛氣并居衛氣者晝日行於陽夜行於隂此氣得陽而外出得隂而内薄内外相薄是以日作帝曰其間日作者何也岐伯曰其氣之舍深内薄於隂陽氣獨發隂邪内著隂與陽爭不得出是以間日而作也帝曰其作日晏與日早者何氣使然岐伯曰邪氣客於風腑循膂而下衛氣一日一夜大㑹於風腑其明日日下一節故其作也晏此先客於脊背也毎至於風腑則腠理開腠理開則邪氣入邪氣入則病作以此日作稍稍益晏其出於風腑日下一節二十五日下至骶骨二十六日入於脊内注於伏膂之内其氣上行九日出於缺盆之中其氣日髙故作日益早其間日發者由邪氣内薄於五臟横連募原其道逺其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也帝曰夫子言衛氣毎至於風腑腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之發也不當風腑其日作者奈何岐伯曰此邪氣客於頭項循膂而下者也故虚實不同邪中異所則不得當其風腑也故邪中於頭項氣至頭項而病中於背氣至背而病中於腰脊氣至腰脊而病中於手足氣至手足而病衛氣之所在與邪氣相合則病作故風無常腑衛氣之所發必開其腠理邪氣之所合則其腑也帝曰善夫風之與瘧也相似同類而風獨常在瘧得有時而休者何也岐伯曰風氣留其處故常在瘧氣隨經絡沉以内薄故衛氣應乃作帝曰瘧先寒而後熱者何岐伯曰夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之水寒臟於腠理皮膚之中秋傷於風則病成矣夫寒者隂氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱病以時作名曰寒瘧帝曰先熱而後寒者何也岐伯曰此先傷於風而後傷於寒故先熱而後寒亦以時作名曰温瘧其但熱而不寒者隂氣先絶陽氣獨發則少氣煩寃手足熱而欲嘔名曰癉瘧内經之文亦論其理如此其實病變不同不可執一而論此等極多不獨論瘧為然故學者當以意㑹也岐伯曰瘧之且發也隂陽之且移也必從四末始也陽已傷隂從之故先其時堅束其處令邪氣不得入隂氣不得出審候見之在孫絡盛堅而血者皆取之此真往而未得并者也帝曰時有間二日或至數日發或渇或不渇其故何也岐伯曰其間日者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作也其以秋病者寒甚以冬病者寒不甚以春病者惡風以夏病者多汗瘧脈緩大虚便宜用藥不宜用鍼凡治瘧先發如食頃乃可以治過之則失時也諸瘧而脈不見刺十指間出血血去必已先視身之赤如小豆者盡取之瘧疾藥當在未來時前服刺瘧之法簡易可學不必習針法皆能之亦治瘧之要訣也風瘧素生氣通天論魄汗未盡形弱而氣爍穴腧以閉發為風瘧又云夏傷於暑秋為痎瘧二日一發者為痎瘧痎與㾬同似瘧素生真要大論帝曰火熱復惡寒發熱如有瘧狀或一日發或間數日發其故何也岐伯曰勝復之氣㑹合之時有多少也隂氣多而陽氣少則其發日逺陽氣多而隂氣少則其發日近此勝復相摶盛衰之節瘧亦同法瘧亦同法則非瘧可知金匱師曰瘧脈自弦弦數者多熱弦遲者多寒弦小𦂳者下之差弦遲者可温之弦𦂳者可發汗針灸也浮大者可吐之弦數者風發也以飲食消息止之但熱不寒者邪氣内藏於心外舍分肉之間令人消爍肌肉牡瘧瘧多寒者名曰牡瘧似當作牝字諸本皆作牡存考瘧方鼈甲煎圓金匱病瘧以月一日發當以十五日愈設不差當月盡解如其不差當云何師曰此結為癥瘕名曰瘧毋急治之宜此方鼈甲十一分炙烏扇三分燒黄芩三分柴胡六分鼠婦三分熬亁薑三分大黄三分芍藥五分桂枝三分葶藶一分熬石韋三分去毛厚朴三分牡丹五分去心瞿麥二分紫威三分半夏一分人參一分􅀢虫五分熬阿膠三分蜂窠四分炙赤消十二分蜣蜋六分熬桃仁二分右二十三味為末取鍜灶下灰一斗清酒一斛五斗浸灰候酒盡一半著鼈甲於中煮令泛爛如膠漆絞取汁内諸藥煎為丸如梧子大空心服七丸日三服白虎加桂枝湯金匱温瘧者其脈如平身無寒但熱骨節疼煩時吐此湯主之知母六兩甘草二兩炙石膏一斤粳米二合桂枝三兩去皮右剉毎五錢水一盞半盞至八分去滓温服汗出愈内經以先熱後寒為温瘧但熱不寒為癉瘧蜀漆散金匱瘧多寒者名曰牡瘧此湯主之牡宜作牝蜀漆洗去腥雲母燒二日夜龍骨等分右三味杵為散未發前以漿水服半錢七温瘧加蜀漆半分臨發時服一錢七柴胡去半夏加栝蔞湯金匱治瘧病發渇者亦治勞瘧柴胡八兩人參黄芩甘草各三兩栝蔞根四兩生薑二兩大棗十二枚右七味以水一斗二升煮取六升去滓煎取三升温服一升日二服柴胡桂薑湯金匱治瘧寒多㣲有熱或但寒不熱柴胡半斤桂枝三兩去皮亁薑二兩栝蔞根四兩黄芩三兩牡蠣二兩熬甘草二兩炙右七味以水一斗二升煮取六升去滓再煎取三升日三服初服㣲煩復服汗出便愈蜀漆丸千金主痎瘧連年不差服三七日定差方蜀漆知母白薇地骨皮麥門冬去心升麻各五分恒山一兩半石膏二兩研香豉一合萎蕤烏梅肉鼈甲各一兩炙甘草右十三味搗篩為末煉蜜和丸如桐子大空腹飲服十丸日再加至二三十丸此方治三日瘧為宜陵鯉湯千金主瘧疾江南瘴瘧方陵鯉甲四十枚炙烏賊魚骨附子泡各一兩去皮恒山三兩右五味㕮咀以酒三升漬一宿未發前稍稍啜之勿絶吐之并塗五心一日斷食過時乆乃食用生藥探吐法療瘧病醫不能救者方千金翼外治截瘧法以繩量病人脚圍繞足跟及五指一匝訖截斷繩取所量繩置項上著反向背上當繩頭處中脊骨上灸三十壯則定候看復惡寒急灸三十壯則定氏至過發一炊乆候之雖饑勿與食盡日此神騐男左足女右足療瘧常山湯外臺吐法常山三兩右一味切以漿水三升浸經一宿煎取一升欲發前頓服之後㣲吐差止忌生葱生菜牡蠣湯外臺治牡瘧牡蠣四兩麻黄四兩去節甘草二兩蜀漆二兩右四味以水八升先煮蜀漆麻黄去上沫得六升内諸藥煮取二升温服一升若吐則勿更服清脾湯濟生治熱多陽瘧青皮厚朴柴胡黄芩半夏甘草茯苓白术草果煨右九味加薑三片水煎服常山飲局方治痰瘧常山火酒炒知母貝母草果梹榔各一錢烏梅三個右六味加薑棗煎瘧未發時面東温服烏梅引子療温瘧勞瘧烏梅七個桃柳心各七莖葱白七莖豆䜴一合甘草四分柴胡四分知母四分大黄三分右八味各細剉以童子小便兩茶碗宿浸明旦早煎三二沸去滓頓服差未差更作服三服永差忌海藻菘菜集騐瘧必從四肢始療方先其時一日頃用細左索繩𦂳束其手足十指過發時乃解之此即内經之法四獸湯易簡治食瘧諸瘧和胃消痰半夏人參茯苓白术橘紅草果生薑烏梅大棗甘草各等分右以鹽少許淹食頃濕紙厚褁慢火煨香熱毎服四錢温服小柴胡湯見傷寒治瘧之法不外諸方惟三日瘧則煎劑不能取效宜病日用煎方以驅邪餘兩日用温補以扶元氣又加避風靜養則庶幾矣痢素問通評虚實論帝曰腸澼便血何如岐伯曰身熱則死寒則生帝曰腸澼下白沫何如岐伯曰脈沉則生脈浮則死帝曰腸澼下膿何如岐伯曰脈懸絶則死滑大則生帝曰腸澼之屬身不熱脈不懸絶何如岐伯曰滑大者曰生懸濇者曰死以臟期之氣厥論腎移熱於脾傳為虚腸澼死不可治大竒論腎脈小摶沉為腸澼下血血温身熱者死心肝澼亦下血二臟同病者可治其脈小沉濇為腸澼其身熱者死太隂陽明論犯賊風虚邪陽受之飲食不節起居不時者隂受之陽受之則入六腑隂受之則入五臟入六腑則身熱不時卧上為喘呼入五臟則填滿閉塞下為飱泄乆為腸澼此俗所謂腸紅病也金匱六腑氣絶於外者手足寒上氣脚縮五臟氣絶於内者痢不禁下甚者手足不仁下痢脈沉弦者下重脈大者為末止脈㣲弱數者為欲自止雖發熱不死下痢手足厥冷無脈者炙之不温若脈不還反㣲喘者死少隂負跌陽者為順也下痢有㣲熱而渇脈弱者令自愈下痢渇者自愈以陽氣復而寒邪去也下痢脈數有㣲熱汗出令自愈設脈𦂳為末解下痢脈數而渇者令自愈設不差必清膿血以有熱故也下痢氣者當利其小便下痢清榖不可攻其表汗出必脹滿下痢脈沉而遲其人面少赤身有㣲熱下痢清榖者必鬱冒汗出而解病人必㣲厥所以然者其面𢃄陽下虚故也下痢後脈絶手足厥冷晬時脈還手足温者生不還者死下痢腹脹滿身體疼痛者先温其裏乃攻其表以上諸症皆屬隂寒之痢非暑毒之痢也治法大相懸殊病源痢而赤白者是熱乘於血血滲於腸内則赤也冷氣入腸摶腸間津液凝滯則白也冷熱相交故赤白相雜重者狀如膿涕而血雜之輕者白膿上有赤脈薄血狀如魚脂腦世謂魚腦痢也血痢者熱毒折於血入大腸故也休息痢者胃腕有停飲因痢積乆或冷氣或熱氣乘之氣動於飲則飲動而腸虚受之故為痢也痢如膏由臟腑虚冷氣入於大腸成痢冷氣積腸又虚滑脂凝如膏也蠱蛀痢毒氣侵於臟腑如病蠱蛀之家痢血雜膿瘀黒有片如雞肝與血俱下是也雜痢謂痢色無定或水榖或膿血或青或黄或赤或白變雜無常或雜色相兼而痢也挾熱則黄赤熱甚則變膿血也冷則白冷甚則青黒皆由飲食不節冷熱不調胃氣虚故變易痢方桃花湯金匱下痢便膿血者此湯主之赤石脂一斤一半剉一半篩末亁薑一兩粳米一升右三味以水七升煮米令熟去滓温服七合内赤石脂末方寸七日三服若一服愈餘勿服此治下焦滑脱之痢白頭翁湯金匱熱痢下重者此湯主之白頭翁黄連黄柏秦皮各三兩右四味以水七升煮取二升去滓温服一升不愈再服紫參湯金匱下痢肺痛此湯主之紫參半斤甘草三兩右二味以水五升先煮紫參内甘草煮取一升半分温三服紫參疑即燭上染紅色者訶梨勒散金匱治氣痢訶梨勒十枚煨右一味為散粥飲和頓服甘草㵼心湯傷寒論傷寒中風醫反下之其人下痢日數行榖不化腹中雷鳴心下痞鞕而滿亁嘔心煩不得安此湯主之甘草四兩炙黄芩亁薑各三兩半夏半升黄連一兩大棗十二枚右六味以水一斗煮取六升去滓再煎取三升温服一升日三服此治上焦不和之痢黄芩湯傷寒論太陽與少陽合病自下痢者與黄芩湯若嘔者黄芩加半夏生薑湯若傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐亁薑黄連黄芩人參湯主之黄芩三兩甘草芍藥各二兩大棗十二枚右四味以水一斗煮取三升去滓温服一升日再夜一服此熱痢之主方黄芩加半夏生薑湯傷寒論即前方加半夏半升生薑三兩煎服法同亁薑黄連黄芩人參湯傷寒論亁薑黄連黄芩人參各三兩右四味以水六升煮取二升分温再服㵼心湯以下四方皆以黄芩為主而因症加減此痢疾之正方也赤石脂禹餘粮湯傷寒論傷寒服湯藥下痢不止心下痞硬服㵼心湯已復以他藥下之痢不止醫以理中湯與之痢益甚理中者理中焦此痢在下焦此湯主之赤石脂碎禹餘粮碎各一斤已上二味以水六升煮取二升去滓三服下焦乃大腸之底也雄黄丸夷堅甲志云昔虞丞相自渠州被召途中冒暑得疾泄㵼連月夢壁間有韻語方一紙讀之數遍其詞曰毒暑在脾濕氣連脚不泄則痢不痢則瘧獨煉雄黄蒸餅和藥甘草作湯服之安樂别作治療醫家大錯如方製藥服之遂愈此方治暑毒痢柴胡加芒硝湯傷寒論治傷寒胸滿而嘔日晡所發潮熱已而㣲痢先以小柴胡解外後以此主之即柴胡湯方加芒硝二兩右先煮柴胡湯去滓内芒硝分温再服不解更作𤓰蔞散治五色痢乆不愈者𤓰蔞一個以炭火煨存性蓋地上出火毒右研細温酒服盡療熱毒痢血片臍下絞刺痛方外臺升麻地榆茜草黄連各六分犀角四分生地八分梔子薤白香豉各二合右九味水六升煮取一升五合分温三服日再此血痢之主方主赤白痢方外臺黄連二兩阿膠四片右二味以酒二升合黄連煎十五沸去滓然後内阿膠令烊温服三升此治血熱之痢療五疳蒸下痢方外臺苦參青葙甘草炙各三兩右三味以水四升煮取二升半分三灌即愈凡蒸但服地汁即差此兼治虫薤白湯活人書傷寒下痢如爛肉汁赤白滯下伏氣腹痛諸熱毒並皆治之豉半斤綿褁薤白一把梔子七枚大者破之右剉如麻豆大以水二升半先煮梔子十沸下薤白煎至二升許下豉煎取一升二合去滓毎服一湯盞訶梨勒丸局方治腸胃積寒乆痢純白或有青黒日夜無度肉豆蔲去皮木香亁薑泡各二十兩縮砂仁訶梨勒皮川烏頭泡去皮臍白礬煆各二十分龍骨洗赤石脂各八十兩右為末用粟米飯為丸如梧子大毎服二十丸至三十丸温粟米飲下食前服甚者可倍加丸數此温濇之劑葛根湯葛根黄芩黄連湯當歸四逆湯大承氣湯小承氣湯四逆散四逆湯白通加猪胆汁湯白通湯四逆加人參湯通脈四逆湯猪膚湯陽毒升麻湯以上十三方俱見傷寒門生薑㵼心湯見嘔吐門烏梅丸方見虫門威喜丸方見通治應此方和劑名感丸癲狂癎靈素靈癲狂篇狂始生先自悲也喜忘苦怒善恐者得之憂饑狂始發少卧不饑自髙賢也自辯智也自尊貴也善罵詈日夜不休狂言驚善笑好歌樂妄行不休者得之大恐狂目妄見耳妄聞善呼者少氣之所生也狂者多食善見鬼神善笑而不發於外者得之有所大喜骨癲靈癲狂篇骨癲疾者顑齒諸腧分肉皆滿而骨居汗出煩悗嘔多沃沫氣下泄不治筋癲疾靈癲狂篇筋癲疾者身倦攣急嘔多沃沫氣下泄不治脈癲疾靈癲狂篇脈癲疾者暴仆四支之脈皆脹而縱脈滿盡刺之出血嘔多沃沫氣下泄不治素生氣通天論隂不勝其陽則脈流薄疾并乃狂宣明五氣論五邪所亂邪入於陽則狂調經論血并於隂氣并於陽故為驚狂至真要大論諸躁狂越皆屬於火通評虚實論帝曰癲疾何如岐伯曰脈搏大滑乆自己脈小堅急死不治帝曰癲疾之脈虚實何如岐伯曰虚則可治實則死陽明脈解篇岐伯曰四支者諸陽之本陽盛則四支實實則能登髙也帝曰其棄衣而走者何也岐伯曰熱盛於身故棄衣欲走也帝曰其妄言罵詈不避親疎而歌者何也岐伯曰陽盛則使人妄言罵詈不避親疎而不欲食不欲食故妄走也陽厥怒狂素病能論帝曰有病怒狂者此病安生岐伯曰陽氣者因暴折而難决故善怒也病名曰陽厥帝曰治之奈何岐伯曰奪其食即已使之服以生鐵洛為飲夫生鐵洛者下氣疾也胎病素竒病論帝曰人生而有病癲疾者病名曰何安所得之岐伯曰病名為胎病此得之在母腹中時其母有所大驚氣上而不下精氣并居故令子發為癲疾也難經癲疾始發意不樂僵仆直視其脈三部隂陽俱盛是也重陽者狂重隂者癲病源風癲風癲者由氣血虚邪入於隂經故也又人在胎其母卒大驚精氣并居令子發癲其發則仆地吐涎沫無所覺是也此俗名羊頭瘋五癲五癲者一曰陽癲發如死人遺尿食頃乃解二曰隂癲初生小時臍瘡未愈數洗浴因此得之三曰風癲發時眼目相引牽縱反強羊鳴食頃方解四曰濕癲眉頭痛身重坐熱沐頭濕結腦肺未止得之五曰馬癲發作時時反目口噤手足相引身體皆然鬼魅凡人有為鬼物所魅則好悲而心自動或心亂如醉狂言驚怖向壁悲啼夢寤喜魘或與鬼神交通病苦乍寒乍熱心腹滿短氣不能飲食此魅之所持也十歳以上為癲十歳以下為癎大體不外三種風驚食是也千金驚癎癎分心肝脾肺腎膈腸之病及馬牛羊猪犬雞之别其象各有所似癲狂方生鐵落為飲素問生鐵落即爐冶間鎚落之鐵屑用水研浸可以為飲其屬金其氣寒而重最能墜熱開結平水火之邪故可以下氣疾除狂怒也凡藥中用鐵精鐵華粉鍼砂鐵綉水之類皆同此意此治怒狂之方以鎮肝為主桂枝去芍藥加蜀漆龍骨牡蠣救逆湯傷寒論治傷寒脈浮醫以火迫刼之亡陽必驚狂起卧不安者即桂枝湯去芍藥加蜀漆三兩洗去腥牡蠣五兩熬龍骨四兩右七味以水一斗煮取二升先煮蜀漆内諸藥煮取三升去渣温服一升柴胡加龍骨牡蠣湯傷寒論治傷寒下之驚煩小便不利讝語身重不能轉側此湯主之柴胡龍骨人參茯苓鉛丹黄芩桂枝各一兩半半夏二合大黄二兩牡蠣一兩生生薑一兩半大棗六枚右十二味以水八升煮取四升内大黄更煮去滓温服一升治癲狂百病千金翼大麻子四升上好者以水六升煮令芽生去滓煎取二升空腹頓服或多言語勿怪但使人摩手足煮法竒莨菪子散外臺治五癎猪卵一具隂亁一百日莨菪子三斤牛黄八分鯉魚胆五分桂心一兩研右五味以清酒一升漬莨菪子暴令亁盡酒止搗合下篩酒服五分日再當醉不知稍増抱胆丸類方治一切癲癎風狂或因驚恐怖畏所致及婦人産後血虚驚氣入心并室女經脈通行驚邪藴結水銀硃砂細研各二兩黑鉛一兩半乳香一兩右將黑鉛入銚子内下水銀結成砂子次下硃砂乳香乗熱用柳木槌研匀丸雞豆大毎服一丸井花水吞下病者得卧切莫驚動覺來即安再服一丸除根琥珀壽星丸局方治心胆被驚神不守舍或痰迷心竅恍惚健忘妄言妄見天南星一斤掘坑深二尺用炭火五升於坑内燒紅取出炭掃凈用好酒一斤澆將南星趂熱下坑内用盆急蓋訖泥壅合經一宿取出再焙亁為末琥珀四兩另研硃砂一兩研飛一半為衣右和猪心血三個生薑汁打麺糊攪令稠粘將心血和入藥末丸如桐子大毎服五十丸煎人參湯下日三控延丹類方治諸癎乆不愈頑延聚散無時變生諸症川烏用生半夏湯洗白殭蚕炒各半兩生薑汁浸一宿鐵粉三錢研全蝎甘遂各二錢半麺褁煨右為細末生薑自然汁為丸如菉豆大硃砂為衣毎服十五丸食後生薑湯下忌食甘草獨效苦丁香散治忽患心疾癲狂不止得之驚憂痰氣上犯心包當治其源以苦丁香即𤓰蒂半兩為末毎服一錢井花水調滿盞投之得大吐熟睡勿令人驚起甘遂散類方治癲狂及婦女心風血邪甘遂末一錢用猪心取三管血三條和甘遂多少和之將心批作二片入藥在内合之綿縛外用皮紙褁濕慢火煨熟勿令焦取藥細研碾入辰砂末一錢和匀令作四丸毎服一丸將所煨猪心煎湯化下再服用别猪心過半日大便下惡物後服調和胃氣丸此病乍作乍醒者甦不食迷癡者不治苦參丸外臺治狂邪發惡或披頭大呌欲殺人不避水火以苦參為末蜜丸桐子大毎服十丸薄荷湯下礞石滚痰丸養生主論蘇合香丸局方至寳丹以上三方俱見通治按癲癎一症其輕者不拘何方可愈重者必用鍜鍊秘方僅能有效痰飲金匱問夫飲有四何謂也師曰有痰飲有懸飲有溢飲有支飲問曰何以異師曰其人素盛今痩水走腸間瀝瀝有聲謂之痰飲飲後水流在脇下欬唾引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲欬逆倚息氣短不得卧其形如腫謂之支飲水在心心下堅築短氣惡水不得飲水在肺吐涎沫欲飲水水在脾少氣身重水在肝脇下支滿嚏而痛水在腎心下悸夫心下有留飲其人背寒冷如水大留飲者脇下痛引缺盆咳𠻳則輒已胸中有留飲其人短氣而渇四肢歴節痛脈沉者有留飲膈上病痰滿喘咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤劇必有伏飲夫病人飲水多必暴喘滿凡食少飲多水停心下甚者則悸㣲者短氣脈雙弦者寒也皆大下後喜虚脈偏弦者飲也病痰飲者當以温藥和之温藥和之治飲總訣夫有支飲家乆咳數歳其脈弱者可治實大數者死其脈虚者必苦冐其人本有支飲在胸中故也治屬飲家夫短氣有㣲飲當從小便去之病溢飲者當發其汗水在中當利小便水在四肢當發汗此亦總訣嘔家本渇渇者為欲解今反不渇心下有支飲故也假令痩人臍下有悸吐涎沫而癲眩此水也先渇後嘔為水停心下此屬飲家全部内經無一痰字然世間痰飲之病最多惟仲景大創厥論而後萬世治痰之法始備病源癖飲由飲水多水停聚兩脇之間遇寒氣相摶則結聚成塊在脇下弦亘起按之作水聲飲成形者為癖酒癖因大飲酒後渇而引飲無度酒與飲停滯在脇肋下結聚成癖時時作痛其狀脇下氣急而痛鬲痰謂痰水結於胸膈之上又犯大寒使陽氣不行令痰水結聚不散而隂氣逆上上與風痰相結上衝於頭即令頭痛或數歳不已乆之腦痛故云鬲痰頭痛若手足寒至節即死痰飲方苓桂甘术湯金匱心下有痰飲胸脇支滿目眩此方主之短氣有㣲飲當從小便去之此主之腎氣丸亦主之茯苓四兩桂枝白术各三兩甘草一兩右四味以水六升煮取三升分温三服小便即利甘遂半夏湯金匱病者脈伏其人欲自利利反快雖痢心下續堅滿此為留飲欲去故也此湯主之甘遂大者三枚半夏十二枚芍藥五枚甘草如指大一枚炙一本無右四味以水二升煮取半升去滓以蜜半升和藥汁煎取八合頓服之甘遂甘草同用下飲尤速十棗湯金匱脈沉而弦者懸飲内痛此方主之欬家其脈弦為有水此主之又支飲家欬煩胸中痛者不卒死至一百日或一歳亦宜此湯芫花熬甘遂大㦸各等分右三味搗篩以水一升五合先煮肥大棗十枚取八合去滓内藥末強人服一錢七羸人服半錢平旦温服之不下者明日更加半錢得快之後糜粥自養此以散作湯法小青龍湯金匱治心下有水氣亁嘔發熱或咳或痢少腹滿而喘麻黄去節芍藥各三兩五味子半升亁薑甘草炙細辛桂枝去皮各三兩半夏半升湯洗右八味以水一斗先煮麻黄减二升去上沫内諸藥煮取三升去滓温服一升若㣲痢者去麻黄加芫花如雞子大熬令赤色渇者去半夏加栝蔞根三兩噎者去麻黄加附子一枚泡小便不利少腹滿去麻黄加茯苓四兩喘者去麻黄加杏仁半升去皮尖木防己湯金匱膈間支飲其人喘滿心下痞堅面色黧黒其脈沉𦂳得之數十日醫吐下之不愈此湯主之虚者即愈實者三日復發復與不愈者宜此湯去石膏加茯苓芒硝湯主之木防己三兩石膏十二枚雞子大桂枝二兩人參四兩右四味以水六升煮取二升分温再服木防己去石膏加茯苓芒硝湯金匱即前方去石膏加茯苓四兩芒硝三合右五味以水六升先煮四味取二升去滓内芒硝再微煎分温再服㣲痢則愈澤㵼湯金匱治心下有支飲其人苦冒眩澤㵼五兩白术二兩右二味以水二升煮取一升分温再服此亦從小便去之法也小半夏湯金匱嘔家本渇渇者為欲解今反不渇心下有支飲故也此湯主之半夏半升生薑半斤右二味以水七升煮取一升半分温再服此專嘔之方小半夏加茯苓湯治卒嘔吐心下痞膈間有水眩悸者此湯主之即前方加茯苓三兩一法四兩煎法同加茯苓而眩悸愈知茯苓治水之力大矣葶藶大棗㵼肺湯金匱治支飲不得息葶藶熬令黄色捣丸如彈子大大棗十二枚右先以水三升煮棗取二升去棗内葶藶煮取一升頓服不得息肺病也所以専治肺桂苓五味甘草湯金匱欬逆倚息不得卧服小青龍已多唾口燥寸脈沉尺脈㣲手足厥逆氣從小腹上冲胸咽手足痺其面翕熱如醉狀因復下流隂股小便難時復冒者與此湯治其氣衝茯苓四兩桂枝四兩去皮甘草炙三兩五味子半升右四味以水八升煮取三升去滓分温三服此方五味子不與亁薑同服因服小青龍之後發洩已甚而氣冲故専於歛肺也苓甘五味薑辛湯金匱衝氣即低而反更咳胸滿者用桂苓五味甘草湯去桂加薑辛以治其咳滿茯苓四兩甘草亁薑細辛各三兩五味半升右五味以水八升煮取三升去滓温服半升日三苓甘五味薑辛半夏湯金匱欬滿即止而更復渇衝氣復發者以細辛亁薑為熱藥也服之當遂渇而渇反止者為支飲也支飲者法當冒冒者必嘔嘔者復内半夏以去其水茯苓四兩甘草細辛亁薑各二兩五味半夏各半升右六味以水八升煮取三升去滓温服半升日三苓甘五味加薑辛半夏杏仁湯金匱水去嘔止其人形腫者加杏仁主之其証應内麻黄以其人遂痺故不内之若逆而内之者必厥所以然者以其人血虚麻黄發其陽故也即前方加杏仁半升去皮尖煎服法同苓甘五味加薑辛半夏杏仁大黄湯金匱若面熱如醉此為胃熱上衝熏其面加大黄以痢之即前方再加大黄三兩煎服法同以上五方因症加減精義當細參厚朴大黄湯金匱支飲胸滿者主之厚朴一尺大黄六兩枳實四枚右三味以水五升煮取二升分温再服專治胸滿痰飲頭痛往來寒熱方千金翼常山一兩雲母粉二兩右二味搗篩為散熱湯服方寸七吐之止吐不盡更服赤石脂散千金翼痰飲吐水無時其源為冷飲過度脾胃氣羸飲食入胃變冷水反吐不停赤石脂三升右一味為散服方寸七酒飲並可下漸加三七盡三斤終身不吐水又不下利補五臟令人肥健有人患飲諸藥不瘥服此一斤即愈本事方云此方試之神效前胡丸治心頭痰積宿水嘔逆不下食前胡白术甘草各五分炙麥冬去心六分旋復花豆蔲各三分人參六分枳實炙大黄各四分右九味為末蜜丸桐子大空腹酒下二十丸漸加至三十丸忌桃李魚蒜等物范汪大甘遂丸外臺治留水乆澼芫花熬甘遂葶藶熬大黄苦參大㦸芒硝貝母桂心各一兩杏仁三十枚巴豆三十枚去皮心熬烏喙三分炮令拆右十二味為末其巴豆杏仁搗如膏蜜丸如豆大服二丸日三不知稍加以意將息之忌蘆笋猪肉生葱礬石湯外臺治胸中痰澼頭痛不欲食及飲酒則阻痰礬石一兩以水二升煮取一升内蜜半升頓服之須臾未吐飲少熱湯金珠化痰丸局方治胸膈煩悶涕唾稠黏痰實咳𠻳咽溢不利辰砂研飛二兩生白龍腦細研半兩皂莢子炒黄色白礬光明者於銕石器内熬汁盡冷研鈆白花細研天竺黄研各一兩金箔二十片為衣半夏湯洗七次用生薑一兩去皮同搗細作餅炙㣲黄色四兩右以半夏皂莢子為末與諸藥研匀生薑汁煮麺糊丸如桐子大毎服十丸至十五丸生薑湯下食後臨卧服此方製半夏之法頗妙治上膈之痰最宜葛花解酲湯東垣治酒傷而成飲癖蓮花青皮三分去穰木香五分橘皮去白白茯苓人參猪苓各一錢五分神麯炒澤㵼亁薑白术各二錢白豆蔲仁葛花砂仁各五錢右為細末和匀毎服三錢白湯調下但得㣲汗酒病去矣不可恃此過飲頻服取汗以損天年大青龍湯金匱見傷寒防己椒目葶藶大黄丸金匱見水腫五苓散金匱二陳湯和劑腎氣丸青州白丸六君子湯二賢散以上六方俱見通治小青龍加石膏湯見咳𠻳痰飲之症十居三四患之者無不胃疼嘔逆乃普天下醫家無人能知之者人立一説治無一效言之慨然咳𠻳附肺脹靈素靈樞玉版篇咳脫形身熱脈小以疾是逆也不過十五日而死矣脈小以疾訣死之法盡此四字素問欬論帝曰肺之令人咳何也岐伯曰五臟六腑皆令人咳非獨肺也皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外内合邪因而客之則為肺咳五臟各以其時受病非其時各傳以與之肺欬之狀咳而喘息有音甚則唾血心欬之狀欬則心痛喉中介介如梗狀甚則咽痛喉痺肝欬之狀欬則兩脇下痛甚則不可以轉轉則兩胠下滿脾欬之狀欬則右胠下痛隂隂引肩背甚則不可以動動則欬劇腎欬之狀欬則腰背相引而痛甚則欬涎五氣之乆欬乃移於六腑脾欬不已則胃受之胃欬之狀欬而嘔嘔甚則長虫出肝欬不已則胆受之胆欬之狀欬嘔胆汁肺欬不已則大腸受之大腸欬狀咳而遺矢心欬不已則小腸受之小腸欬狀欬而失氣氣與欬俱失腎欬不已則膀胱受之膀胱欬狀欬而遺溺乆欬不已則三焦受之三焦欬狀欬而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也生氣通天論秋傷於濕上逆而咳臟氣法時論腎病者腹大脛腫喘欬身重示從容論喘欬者是水氣并陽明也金匱乆欬數歳其脈弱者可治其脈虚者必苦冒其人本有支飲在胸中故也治屬飲家上氣喘而噪者屬肺脹欲作風水發汗則愈外臺十欬一曰風欬欲語因欬言不得終也二曰寒欬飲冷食寒因之而欬也三曰支飲心下堅滿欬引四肢痛脈反遲也四曰肝欬欬而引脇下痛也五曰心欬欬而吐血引手少隂也六曰脾欬欬而涎出續續不止下引少腹也七曰肺欬欬引頸項吐涎沫也八曰腎欬耳聾無所聞引腰并臍中也九曰胆欬欬引頭痛口苦也十曰厥隂欬欬引舌本也咳𠻳方射干麻黄湯金匱咳而上氣喉中作水雞聲此湯主之射干十三枚一法三兩麻黄生薑各四兩紫苑欵冬花各三兩五味子半升細辛三兩半夏八枚一法半升大棗七枚右九味以水一斗二升先煮麻黄兩沸去上沫内諸藥取三升分温三服皂莢丸金匱欬逆上氣時時唾濁但坐不得眠此方主之皂莢八兩刮去皮酥炙右一味末之蜜丸梧子大以棗膏和湯服三丸日三夜一服稠痰粘肺不能清滌非此不可厚朴麻黄湯金匱欬而脈浮者此主之厚朴五兩麻黄四兩石膏如雞子大杏仁半夏各半升亁薑細辛各二兩小麥一升五味子半升右九味以水一斗二升先煮小麥熟去滓内諸藥煮取三升温服一升日三脈浮風邪在表澤漆湯金匱欬而脈沉者此主之半夏半升紫參五兩一作紫苑澤漆三斤以東流水五斗煮取一斗五升生薑白前各五兩甘草黄芩人參桂枝各三兩右九味㕮咀内澤漆汁中煮取五升温服五合至夜盡脈沉伏飲在裏越婢加半夏湯金匱咳而上氣此為肺脹其人喘目如脱狀脈浮大者主之麻黄六兩石膏半斤生薑三兩大棗十五枚甘草二兩半夏半升右六味以水六升先煮麻黄去上沫内諸藥煮取三升分温三服肺脹之喘最多知者絶少小青龍加石膏湯金匱肺脹咳而上氣煩躁而喘脈浮者心下有水此主之即小青龍加石膏二兩煎法同小青龍湯方見痰飲杏仁煎外臺主氣𠻳杏仁一斤去皮尖糖一合疑是飴糖酥一合生薑汁一合蜜五合貝母八合另研末蘇子一升水研絞汁七合右七味先搗杏仁如泥内後六味合煎如飴糖取如棗大含嚥之日三但𠻳發細細含之蘇子絞汁始有力十味丸外臺治乆𠻳有聲成肺癰者麻黄去節白前各二兩桑皮六兩射干四兩白薇三兩百部五兩地黄六兩地骨皮五兩橘皮三兩右為末蜜丸桐子大桑皮湯下十丸日再服稍加至十五丸療上氣方外臺葶藶五合熬紫色為泥桑白皮大棗二十枚右三味以水四升煮取一升去滓内葶藶子泥如棗大煮三分減一以快痢為度鯉魚湯外臺治上氣杏仁熬貝母桂枝各三兩橘皮人參甘草炙厚朴炙麻黄去節茯苓胡麻白前各二兩生薑六兩半夏五兩洗鯉魚五斤右以水二斗煮魚得一斗二升去魚内藥煎取三升二合分四服按此方治咳𠻳有水聲身浮腫最妙觀音應夢散夷堅志治老人虚𠻳人參一寸胡桃二枚不去皮右二味以棗二枚薑五片水煎服補肺阿膠散錢乙止𠻳生津阿膠一兩半馬兠鈴焙惡實炒甘草炙各一兩杏仁七錢右加糯米一合水煎服按此方治小兒天哮最效清音丸統㫖治咳𠻳失音桔梗訶子各一兩甘草五分硼砂三錢青黛三錢氷片三分右為末蜜丸龍眼大噙化一丸葶藶丸治肺氣咳𠻳面目浮腫喘促不安小便赤色甜葶藶隔紙炒貝母煨黄色木通各一兩杏仁防己各二兩右為末棗肉為丸桐子大桑白皮煎湯下五十丸蘇子煎治上氣咳𠻳蘇子生薑汁生地汁白蜜杏仁各一升右搗蘇子以地黄汁薑汁澆之以絹絞取汁更搗以汁澆之絞令味盡去滓熬令杏仁㣲黄黒如脂又以汁澆之絹絞往來六七度令味盡去滓内蜜合和置瓦器中於湯上煎之令如飴毎服方寸七日三夜一此治乆𠻳蘇子降氣湯局方治虚陽上攻氣不升降上盛下虚痰涎壅盛胸膈噎塞并乆年肺氣至效蘇子半夏各二錢半前胡甘草炙厚朴陳皮各八分當歸二錢沉香七分薑三片右水煎不拘時服若虚冷人加肉桂五分黄茋一錢治乆𠻳上氣心胸煩熱吐膿血方蘇子鹿角膠炒杏仁炒各三兩薑汁一合白蜜一盞生地汁一合右將前三味搗令熱入薑汁地黄汁蜜相和慢火熬成膏磁器中蜜封之毎服半匙許温粥飲調下日三四服此治寒𠻳之諸病之中唯咳𠻳之病因各殊而最難愈治稍誤即貽害無窮余以此症考求四十餘年而後稍能措手故所載之方至詳至悉學者當於此潛心參䆒勿輕視也麥冬湯金匱見哮喘小青龍湯葶藶大棗㵼肺湯桂苓五味甘草湯桂苓五味去桂加薑辛湯又去桂加薑辛半夏湯又去桂加薑辛半夏杏仁湯又去桂加薑半夏杏仁大黄湯以上七方皆金匱治痰飲之方俱載痰飲門麻黄附子細辛湯仲景方見傷寒烏梅丸金匱見虫門金珠化痰丸見痰飲人參蛤蚧散寳鑑見虚勞疝靈素靈經脈篇肝所生病為狐疝足厥隂病丈夫㿉疝婦人少腹腫素骨空論任脈為病男子内結七疝督脈為病從少腹上衝心而痛不得前後為衝疝隂陽别論三陽為病發熱寒其傳為頽疝脈要精㣲論診得心脈而急病名心疝少腹當有形也病源七疝七疝者厥疝癥疝寒疝氣疝盤疝胕疝狼疝此名七疝也厥逆心痛足寒諸飲食吐不下名曰厥疝也腹中氣乍滿心下盡痛氣積如臂名曰癥疝也寒飲食即脇下腹中盡痛名曰寒疝也腹中乍滿乍减而痛名曰氣疝也腹中痛在臍旁名曰盤疝也腹中臍下有積聚名曰胕疝也小腹與隂相引而痛大便難名曰狼疝也凡七疝皆由血氣虚弱飲食寒濕不調理之所生饑疝隂氣在内寒氣客於足陽明手少陽之絡令食竟必饑心為之痛名曰饑疝外臺痛達背膂名尸疝心下堅痛不可手迫名石疝臍下結痛女子月事不時名血疝少腹脹滿引膀胱急痛名脈疝寒氣積於内上衝心如刀錐所刺四肢逆冷或唇口變青名心疝㿗疝堅大如斗諸疝惟㿗疝最大而堅冲起犯心即能殺人非硫黄不治疝方烏頭桂枝湯金匱治寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治者烏頭大者五枚熬去皮不必㕮咀以水二升煎減半去滓以桂枝湯五合解之又一煎法令得一升後初服二合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病蜘蛛散金匱隂狐疝氣者偏有小大時時上下此方主之蜘蛛十四枚熬焦桂枝半兩右為散取八分一七飲和服日再服蜜圓亦可俗名偏墜大烏頭煎方金匱腹滿脈弦而𦂳弦則衛氣不行即惡寒𦂳則不欲食邪正相摶即為寒疝遶臍痛苦發則白津出手足厥冷其脈沉𦂳者此主之烏頭大者五枚熬去皮不必咀水二升煮取一升去滓内蜜二升煎令水氣盡又一煎法取二升強人服七合弱人服五合不知明日更服不可一日再服沉寒入裏非大熱之藥不治洗隂腫核痛千金翼治丈夫隂腫大如斗核中痛者雄黄一兩末礬石二兩研甘草一尺生右以水一斗煮二升洗之神良麝香大㦸丸局方治隂㿗腫脹或小腸氣痛葫蘆巴四兩麝香一錢大㦸半兩炒黄茴香川棟子各二兩以好酒二升葱白七根長三四寸同煮軟去核取肉和丸木香訶子酒浸蒸附子泡梹榔各一兩不見火右九味為丸如桐子大或酒或薑湯下五十丸此方通治疝氣他如荔枝核青鹽牽牛等俱可加入不必因一二味之殊另名一方濟生橘核丸治四種㿗病卵核腫脹偏有大小或堅硬如石痛引臍腹甚則膚囊腫脹成瘡時出黄水或癰腫㿉爛橘核炒海藻昆布海帶各泡川練肉炒桃仁麸炒各一兩製厚朴木通枳實麸炒延胡索炒桂心木香各一兩右為細末酒丸桐子大毎服七十丸酒鹽湯下此輭堅之藥川練子丸治疝氣及一切下部之疾腫痛縮小雖多年服此藥永去病根川練子凈肉一斤分四處四兩用麺一合班猫四十九個同麸炒黄色去麸班猫不用四兩用麺一合巴豆四十九粒同麸炒黄色去麸巴豆不用四兩用麸一合巴㦸一兩同麸炒黄色去麸巴㦸不用四兩用鹽一兩茴香一合同炒黄色去鹽及茴香不用木香一兩不見火破故紙一兩炒香為度右為末酒糊丸如桐子大毎五十丸鹽湯下甚者日進三兩服空心食前碙砂圓本事方有人貨疝氣藥日數千文有一國醫多金得之用之良騐木香沉香巴豆肉各一兩青皮二兩銅青半兩研碙砂一分研右上二香青皮三味細剉同巴豆慢火炒令紫色為度去巴豆為末入青砂二味研匀蒸餅和丸如桐子大毎服七丸至九丸鹽湯吞下二三服空心食前服按此方法既有理而用銅青更竒此等所謂海上方也蟬脱散治脬囊腫小兒坐地為蚓或蟻吹著蟬脱半兩水一碗煎湯洗再温再洗仍與五苓散加燈心煎服或用石灰湯洗當歸生薑羊肉湯見通治撞氣阿魏丸見嘔吐蘭臺軌範卷四
