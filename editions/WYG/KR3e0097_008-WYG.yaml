芩人參各三錢甘草炙二錢右毎服一二錢薑棗水煎加味逍遥散治乳母肝脾氣血虚弱發熱致兒為患當歸白术茯苓芍藥炒黄各一錢柴胡牡丹皮山梔炒甘草炒各五分水煎服龍胆㵼肝湯治肝經濕熱或嚢癰便毒小便澁滯龍胆草酒炒五分車前子炒木通歸尾澤㵼甘草黄芩生地山梔各三分水煎服茵陳湯治身熱鼻亁汗出二便赤澁濕熱發黄茵陳六錢梔子二箇大黄二錢毎服一錢水煎黄連香薷飲香薷四兩厚朴二兩黄連右毎服一二錢將朴連同生薑炒令紫色入香薷水酒各一盞煎冷服金匱加减腎氣丸治脾腎虚腰重脚輕小便不利或吐腹腫脹四肢浮腫喘急痰盛已成蠱者此症多因脾胃虚弱治失其宜元氣復傷而變者非此藥不救白茯苓三兩附子泡五錢川牛膝肉桂澤㵼車前子山茰肉山藥牡丹皮各一兩熟地黄四兩掐碎酒拌杵膏右為末和地黄膏加煉蜜杵丸如桐子大每服一二十丸空心米湯下五色丸治五癎硃砂真珠各五錢水銀雄黄各一錢黒鉛三兩同水銀結成砂右為末煉蜜丸麻子大每服三四丸煎銀花薄荷湯下斷癎丹治癎差後變症不止黄茋蜜炙鈎藤鈎細辛甘草炙各五錢蛇退三寸酒炙蟬蜕去土四箇牛黄一字另研右為末煮棗肉為丸麻子大毎服五七丸人參煎湯下褊銀丸治風涎膈熱及乳食不消腹脹喘促巴豆水銀各五錢京墨八錢火燒醋淬研黑鉛二錢半水銀煎麝香五分另研右為末陳米粥丸如菉豆大毎服二三丸煎薄荷湯下利驚丸治急驚天竺黄二錢輕粉青黛各一錢黒牽牛炒五錢右為末蜜丸豌豆大毎歳服一丸薄荷湯化下小續命湯治中風不省人事涎鳴失音肢體反張或時厥冷麻黄去節人參黄芩芎藭芍藥甘草炒杏仁去皮尖研漢防已官桂各五錢防風七錢五分附子泡去皮臍二錢右各另為末和匀毎服一錢薑棗水煎有熱減桂附鈎藤鈎飲治吐利脾胃虧損虚風慢驚鈎藤鈎三分蟬蜕防風炒人參麻黄白僵蠶炒天麻蝎尾去毒炒各五錢甘草炙芎藭各二錢五分麝香一錢叧研為末毎服一二錢水煎大青膏治傷風吐㵼身温氣熱驚搐天麻青黛各一錢白附子亁蝎去毒烏稍蛇肉酒浸焙硃砂天竺黄二錢麝香二分右為末生蜜和膏毎服一豆粒許月中兒用半粒薄荷湯化下百祥丸治痘瘡黒陷及𠻳而吐青緑水紅牙大㦸隂亁漿水煮軟去骨復入原汁中煮右焙亁為末水丸粟米大毎服十丸赤芝蔴湯送下牛李膏治痘瘡黒陷牛李子一味杵汁石器内熬膏毎服皂子大煎杏膠湯化下雄黄散治痘後牙齦生疳蝕瘡雄黄一錢銅緑二錢同研細量瘡大小亁糝其上歸脾湯治乳母脾經氣鬱致兒為患人參白术茯神黄茋龍眼肉各二錢逺志一錢酸棗仁木香甘草炙三分右薑棗水煎服加柴胡山梔名加味歸脾湯越鞠丸治乳母六鬱傳兒為患或胸滿吐酸齒痛瘡疥等症蒼术神麹炒香附子山查山梔炒芎藭麥芽炒各等分右為末水調神麹糊丸桐子大毎服二三十丸白滚湯下子母並服安神丸治邪熱驚啼心肝壯熱面黄頰赤麥門冬去心焙牙硝白茯苓亁山藥寒水石甘草各五錢硃砂一兩龍腦二分半右為末煉蜜丸芡實大毎服半丸砂糖水化下花火膏治夜啼燈花一顆塗乳上令兒吮之蟬蜕鈎藤散治肚疼驚啼鈎藤天麻茯苓芎藭白芍藥各二錢甘草蟬蜕各一錢毎服一錢燈心湯下羚羊角丸治行遲羚羊角鎊虎脛骨醋炙黄生地黄焙酸棗仁白茯苓各五錢肉桂防風當歸黄茋各二錢五分右為末煉蜜丸毎服一皂子大白湯化下止汗散治睡而自汗故蒲扇一把燒存性研為末毎服三錢温酒調下當歸六黄湯治血虚不足虚火内動盜汗不止當歸熟地黄黄茋炒黄柏以下俱炒黒黄芩黄連生地黄各等分毎服二錢水煎服團參湯治心血虚熱自汗盜汗人參當歸各等分右用猪心一片毎服三錢水煎服參附湯治禀賦不足上氣喘急自汗盜汗或病乆陽氣脱陷急宜服之人參五錢附子泡一兩毎服一錢薑水煎人參養榮湯治脾肺俱虚發熱惡寒肢體痩倦食少作㵼或乆病虚損口亁食少欬而下痢驚熱自汗白芍藥一錢五分人參陳皮黄茋蜜炙桂心當歸白术炒甘草炙各一錢熟地黄五味子杵炒各七分逺志五分毎服二三錢薑棗水煎浴體法治胎肥胎熱胎怯烏蛇肉酒浸焙白礬青黛各三錢天麻二錢蝎尾去毒硃砂各五分麝香二分半右為末桃枝一握水煎浴之勿浴背神效當歸膏治跌撲湯火等瘡不問已潰未潰當歸黄蠟生地黄各一兩麻油六兩右先將當歸地黄入油煎黒去渣入蠟熔化候冷攪匀即成膏矣以上皆直訣所載之方以下諸方皆取别本附入者保命散秘方治一切急驚慢驚痰涎湧塞手足抽搐目直神昏夜啼畫倦吐乳㵼白種種惡症珍珠牛黄各三分琥珀五分胆星白附子蟬蜕炙天虫茯苓皂角防風茯神各二錢天竺黄研橘紅甘草薄荷硃砂各一錢天麻三錢全蝎十箇酒洗焙礞石三錢煆氷片麝香各三分右為末和匀毎服一二分或用神麹糊丸麻子大毎服一二十丸量兒大小加減鈎藤一錢薄荷三分泡湯下凡小兒有病即宜少與乳食若似驚風即宜斷乳如欲食與米飲一勺必欲食乳須先將乳擠空然後以空乳令吮否則乳下喉中即成頑痰雖神丹無效俟少安漸與乳可也治疳積方不落水雞肝酒洗同黄蠟一錢頓熟去蠟吃治赤痏方寒水石黄柏黄連大黄鉛粉枯礬白墡粉氷片青黛右藥隨舉幾味研麻油調塗治痘出眼中方取田雞胆㸃之愈治癩方不拘頭面遍身痛癢黄水出俱效黄連一兩蛇床子五錢五棓子一兩輕粉三錢黄柏五錢枯礬五錢川椒二錢氷片一錢同研麻油調塗治骨蒸方銀柴胡八分鮮骨皮一錢酒洗真青蒿八分川連五分犀角五分丹皮五分甘草三分元參一錢竹葉二十片蘆根一兩水煎服治遺尿方㓜㓜新書雞䏶胵一具炙桑螵蛸三枚炒甘草三分炙黄茋牡蠣各五錢煆為粗末毎用一錢水一盞煎去渣服治牙疳方人中白一錢枯礬三分紅褐子一錢燒存性雞肫皮二錢煆霜梅八分煆雄黄五分硼砂五分銅青三分右為末煎膿茶調搽吐出涎治吐乳方㓜㓜新書蓮子心七枚焙丁香三粒人參三分右同研乳汁浸令兒吮食治螳螂子方即妬乳也青黛一錢元明粉三錢硼砂一錢薄荷五分氷片一分右同研細擦口内兩頥吐出涎一日用四五次自古無螳螂子之病凡小兒變蒸之候毎有口内㣲腫惡乳之時名曰妬乳不治自愈其或不能坐視則用此方塗口亦易愈近日海濵妖婦造割螳螂子之法以騙人取利強者幸愈弱者俱死惟松江蘇州最受其害蓋小兒兩頥内外皮有兩層中空處有脂膜一塊人人皆然割去復生妖婦以此惑人人見果有如螳螂子者遂相信不疑死而不悔深可憐憫除蘇松之外天下並無有生螳螂子而死者斷不可為其所愚而受害也損小兒股内無力因跌而起一足不伸臀左右大小不同腰脊歪斜脊骨髙起俱屬不治或乆而成毒亦為廢人蘭臺軌範卷八
