body:
  text: 蘭臺軌範卷八呉江徐大椿撰婦人素問六元正紀大論黄帝問曰婦人身重毒之何如岐伯曰有故無殞亦無殞也帝曰願聞其故岐伯曰大積大聚其可犯也衰其大半而止過者死腹中論帝曰何以知懐子之且生也岐伯曰身有病而無邪脈也竒病論黄帝問曰人有重身九月而瘖此何為也岐伯曰胞之絡脈絶也帝曰何以言之岐伯曰胞絡者繫於腎少隂之脈貫腎繫舌本故不能言帝曰治之奈何岐伯曰無治也當十月復平人氣象論婦人手少隂脈動甚者姙子也難經姙之為病其内苦結女子為瘕聚左者為腎右者為命門命門者諸精神之所舍原氣之所繫也男子以藏精女子以繫胞金匱問曰新産婦人有三病一者病痓二者病鬱冒三者大便難何謂也曰新産血虚多汗出喜中風故令病痓亡血復汗寒多故多鬱冒亡津液胃燥故大便難産婦鬱冒其脈㣲弱嘔不能食大便反堅但頭汗出所以然者血虚而厥厥而必冒冒家欲解必大汗出以血虚下厥孤陽上出故頭汗出所以産婦喜汗出者亡隂血虚陽氣獨盛故當汗出隂陽乃復大便堅嘔不能食小柴胡湯主之雖當汗出不宜太過師曰産婦腹痛法當以枳實芍藥散假令不愈者此為腹中有瘀血著臍下宜下瘀血湯主之亦主經水不利産後七八日無太陽証少腹堅痛此惡路不盡不大便煩燥發熱切脈㣲實再倍發熱日晡時煩燥者不食食則讝語至夜即愈宜大承氣湯主之熱在裏結在膀胱也婦人傷寒發熱經水適來書日明了暮則讝語如見鬼狀者此為熱入血室治之無犯胃氣及上二焦必自愈婦人中風發熱惡寒經水適來得七八日熱除脈遲身凉和胸脇滿如結胸狀讝語者此為熱入血室也當刺期門隨其實而取之期門二穴在乳頭直下四寸第二肋端此等刺法最易學也婦人之病因虚積冷結氣為諸經水斷絶至有歴年血寒積結胞門寒傷經絡凝堅在上嘔吐涏唾乆成肺癰形體損分在中盤結繞臍寒疝或兩脇疼痛與臟相連或結熱中痛在關元脈數無瘡肌若魚鱗時著男子非止女身在下未多經候不匀令隂掣痛少腹惡寒或引腰脊下根氣衝氣衝急痛膝胵疼煩奄忽眩冒狀如厥癲或有憂慘悲傷多嗔此皆帶下非有鬼神乆則羸痩脈虚多寒三十六病千變萬端審脈隂陽虚實𦂳弦行其針藥治危得安其雖同病脈各異源子當辨記勿謂不然問曰婦人年五十所病下痢數十日不止暮即發熱小腹裏急腹滿手掌煩熱唇口亁燥何也師曰此病屬帶下何以故曾經半産瘀血在少腹不去何以知之其証唇口亁燥故知之當以温經湯主之婦人陷經漏下黒不解膠薑湯主之方無考校本云宜是膠艾湯婦人懐娠六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇形容惡寒之盛所以然者子臟開故也當附子湯温之方無考婦人傷胎懐身腹滿不得小便從腰以下重如有水氣狀懐身七月太隂當養不養此心氣實當刺㵼勞宫關元小便㣲利則愈病源姙娠數墮胎候血氣虚損子臟為風冷所居則血氣不足故不能養胎所以致胎數墮候姙娠而恒腰痛者喜墮胎也按墮胎皆由於血熱兩胎一死一生候陽施隂化精盛有餘者則成兩胎其兩胎而一死者候其胎上冷是胎已死也姙娠過年不産由挾寒冷宿血在胞而有胎則冷血相摶令胎不長産不以時若其胎在胞日月雖多其胎翳小轉動勞羸是挾於病必過時乃産胞轉臍下急痛小便不通是也其病由不同胞轉及胞落並致死帶下三十六疾諸方説三十六疾者是十二癥九痛七害五傷三固是也十二癥者是所下之物一如膏二如青血三如紫汁四如赤皮五如膿痂六如豆汁七如葵根羮八如凝血九如青血血似水十如米汁十一如月浣十二經度不應期也九痛者一隂中傷痛二隂中淋痛三小便即痛四寒冷痛五月水來腹痛六氣滿並痛七汁出隂中如虫囓痛八脇下皮痛九腰痛七害者一害食二害氣三害冷四害勞五害房六害姙七害睡五傷者一窮孔痛二中寒熱痛三小腹急牢痛四臟不仁五子門不正引腎痛三固者一月水閉塞不通其餘二固文缺不載與鬼交臟腑虚神守弱鬼氣得病之也其狀不欲見人獨言笑悲泣脈來遲伏或如鳥啄惡阻心中潰悶頭眩四肢煩疼懈惰不欲執作惡聞食氣欲噉食鹹酸果食多睡少起乃至三四月以上大劇者不能自勝舉也此由婦人元本虚羸血氣不足腎氣又弱兼當風食冷太過心下有痰氣挾之而有姙也子滿此由脾胃虚弱有停水而挾以姙娠也水漬於胞則令胎壊惟將産之月而脚㣲腫則其産易蓋胞藏水血多也初姙娠者則反壊胎胎漏此由衝任脈虚不能約制太陽少隂之經血也亦名胞阻漏血盡則人斃也鬼胎正虚則妖魅精入臟狀如懐娠胎疸其母臟氣熱熏蒸於胎血分是經血先斷而後成水病以其月水壅塞不通經血分而為水故曰血分胞絡傷損子臟虚冷氣下衝則隂挺出謂之下脱亦有因産用力偃氣而隂脱者隂臭由子臟有寒寒摶於津液藴積氣衝於隂故變臭也此亦由内熱所致子臟開由子臟宿虚因産冷氣乗之血氣得冷不得相容故令開也婦人方桂枝茯苓圓金匱治婦人宿有癥病經斷未及三月而得漏下不止胎動在臍上者為癥痼害姙娠六月動者前三月經水利時胎也下血者後斷三月衃也所以血不止者其癥不去故也當下其癥此主之桂枝丹皮茯苓桃仁去皮尖熬芍藥各等分右五味末之煉蜜丸如兔屎大毎日食前服一丸不知加至三丸當歸芍藥散金匱治婦人懐娠腹中㽲痛當歸三兩芍藥一斤茯苓四兩白术四兩澤㵼半斤芎藭三兩杵為散取方寸匕酒和日三服亁薑人參半夏丸金匱治姙娠嘔吐不止亁薑人參各一兩半夏二兩右三味末之生薑汁糊丸如梧子大飲服十丸日三葵子茯苓散金匱治姙娠有水氣身重小便不利洒淅惡寒起即頭眩葵子一斤茯苓三兩右二味杵為散飲服方寸七日三服小便利則愈當歸貝母苦參丸金匱治姙娠小便難飲食如故當歸貝母苦參各等分右三味末之蜜丸如小豆大飲服三丸加至十丸當歸散金匱婦人姙娠宜常服當歸黄芩芍藥芎藭各一斤白术半斤右五味杵為散酒服方寸七日再服姙娠常服即易産胎無苦疾産後百病悉主之白术散金匱姙娠養胎白术芎藭蜀椒三分去汗牡礪右四味杵為散酒服一錢七日三服夜一服但苦痛加芍藥心下毒痛倍加芎藭心煩吐痛不能飲食加細辛一兩半夏大者二十枚服之後更以酸漿水服之若嘔以醋漿水服復不解者小麥汁服之以後渇者大麥粥服之病雖愈服之勿置原本無分兩枳實芍藥散金匱治産後腹痛煩滿不得卧枳實燒令黒勿太過芍藥等分右二味杵為散服方寸七日三服并主癰膿以麥粥下之假令腹痛不愈此為腹中有瘀血著臍下宜下瘀血湯主之亦主經水不利下瘀血湯金匱大黄三兩桃仁二十枚􅟟虫二十枚去足熬末之蜜和為四丸以酒一升煎一丸取八合頓服之新血下如豚肝以丸作煎又一法字按新字當作瘀竹葉湯金匱治産後中風發熱面正赤喘而頭痛竹葉一把葛根三兩防風桂枝桔梗人參甘草各一兩附子一枚泡大棗十五枚生薑五兩右十味水一斗煮取二升半分温三服温覆取汗出頸項強用大附子一枚破之如豆入前藥揚去沫嘔者加半夏半升洗竹皮大丸金匱治婦人乳中虚煩亂嘔逆安中益氣生竹茹二分石膏二分桂枝一分甘草七分白薇一分右五味末之棗肉丸如彈子大飲服一丸日三夜二有熱倍白薇煩喘者加柏實一分白頭翁加甘草阿膠湯金匱治産後下痢虚極白頭翁甘草阿膠各二兩秦皮三兩黄連二兩蘗皮三兩右六味水七升煮二升半内膠令消分温三服半夏厚朴湯金匱治婦人咽中如有炙臠半夏一升厚朴三兩茯苓四兩生薑五兩亁蘇葉一兩右五味水七升煮取四升分温四服日三夜一甘麥大棗湯金匱治婦人臟燥悲傷欲哭象如神靈所作數欠伸此主之甘草三兩小麥一升大棗十枚右三味水六升煮取三升分温三服亦補脾氣温經湯金匱主婦人曽經半産瘀血在少腹不去其証唇口亁燥呉茱茰三兩當歸二兩芎藭二兩芍藥二兩人參二兩桂枝二兩阿膠二兩丹皮二兩生薑三兩甘草二兩半夏一升麥冬一升去心水一斗煮取三升分温三服亦主婦人少腹寒乆不受胎兼治崩中去血或月水來過多及至期不來調經總方土𤓰根散金匱治帶下經水不利少腹滿痛經一月再見土𤓰根芍藥桂枝􅟟虫各三兩右三味杵為散酒服方寸七日三服此治瘀血伏留在衝脈之方旋復花湯金匱寸口脈弦而大弦則為减大則為芤减則為寒芤則為虚寒虚相摶此名曰革婦人則半産漏下此湯主之旋復花三兩葱十四莖新絳少許水三升煮取一升頓服大黄甘遂湯金匱治婦人少腹滿如敦狀小便㣲難而不渇此為水與血俱結在血室也此主之大黄四兩甘遂二兩阿膠二兩右三味以水三升煮取一升頓服其血當下礬石丸金匱治經水閉不利臟堅癖不止中有亁血下白物礬石三分燒杏仁一分右二味末之煉蜜丸棗核大内臟中劇者再内之紅藍花酒金匱治婦人六十二種風腹中血氣刺痛紅藍花一兩酒一大升煎减半頓服一半未止再服蛇床子散金匱治婦人隂寒温隂中坐藥蛇床子一味末之以白粉少許和合相得如棗大綿褁内之自然温狼牙湯金匱治婦人隂中生瘡蝕爛者狼牙三兩水四升煮取半升以綿纒筯如繭絞湯瀝隂中日四遍三物黄芩湯千金治婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者此湯主之黄芩一兩苦參二兩地黄四兩右三味水六升煮取二升温服一升多吐下虫當歸建中湯千金治産後虚羸不足腹中刺痛不止吸吸少氣或苦少腹中急摩痛引腰背不能食飲産後一月日得服四五劑為善令人強壯宜當歸四兩桂枝三兩芍藥六兩生薑三兩甘草二兩大棗十二枚右六味水一斗煮取三升分温三服一日令盡若大虚者加飴糖六兩湯成内之火上煖令飴消若去血過多崩傷内衂不止加地黄六兩阿膠二兩佛手散本事方又名芎歸湯調經芎藭二兩當歸二兩右為細末毎服二錢水一盞酒二分煎七分温服回生丹此催生之聖藥錦紋大黄一斤為末蘇木三兩打碎用河水五碗煎汁三碗聴用大黒豆三升水浸取殻用絹袋盛殻同豆煮熟去豆不用將殻晒亁其汁留用紅花三兩炒黄色入好酒三四碗煎三滚去渣取汁米醋九斤陳者更佳將大黄末入凈鍋下米醋三斤文火熬之以長木筯不住手攪之成膏再加醋三斤熬之又加醋三斤次第加畢然後下黒豆汁三碗再熬次下蘇木汁次下紅花汁熬成大黄膏取入瓦盆盛之大黄鍋粑亦鏟下入後藥同磨人參當歸酒洗芎藭香附醋炒延胡索酒炒蒼术米泔浸炒蒲黄隔紙炒茯苓桃仁各一兩去皮尖油牛膝五錢酒洗甘草炙地榆酒洗川羌活橘紅白芍各五錢酒炒木𤓰青皮各三錢去穰炒乳香没藥各二錢益母草三兩木香四錢白术三錢米泔浸炒烏藥二兩五錢去皮良薑四錢馬鞭草五錢秋葵子三錢熟地一兩酒浸九次蒸晒如法製就山稜五錢醋浸透紙褁煨五靈脂五錢醋煮化焙乾細研山茰肉五錢酒浸蒸捣上三十味并前黒豆殻共晒為末入石臼内大黄膏拌匀再下熟蜜一斤共搗千杵為丸重二錢七八分隂亁不可火烘爍蠟為殻䕶之用時去蠟開骨散臨産婦交骨不開當歸五錢龜板三錢醋炙研芎藭二錢婦人髪一團水煎服奪命散産後没藥血竭等分右研為細末纔産下用童便細酒半杯煎一二沸調下二錢良乆再服其惡血下行便不衝上免生百疾下死胎方本事方桂木三錢麝香當門子一粒仝研温酒服須臾如手推下比之用水銀等藥此不致損元氣也交加散本事方治婦人榮衛不通經脈不調腹中撮痛氣多血少結聚為瘕産後中風生地黄五兩研取汁生薑五兩研取汁右交互用汁浸一夕各炒黄漬汁盡為度末之尋常腹痛酒調下三錢尤不可缺䕶胎方本事方治姙娠時氣身熱令子不落伏龍肝為末水調塗臍下二寸亁則易差即止又取井中泥塗心下亁則易海蛤散本事方治婦人傷寒血結胸膈揉而痛不可撫近海蛤滑石甘草各一兩芒硝半兩右為末毎服二錢雞子清調下小柴胡加地黄湯本事方治婦人室女傷寒發熱或發寒熱經水適來或適斷晝則明了夜則讝語如見鬼狀亦治産後惡露方來忽爾斷絶柴胡一兩一分人參黄芩甘草生地黄各半兩右為末每用五錢水二盞生薑五片棗二枚煎至八分去渣服此即熱入血室烏雞煎圓局方治婦人胎前産後諸般疾患並皆治之烏雄雞一隻人參白术石牀丹皮黄茋烏藥草菓延胡索地黄熟乾者洗焙木香琥珀肉豆蔲各半兩陳皮紅花川烏泡海桐皮芍藥白者附子泡去皮臍肉桂去粗皮蓬莪茂各三兩蒼术米泔浸切焙一兩半右細剉用烏雄雞一隻湯撏去毛及腸肚將上藥安放雞腹中用新瓦瓶好酒一斗同煮令亁去雞骨以油單紙盛焙亁為細末煉蜜丸如梧子大毎服三十丸猪蹄湯局方治乳婦氣少血衰脈澁不行絶無乳汁猪蹄一隻木通五兩右將猪蹄凈洗依食法事治次用水一斗同木通浸煮得四五升取汁飲如乳不下再服為妙紫石英丸局方治婦人乆冷無子及數經墮胎經水不調崩漏帶下三十六疾積聚癥瘕少腹急重小便白濁烏賊魚骨燒灰甘草炙柏子仁㣲炒别研山蕷各一兩半辛荑仁肉桂去粗皮卷柏石斛亁熟地黄芎窮牡䝉禹餘粮醋淬七次研各二兩人參續斷細辛桑寄生牛膝厚朴薑汁炙食茱茰當歸炒川烏泡去皮臍亁薑泡丹皮各一兩一分天門冬去心紫石英細研飛各三兩右為細末煉蜜丸如梧子大毎服三十丸温酒或米飲下空心食前日二服催生丹局方治産婦産育艱難或逆或横並宜服之母丁香末一錢麝香别研一錢兔腦髓臘月者去皮捣如泥乳香别研極細一分右拌匀以兔腦和圓如雞豆大隂亁用油紙蜜封貼温水服一丸即時産下隨男左女右手中握丸藥出是騐小調經散局方治産後敗血循經流入四肢腐爛如水服此血行腫消則愈没藥琥珀桂心白芍當歸各一錢細辛麝香各五分為末薑汁酒各少許調服此方治血分病最良二味參蘓丸治産後瘀血入肺咳𠻳喘急人參一兩紫蘇二兩木疑是蘇作一劑水煎服若既愈當用六君子湯以補脾胃若口鼻黑氣起急用此藥加附子五錢亦有得生者紫蘇飲嚴氏治子懸腹痛或臨産驚恐氣結連日不安或大小便不利當歸甘草大腹皮黒豆浸水泡人參芎藭橘皮各七分白芍炒五分紫蘇一錢薑葱引水煎服紫散元和紀用經止血崩香附子炒黒存性為末熱酒調方寸七再服立定生末安胎秦桂丸襍抄方治婦人無子秦芄桂心杜仲防風厚朴各三錢附子生用茯苓各一兩五錢白薇亁薑沙參牛膝半夏各五錢人參一兩細辛一兩一錢右十四味為末煉蜜丸如菉豆大毎服三十丸空心米飲任下未效再加數丸已覺有孕便不可服求嗣方襍抄方壬子日合藥别日不用名助陽丹細辛五錢牛膝二兩茯苓一兩没藥四錢呉茱茰白蘝白芨秦芄乳香防風當歸去蘆各三錢肉桂厚朴石菖蒲附子各二錢人參一錢以上二方治胞寒無子者隂虚血少者非宜黄龍湯活人書姙娠寒熱頭疼嘿嘿不欲飲食脇下痛嘔逆痰氣及産後傷風熱入胞宫寒熱如瘧并經水適斷病後勞復餘熱不解柴胡一兩黄芩人參甘草各一分半炙右四味每服五錢水一盞半煎一盞去渣温服桂枝湯金匱婦人得平脈隂脈小弱其人渇不能食無寒熱名姙娠桂枝湯主之於法六十日當有此證設有醫治逆者却一月加吐下者則絶之見傷寒小柴胡湯金匱婦人中風七八日續來寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀見傷寒大承氣湯金匱産後七八日無太陽症少腹堅痛惡露不盡不大便煩燥發熱切脈㣲實再倍發熱日晡時煩燥者不食食即讝語至夜即愈熱在裏結在膀胱也見傷寒小青龍湯金匱婦人吐涎沫醫反下之心下即痞當先治其吐涎沫此主之見痰飲涎沫止乃治痞㵼心湯主之見血門芎歸膠艾湯金匱治陷經漏下黑不解見通治猪髮膏煎金匱胃氣下泄隂吹而正喧此穀氣之實也見疸門腎氣丸金匱治婦人飲食如故煩熱不得卧而反倚息者此名轉胞不得溺也以胞系了戾故致此病但利小便則愈即崔氏八味丸見通治當歸生薑羊肉湯金匱治産後腹中㽲痛并治腹中寒疝虚勞不足見通治按婦人一切外感内傷等症與男子同無庸另立治法惟經帶胎産癥瘕等疾病變多端必從調經種子等法探本索源而後可施用今因金匱要畧有治婦人方論一卷故亦畧載婦人常用之方數十首至其全體仍當取唐宋以來専門之書詳考之小兒此卷方論俱從錢氏直訣選出其外有小兒常患之症而方未備者更考他書補入治小兒之法大端畧具其所選之方藥一概全録不必更將他卷查閲以便業幼科者專取此書誦習可也脈法脈弦急氣不和脈沉緩傷食脈促結虚驚脈浮為風脈沉細為寒脈亂不治全幼心鑑云小兒一歳以前看虎口食指寅卯辰三關以騐其病寅卯辰即風氣命三關也脈紋從寅關起不至卯關者易治若連卯關者難治若寅侵卯卯侵過辰者十不救一其脈紋見有五色如因驚必青㵼痢必紫當以類而推之一歳後則可用一指轉側辨其三部脈弦急浮沉四五歳後脈七八至而細數者為平九至者傷十至者困六至五至者為虚為寒弦𦂳為風癎弦急為客忤面部症左腮為肝右腮為肺額上為心鼻為脾頦為腎若色赤者熱也宜隨症治之目部症目内色赤者心實熱淡紅者心虚熱青者肝實熱淡青者肝虚熱黄者脾實熱㣲黄者脾虚熱白而混者肺實熱目無睛光者腎虚也五臟虛實寒熱心主驚實則呌哭發熱飲水而搐虚則卧而悸動不安視其睡口中氣温或合面睡及上竄咬牙皆心熱也心氣實則喜仰卧肝主風實則目直大呌呵欠項急頓悶虚則咬牙多欠肝熱則手尋衣領及亂捻物壯熱飲水喘悶目赤發揚肝有風則目連劄得心熱則發搐或筋脈牽繫而直視風甚則身反張強直不搐心不受熱也當補腎治肝脾主困實則困睡身熱飲水虚則吐㵼生風面白腹痛口中氣冷不思飲食或吐清水呵欠多睡者脾氣虚而欲發驚也肺主喘實則悶亂喘促有飲水者有不飲水者虚則哽氣長出氣肺熱則手掐眉目鼻面肺盛復感風寒則胸滿氣急喘𠻳上氣肺臟怯則唇白悶亂氣粗喘促哽氣者難治肺虚甚也腎主虚無實也惟瘡疹腎實則變黒陷若胎禀虚怯神氣不足目無睛光面白顱解此皆難育雖育不壽或更加色欲變症百出愈難救療或目畏明下竄者蓋骨重而身縮也咬牙者腎水虚而不能制心火也變蒸小兒在母腹中乃生骨氣五臟六腑成而未全自生之後即長骨脈五臟六腑之神智也變者易也自内而長自下而上又身熱故已生之日後三十二日一變變毎畢即情性有異於前何者長生腑臟智意故也何為三十二日長骨添精神人有三百六十五骨除手足中四十五碎骨外有三百二十自生下骨一日十段而上之十日百段三十二日計三百二十段為一遍亦曰一蒸骨之餘氣自腦分入齦中作三十二齒而齒牙有不及三十二數者由變不足其常也或二十八日即至長二十八齒以下倣此但不過三十二之數也凡一周遍乃發虚熱諸病如是十周則小蒸畢也計三百二十日生骨氣乃全而未壯也急驚風症治小兒急驚因聞大聲或驚而發搐搐正如故此熱生於心身熱面赤引飲口中氣熱二便黄赤甚則發搐蓋熱甚生風陽盛而隂虚也宜利驚丸除其痰熱不可用巴豆之藥慢驚風症治小兒慢驚因病後或吐㵼或藥餌傷損脾胃而肢體逆冷口鼻氣㣲手足瘈瘲昏睡露睛此脾虚生風無陽之症也小兒初生壯熱吐哯身體強直手足抽掣目反直視是胎驚風症也發搐症治驚癎發搐男則目左視無聲右視有聲女則右視無聲左視有聲相勝故也欲騐逆順男則握拳拇指叉入食指中為順於外為逆女則又入食指為逆於外為順仍參吮乳不能類以治其母後倣此若傷風發搐口中氣熱呵欠頓悶手足動摇若傷食發搐身温多睡或吐不思食百日内發搐真者不過二三次必死假者頻發不死真者内生驚癎假者外傷風冷血氣未實不能勝任故發搐癲癎症治凡治五癎皆隨臟治之每臟各有一獸之形並用五色丸治之發而重者死病甚者亦死若反折上竄其聲如犬症屬肝也若目瞪吐舌其聲如羊症屬心也若目直腹痛其聲如牛症屬脾也若驚跳反折手縱其聲如雞症屬肺也若肢體如尸口吐涎沫其聲如猪症屬腎也小兒半歳之間有病以名中食三指曲按額前眉上髪際之下若三指俱熱感受風邪鼻塞氣粗三指俱冷感受風寒臟冷吐㵼若食中二指熱上熱下冷名中二指熱夾驚之候食指熱胸膈氣滿乳食不消水鏡訣云隂陽運合男女成形已分九竅四肢乃生五臟六腑部位各分逆順難明若憑寸口之浮沉必至横亡於孩子須明虎口辨别三關消詳用藥必無差誤未至三歳看虎口三關若脈見風關尚易治交氣關則難治交命關為死症又當辨其色如獸驚三關必青水驚三關必赤人驚三關必黑若紫色主㵼痢黄色是雷驚三關脈通度乃極驚之症必死有紋或青或紅如線直者是母食傷脾左右一様者是驚積齊發紋有三條白主肺傷風痰或齁䶎聲青主傷寒及𠻳紅主泄㵼有黒相兼主下痢紅多白痢黒多赤痢有紫相兼虎口脈亂乃氣不和也蓋脈紋見有五色由其病甚色能加變至於純黑者不可得而治矣五臟瘡疹証治小兒在胎食五臟血穢伏於命門若遇天行時熱或乳食所傷或驚恐所觸則其毒當出初起之候面燥腮赤目胞亦赤呵欠頓悶乍凉乍熱咳𠻳􅅉噴手足稍冷驚悸多睡宜究其何臟所發察其何因所起令乳母亦須節飲食慎風寒五臟各有一症肝臟水疱青色而小肺臟膿疱色白而大心臟癍色赤而小脾臟疹小次癍故色赤黄淺也先發膿疱後發疹子者順先疹子後癍者順反此為逆惟腎無候但見骫冷耳冷是也若寒水來侮故黒陷而耳骫反熱為逆也急用百祥丸牛李膏各三服不愈者死如發潮熱三日以上出不甚多而熱不止者未盡也潮熱隨出如早食潮熱不已為水疱之類也一發便出盡者重瘡夾疹者半輕半重也出稀者輕裏外微紅者輕外黒裏赤者㣲重外白裏黑者大重也瘡端裏黒㸃如針孔者勢最劇也青亁紫陷昏睡汗出煩燥熱渇腹脹啼喘二便不通者困也有大熱利小便解熱毒若紫黒亁陷或寒戰咬牙或身黄腫紫者急以百祥丸下之復惡寒不已身冷出汗耳骫反熱者死症也此腎氣大旺脾虚不能制故耳下後身熱氣温飲水者可治以脾土勝腎寒去而温熱也不黒者不可下下則内虚歸腎大抵瘡疹屬陽在春夏為順秋冬為逆冬月腎旺盛寒病多歸腎變黑又當辨春膿疱夏黒陷秋癍子冬疹子者十活四五黒者十難救一身熱煩渇腹滿而喘便澁面赤悶亂大吐此當利小便不瘥者宣風散下之若能食而痂頭焦起或未焦而喘實亦可下之若五七日痂不焦是内熱也宣風散𨗳之生犀汁解之癍疹作搐為脾虚而肝則乗心火妄動風熱相搏也當㵼心肝補脾土瘡黑而忽便膿血并痂皮者乃脾氣實腎邪退而病安也及㵼而乳食不化者脾虚不能制腎故難治此即近世痘瘡之症其病與癍疹同列並無起脹成漿收靨等説大抵宋時之瘡形治法不過如此近日愈變愈重與癍疹絶不相類治亦逈别因知天下之病隨時隨地變化無窮所以内經有五運六氣異法方宜等論為醫者苟不能知天運之轉移及五方之體性終有偏執之處不可以稱上工也痘瘡無人可免自種痘之法起而小兒方有避險之路此天意好生有神人出焉造良法以救人也然人往往以種痘仍有死者疑而不敢種不知乃苖之不善非法之不善也况即有死者不過百中之一較之天行惡痘十死八九者其安危相去何如也至於治痘之書自宋至今不下數十種莫不和平切近孰意邇年以來崇奉怪書不論小兒之強弱痘症之虚實概以大黄數兩石膏數斤為一劑使兒真火消盡元氣大傷絶其起脹成漿之路因向其父母云此症或不能起脹或不能成漿而死至期果死其父母以為神目不知此實醫者致之死地也或幸不死則信為大黄石膏之功而此二味遂為不祧之藥矣又方中多用蜂房蝎子蠐螬蚯蚓蚌汁等惡物成升成碗灌入兒腹以增其毒而爛其胃宛轉就死尤可痛心夫近日時醫治精壯男婦之病見用清火之藥一二錢羣以為此寒凉之品斷不可服必當用附桂參术獨於數月之小兒反用大寒大毒之藥成兩成斤俾死者接踵而不悔何耶醫者不足責為父母而目覩其子之服此毒藥以致慘死毫無疑怨則何心也丹瘤丹瘤之症因熱毒客於腠理搏於血氣發於皮膚當以白玉散塗之傷風兼變症治二傷風兼肝則發搐頓悶兼心則驚不安兼肺則喘𠻳哽氣兼脾則困睡兼腎則目畏明各隨補其母諸經發熱症治三潮熱者時間發熱過時即退來日依時而發此欲發驚也壯熱者常熱不已甚則發驚癎也風熱者身熱而口中氣熱乃風邪外感也温熱者肢體㣲熱也發熱而不欲飲水者胃氣虚熱也發熱而飲水作渇喜冷飲食者胃氣實熱也吐㵼症治若吐乳㵼黄傷熱乳也吐乳㵼青傷冷乳也皆當下之吐㵼昏倦睡不露睛者胃實熱也吐痰涎及緑水者胃虚冷也初生下吐因穢惡下咽故也凡初生急須拭淨口中否則啼聲一發穢物咽下致生諸病拭去穢物出痘必稀五臟内外疳症主治凡小兒疳在内目腫腹脹㵼痢青白體痩羸弱疳在外鼻下赤爛頻揉鼻耳或肢體生瘡鼻瘡用蘭香散諸瘡用白粉散肝疳一名筋疳白膜遮睛或㵼血面痩心疳面黄頰赤身體壯熱脾疳一名肥疳體黄痩削皮膚亁澁而有瘡疥腹大嗜土腎疳一名骨疳肢體痩削遍生瘡疥喜卧濕地肺疳一名氣肝喘𠻳氣促口鼻生瘡若患潮熱當先補肝後㵼心若妄以硝黄諸藥痢之若患癖當消磨若誤以巴豆硼砂下之及傷寒誤下皆能成疳其初病者為熱疳久病者為冷疳冷熱相兼者津液短少者皆因大病脾胃虧損内亡津液所致當固脾胃為主早為施治則不變敗症也腹痛腫脹諸症小兒腹痛體痩面色㿠白目無睛光口中氣冷不思飲食或嘔利撮口此脾土虚而寒水所侮也若口中氣温面色黄白目無睛光或多睡惡食或大便酸臭此積病也若腹脹而悶亂喘滿者實也若不悶亂喘滿者脾虚也誤下之以致目疱腮面四肢浮腫肚腹愈脹因下而喘脾氣益虚也脾虚不能勝腎水隨肺氣行於四肢如水狀若侵浮於肺即大喘也若腎熱傳於膀胱熱甚逆於脾肺脾胃虚而不能制腎水流走四肢而身面皆腫若土勝則刑於肺故令喘也若口吐涎沫或吐清水面㿠白心腹痛有時者䖝痛也與癎相似但目不斜手不搐也安虫散主之若腹中有癖不食但飲乳是也蓋小兒病此良由乳食不消伏於腹中乍冷乍熱飲水過多即蕩滌腸胃亡失津液脾胃虚弱不能傳化水榖以致四肢羸瘦肚腹漸大而成疳矣五臟雜症主治喜汗者厚衣卧而額汗出也盜汗者肌肉虚而睡中汗出也胃虚汗者上至項下至臍也六陽虚汗者上至頭下至項難治夜啼者小兒筋骨血脈未成而多哭脾臟冷而痛也當與温中藥或花火膏主之若虚怯為冷所乗則唇青驚啼者邪氣乗心也當以安神丸主之若浴後拭臍不亁風入作瘡令兒撮口甚者是脾虚也若頻撮口是氣不和也弄舌熱者脾臟㣲熱令舌絡牽𦂳時時舒熱或飲水者脾胃虚而津液少也兼面黄肌痩五心煩熱者疳積也大病未已而弄舌者㓙解顱者生下顖門不合也長必多愁少笑目白精多面色㿠白或體消痩皆腎虚也胎肥者生下豐厚目睛粉紅大便亁難時出涎水胎熱者生下有血色時呌哭身熱淡黄目睛多赤大便色黄急欲食乳並用浴體法主之胎怯者生下面白肌肉痩弱大便白水身無血色哽氣多噦亦用浴體法急欲乳不能食者此風邪由臍而藴熱心脾致舌厚唇燥不能吮乳也龜胸龜背者由兒生下風客於脊入於骨髓致成龜背若肺熱脹滿攻於胸膈即成龜胸並用龜尿㸃其骨節自愈取尿法用青蓮葉安龜在上用鏡照之其尿自出失音吐㵼或大便後雖有聲而不能言又能咽物者非失音此腎怯不能上接於陽也凡口噤不止則失音語遲若大病後身目皆黄者黄病也身病背強大小便澁一身盡黄小便黄赤此黄疸也㵼者難治若百日或半年不因病而身黄者胃熱胎疸也若淡黄兼白者胃怯也長大不行行則脚軟齒久不生生則不固髪久不生生則不黒皆胎弱小兒方㵼青丸治肝經實熱急驚搐搦羌活壬乙同歸一治故用羌活大黄㵼諸實熱芎藭入手足厥隂辛以緩肝山梔仁㵼心火實則㵼其子龍胆草炒益肝胆氣止驚當歸入足厥隂以其同藏血也防風各等分右為末煉蜜丸芡實大每服半丸竹葉湯入砂糖化下導赤散治小腸實熱小便秘赤生地黄心與小腸之藥木通利小腸之熱故錢氏用以導赤甘草生㵼心火各等分右為末毎服一錢入淡竹葉凉心經水煎生犀散治心經虚熱地骨皮赤芍藥柴胡亁葛各一兩甘草五錢犀角二錢鎊主風熱驚癎鎮肝除心熱血丹溪云犀角痘後用以散餘毒無毒而虚者非宜右為末毎服一二錢水煎㵼黄散治脾胃實熱藿香葉入手足太隂經助脾開胃止嘔甘草各七錢五