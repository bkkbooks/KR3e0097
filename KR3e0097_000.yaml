  text: 欽定四庫全書子部五
  hash: sha256:385bc2d94867d1b606f43bb11ebdc68a3a5579aafe48be2b02b9eb652717f689
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0097_WYG_000-1a, image: WYG0785/WYG0785-0343a.png}
body:
  text: 蘭臺軌範總目醫家類卷一通治方卷二風痺歴節痿厥虚勞消症附強中卷三傷寒百合感冒寒熱霍亂附轉筋痓癃閉利淋卷四濕暍痎瘧痢癲狂癎痰飲咳𠻳附肺脹疝卷五喘臌脹水腫肺痿附肺癰諸血噎膈嘔吐附關格泄瀉卷六積聚癥痞蟲附狐惑諸痛頭心胃腰腹脚氣附轉筋卷七疫癘鬼疰諸疸附黄汗情志卧夢五竅病耳目鼻口齒雜病卷八婦人小兒臣等謹案蘭臺軌範八卷國朝徐大椿撰大椿持論以張機所傳為主謂為古之經方唐人所傳已有合有不合宋元以後則彌失古法故是編所録病論惟取靈樞素問難經金匱要略傷寒論隋巢元方病源唐孫思邈千金方王燾外臺秘要而止所録諸方亦多取於諸書而宋以後方則采其義有可推試多獲效者其去取最為謹嚴每方之下多有附註論配合之㫖與施用之宜於疑似出入之間辨别尤悉較諸家方書但云主治某症而不言其所以然者特為精密獨其天性好奇頗信服食之説故所註本草於久服延年之論皆無所駁正而此書所列通治方中於千金鍾乳粉局方玉霜圓之類金石燥烈之藥往往取之是其通中之一蔽觀是書者亦不可不知所短焉乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀蘭臺軌範原序欲治病者必先識病之名能識病名而後求其病之所由生知其所由生又當辨其生之因各不同而病狀所由異然後考其治之之法一病必有主方一方必有主藥或病名同而病因異或病因同而病症異則又各有主方各有主藥千變萬化之中實有一定不移之法即或有加减出入而紀律井然先聖後聖其揆一也自南陽夫子以後此道漸㣲六朝以降傳書絶少迨唐人外臺千金不過裒集古方未能原本内經精通病變然病名尚能確指藥味猶多精切自宋以還無非隂陽氣血寒熱補㵼諸膚廓籠統之談其一病之主方主藥茫然不曉亦間有分門立類先述病原後講治法其議論則襍亂無統其方藥則浮泛不經已如雲中望月霧裏看花仿彿想像而已至於近世則惟記通治之方數首藥名數十種以治萬病全不知病之各有定名方之各有法度藥之各有專能中無定見隨心所憶姑且一試動輙誤人余深憫焉兹書之所由作也本内經以探其源次難經及金匱傷寒論以求其治其有未備者則取六朝唐人之方以廣其法自宋以後諸家及諸單方異訣擇其義有可推試多獲效者附焉庶幾古聖治病之法尚可復覩使學者有所持循不至傍偟無措至於推求原本仍當取内經金匱等全書潛心體認而後世之書亦當窮其流𣲖掇其精華摘其繆誤而後此書之精意自能融㑹貫通而心有實獲則變化在我矣乾隆二十九年四月洄溪徐大椿書於呉山之半松書屋凡例一毎病先叙病原首内經次金匱傷寒次病源千金外臺宋以後亦間有採者前人已有之論則後者不録若一病之中為病不一則即詳著於總名之下不復另立病名方之次第亦然一一病必有一方專治者名曰主方而一病又有幾種毎種亦各有主方此先聖相傳之法莫之能易也俱載本病之下其有此病之主方而他病亦可用者則他病下祗載方名并治法註云見某病門以便翻閲一專治一病為主方如一方而所治之病甚多者則為通治之方先立通治方一卷以俟隨症揀用變而通之全在乎人服食養生皆在其中矣一金匱諸方非南陽所自造乃上古聖人相傳之方所謂經方是也此乃羣方之祖神妙淵㣲不可思議分載於各症之下學者當精思熟識以為凖的一傷寒一科宜將傷寒論諸條字字體認其一百十三方亦當字字參悟余已將一百十三方編成類方一書矣此書無病不載豈可獨遺傷寒故畧取六經主病之方隨症分録其外諸方兼治襍病者俱分載各症條下蓋傷寒諸方當時本不專治傷寒南陽取以治傷寒之變症耳學者當合金匱傷寒兩書相參並觀乃能深通其義而所投輒效矣一後世諸方其精實切病者皆附於古方之後其有將古方増减一二味即另立方名者殊屬僭妄蓋加减之法稍知醫理者皆能之若易一二味即自名一方則方名不可勝窮矣今一概不録或有襍藥竒法據稱得之秘傳而其理不可解則有效有害皆未可知一概不録或方中有難得之藥及無人能識之藥并違禁之藥如胎骨之類一概不録其有飛鍊禁咒等方既乏師承又屬𣺌茫一概不録至於大藥重劑藥品既多修治艱鉅此乃服食之大藥非救病之急劑學者平時查考以廣見聞可也一概不録學務窮經志切師古不尚竒功祇求實效此書之志如是而已一凡事最忌耳食孔子所謂道聽而塗説也如治浮火者當引火歸元乃指腎臟虚寒火不能納非治實火及别臟之火也如類中風用地黄引子乃治少隂純虚之痱症非治風火痰厥之中風也如暑天用大順散乃治夏日貪冷中寒之症非治暑熱正病也如大便不通用蘆薈丸乃治廣腸堅結諸藥不效之病非治津枯液燥之病也虚勞用建中湯乃治陽虚脉遲之症非治隂虚火旺之症也近人耳聞有此數方並不細審病因惘然施用受禍必烈集中俱為標出此外不止一端學者所當痛省一通天地人之謂儒百家藝術皆士大夫所宜究心况疾病乃身命所關豈可輕以諉人此集溯本窮源簡括明備人人易曉病者醫者對症尋方互相考証則是非立辨不致以性命輕擲未始非衞生之一助云
