body:
  text: 蘭臺軌範卷三吳江徐大椿撰傷寒素問素熱論篇帝曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日之間其愈皆以十日以上者何也岐伯對曰巨陽者諸陽之屬也其脈連於風府故為諸陽主氣也人之傷於寒也則為病熱熱雖盛不死其兩感於寒而病者必不免於死帝曰願聞其故岐伯曰傷寒一日巨陽受之故頭項痛腰脊強二日陽明受之陽明主肉其脈俠鼻絡於目故身熱目疼而鼻乾不得卧也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受其病而未入於臟者故可汗而已四日太隂受之太隂脈布胃中絡於嗌故腹滿而嗌乾五日少隂受之少隂脈貫腎絡於肺繫舌本故口燥舌乾而渴六日厥隂受之厥隂脈循隂器而絡於肝故煩滿而囊縮三隂三陽五臟六腑皆受病榮衛不行五臟不通則死矣隂脈皆連五臟故曰入臟非風寒直入臟中也其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太隂病衰腹減如故則思飲食十一日少隂病衰渴止不滿舌乾已而嚏十二日厥隂病衰囊縱小腹微下大氣皆去病日已矣帝曰治之奈何岐伯曰治之各通其臟脈病日衰已矣其未滿三日者可汗而已其滿三日者可泄而已水熱穴論帝曰人傷於寒而傳為熱何也岐伯曰夫寒甚則生熱也兩感素熱論帝曰其病兩感於寒者其脈應與其病形何如岐伯曰兩感於寒者病一日則巨陽與少隂俱病則頭痛口乾而煩滿二日則陽明與太隂俱病則腹滿身熱不欲食譫言三日則少陽與厥隂俱病則耳聾囊縮而厥水漿不入不知人六日死帝曰五臟已傷六腑不通榮衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其血氣盛故不知人三日其氣盡故死兩感則表裏同病溫病暑病素熱論凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑暑當與汗皆出勿止隂陽交素評熱病論帝問曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病為何岐伯曰病名隂陽交交者死也帝曰願聞其説岐伯曰人所以汗出者皆生於榖榖生於精今邪氣交爭於骨肉而得汗者是邪却而精勝也精勝則當能食而不復熱復熱者邪氣也汗出者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也病而留者其壽可立而傾也且夫熱論曰汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死也遺證素熱論帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱盛而強食之故有所遺也若此者皆病已衰而熱有所藏因其榖氣相薄兩熱相合故有所遺也帝曰善治遺奈何岐伯曰視其虛實調其逆從可使必已矣帝曰病熱當何禁之岐伯曰病熱少愈食肉則復多食則遺此其禁也難經傷寒有幾其脈有變不然傷寒有五有中風有傷寒有濕溫有熱病有溫病其所苦各不同中風之脈陽浮而滑隂濡而弱濕溫之脈陽濡而弱隂小而急傷寒之脈隂陽俱盛而緊澀熱病之脈隂陽俱浮浮之而滑沉之散澀溫病之脈行在諸經不知何經之動也各隨其經所在而取之傷寒有汗出而愈下之而死者有汗出而死下之而愈者何也然陽虛隂盛汗出而愈下之即死陽盛隂虛汗出而死下之而愈陽虛隂盛者風傷衛而汗自泄寒氣在內而未出也陽盛隂虛者身熱汗閉燥火內結津液乾枮隂氣欲竭也此以有邪處為虛無邪處為盛傷寒論六經脈症太陽病脈浮頭項強痛而惡寒尺寸俱浮者太陽受病也其脈上連風府故頭項痛腰脊強發熱汗出惡風脈緩者名曰中風惡寒體痛嘔逆脈隂陽俱緊者名曰傷寒發熱惡寒者發於陽也無熱惡寒者發於隂也發於陽者七日愈發於隂者六日愈以陽數七隂數六也陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊惡寒未離太陽陽明病若能食名中風不能食名中寒尺寸俱長者陽明受病也其脈俠鼻絡於目故身熱目疼鼻乾不能卧陽明外證身熱汗自出不惡寒反惡熱也邪氣已離太陽故不惡寒陽明脈大以上皆陽明之經病有太陽陽明有正陽陽明有少陽陽明此三條皆傳腑之症太陽陽明者脾約是也少陽陽明者發汗利小便已胃中燥煩實大便難是也陽明之為病胃家實也此正陽陽明陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也少陽之為病口苦舌乾目眩也尺寸俱弦者少陽受病也其脈循脅絡於耳故胸脅痛而耳聾少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚傷寒脈弦細頭痛發熱者屬少陽頭痛發熱與太陽同而脈之弦細獨異三陽合病脈浮大上關上但欲眠睡目合則汗內熱已極傷寒六七日無大熱外熱輕則內熱重其人躁煩者此為陽去入隂也若熱輕而不煩躁則病欲退矣傷寒三日三陽為盡三隂當受邪其人反能食而不嘔此為三隂不受邪也太隂之為病腹滿而嘔食不下自利益甚時腹自痛尺寸俱沉細者太隂受病也其脈布胃中絡於嗌故腹滿而嗌乾傷寒脈浮而緩手足自溫者繫在太隂同一太隂病而有沉細浮緩之殊蓋沉細乃太隂病脈浮緩乃太隂本脈也自利不渴者屬太隂以臟有寒故也當溫之宜服四逆輩少隂自利而渴熱入下焦也此自利而不渴寒入中焦也少隂之為病脈微細但欲寐也衛氣行於陽則寤行於隂則寐少隂病欲吐不吐心煩但欲寐五六日自利而渴者屬少隂也尺寸俱沉者少隂受病也以其脈貫腎絡於肺繫舌本故口燥舌乾而渴厥隂之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止尺寸俱微緩者厥隂受病也以其脈循隂器絡於肝故煩滿而囊縮厥隂中風脈微浮為欲愈不浮為未愈傷寒傳足不傳手經脈此本陶節庵最為明晰足太陽脈起於目內眥從頸下後項連風府行身之後終於足其外症頭疼項強腰脊痛骨節痛惡心發熱惡寒標病宜發汗但太多則亡陽筋惕肉瞤小便不利者當利自利者不可利利之引熱入膀胱其人如狂不可下下之為結胸足陽明脈起於鼻頞絡於目循面下人迎入缺盆下膈屬胃行身之前終於足之厲兊穴故其症目痛鼻乾不得眠頭頞痛身熱微惡寒無汗者屬標病宜解肌身熱發渴汗出屬本病宜清熱解肌若惡熱自汗發渴去衣被發斑發黃發狂大便祕腹滿此正陽明胃腑病也宜下之足少陽脈起於目鋭眥上抵頭循角絡耳中循胸脅行身之側終於足故頭角痛目眩耳聾脅疼心下痞寒熱往來嘔而口苦膽熱也此經無標本只有小柴胡一湯和解隨症加減有三禁汗之犯太陽下之犯陽明利之犯少隂脈弦數者是本經症足太隂為三隂經首其脈始於足大指上行至腹絡於喉連舌本行身之前也故腹滿自利咽乾嘔吐腹滿邪入脾也嘔吐脾氣不和也自利挾熱下利也咽乾脾脈連喉也頭不疼隂脈至頸而還也身微熱手足溫表邪解而傳入裏也身目俱黃標病宜平熱腹滿硬痛渴而喉乾小便赤大便難本病雖宜下然當分寒熱施治足少隂脈始於足心上行貫脊循喉絡舌本下注心胸行身之後也其病手足乍冷乍溫身不熱者標病二便不通舌乾口燥者本病此經本熱而標寒也宜急下以存腎水雖自利此是飲湯水所致不可疑為寒也初病大熱至此變為厥冷者是熱深厥亦深也急下之至隂又難拘定法因分直中者寒症傳經者熱症大抵六經中惟此難辨有直中真隂者有夾隂中寒者有夾隂傷寒者有虛陽伏隂者有隂極發躁者有漏底傷寒者前二症身不熱厥冷全似少隂傳經而冷者後四症身熱面赤又全似陽大要口燥舌乾渴而譫語大便實者傳經熱症也足冷嘔吐㵼痢不渴或惡寒腹痛者直中真寒症也足厥隂脈始於足大指上循隂器抵小腹循脅上口唇與督脈會於巔頂行身之側也其症煩悶囊拳消渴舌捲譫語大便不通而頭疼手足乍冷乍溫者此是陽經傳來熱邪本病宜急下若發熱惡寒狀如瘧疾此是熱邪在經標病宜和解若不嘔便清當有大汗至而自愈頭疼者以督脈會於巔頂故也大抵熱深厥亦深則舌捲囊縮肝主筋也隂寒冷極亦捲縮須以口渴不渴足冷不冷脈沉實沉細别之厥隂屬熱者甚多後人皆指為極寒概用溫熱誤人無算熟讀傷寒論自知傷寒六經治法方諸方精義俱詳余所著傷寒類方中不更贅桂枝湯俱本傷寒論治太陽中風頭疼發熱汗出惡風桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩大棗十二枚擘右五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升餘以助藥力溫覆令一時許通身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服當小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷粘滑肉麵五辛酒酪臭惡等物此服外感風寒之藥服法俱當如此麻黃湯治太陽中寒頭身俱痛發熱無汗惡風而喘麻黃三兩去節桂枝二兩去皮甘草一兩炙杏仁七十個湯泡去皮尖右四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥餘如桂枝法將息桂枝麻黃各半湯治傷寒向愈脈微緩惡寒身癢桂枝一兩十六銖去皮芍藥酒洗生薑切甘草炙麻黃各一兩去節大棗四枚擘杏仁二十四個湯浸去皮尖及兩仁者右七味以水五升先煮麻黃一二沸去上沫內諸藥煮取一升八合去滓溫服六合令微汗則愈桂枝加葛根湯治太陽病項背強几几反汗出惡風葛根四兩芍藥二兩甘草二兩生薑三兩切大棗十二枚擘桂枝三兩去皮右六味以水一斗先煮葛根減二升去上沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥餘如桂枝法本方無麻黃若加麻黃則為葛根湯矣陳無已本誤加葛根湯治太陽病項背強無汗惡風者又治太陽陽明合病自下利者葛根四兩麻黃三兩去節桂枝二兩去皮芍藥二兩切甘草二兩炙生薑三兩切大棗十二枚擘右七味㕮咀以水一斗先煮麻黃葛根減二升去沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥餘如桂枝法將息及禁忌葛根黃芩黃連湯治太陽症誤下利遂不止喘而汗出者此主之葛根半斤甘草炙黃芩各二兩黃連三兩右四味以水八升先煮葛根減二升入諸藥煮取二升去滓分溫再服桂枝加芍藥湯治太陽誤下腹滿時痛屬太隂也此主之大實痛者加大黃一兩即桂枝加大黃湯桂枝三兩芍藥六兩酒洗甘草二兩炙生薑三兩切大棗十二枚擘右五味㕮咀以水七升微火煮取三升去滓適寒溫服一升此即桂枝湯加芍藥一倍即另成一方而以之治太隂症分兩輕重之所關如此太隂病必腹滿大青龍湯治太陽中風脈浮緊惡寒發熱身疼不汗出而煩躁者麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁四十粒去皮尖生薑三兩切大棗十二枚擘石膏如雞子大碎右七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也此風寒兩傷之方治按載大青龍何以不載小青龍蓋小青龍傷寒不解心下有水氣之症非傷寒正方也桂枝加桂湯治燒針令其汗針處被寒核起微赤必發奔豚灸其核上各一壯與此湯即桂枝湯加桂二兩小柴胡湯治少陽中風往來寒熱胸脅苦滿心煩喜嘔腹痛心悸頭汗出舌上胎白及婦人熱入血室等症柴胡半斤黃芩人參甘草各三兩半夏半升洗生薑三兩切大棗十二枚擘右七味水一斗二升煮取六升去滓再煎取三升溫服一升日三服若胸中煩而不嘔去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞鞕去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂三兩溫覆取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩此方加減法須細稔大柴胡湯治傷寒十餘日柴胡症仍在嘔而心下急心中痞鞕而痢熱結在裏往來寒熱等症柴胡半斤黃芩三兩芍藥三兩半夏半升洗生薑五兩切枳實四枚炙大棗十二枚擘大黃二兩右八味以水一斗二升煮取六升去滓再煎溫服一升日三服大承氣湯治傷寒十餘日吐下後不解晡時發潮熱獨語如見鬼狀尋衣摸牀胃中有燥屎也此下之大黃四兩酒洗厚朴半斤去皮炙枳實五枚炙芒硝三合右四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上微火一兩沸分溫再服得下餘勿服胃中非存燥屎之所此言胃中者指足陽明言即所謂胃中實是也乃腸胃之總名小承氣湯治汗多微發熱不惡寒或小便數而大便鞕讝語者與此湯微和胃氣大黃四兩厚朴二兩去皮炙枳實三枚炙右三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之調胃承氣湯治胃氣不和不惡寒但熱腹微滿而煩與此湯大黃四兩去皮清酒浸甘草二兩炙芒硝半斤右三味㕮咀以水三升先煮大黃甘草取一升去滓內芒硝更上火微煮令沸少少溫服不惡寒乃外邪已盡方可下此仲景之要法桃核承氣湯治太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻宜先與桂枝解外外解已但小腹急結此主之桃仁五十個去皮尖桂枝二兩去皮大黃四兩芒硝甘草炙各二兩右五味以水七升煮取二升半去滓內芒硝更上火微沸下火先令溫服五合日三服當微利抵當湯治傷寒六七日少腹鞕小便自利其人如狂喜忘大便黑此有蓄血水蛭熬虻蟲各三十個去翅足熬桃仁三十個去皮尖大黃三兩酒浸右四味為末以水五升煮取三升去滓溫服一升不下再服抵當丸治傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可餘藥水蛭二十個虻蟲二十五個桃仁二十個去皮尖大黃三兩右四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服大陷胸湯治表未解而醫反下之胃虛而陽氣內陷心下有鞕舌上燥渴小有潮熱心上至少腹痛不可近大黃六兩去皮芒硝一升甘遂一錢右三味以水六升先煮大黃取二升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服結胸乃水飲為患傷寒論云此為水結故用甘遂大陷胸丸治病發於陽而反下之熱入因作結胸病發於隂而反下之因作痞所以成結胸者以下之太早故也大黃半斤葶藶子熬芒硝杏仁去皮尖熬黑各半升右四味搗篩二味內杏仁芒硝合研如脂和散取如彈丸一枚别搗甘遂末一錢七白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效小陷胸湯治病在心下按之則痛脈浮滑者黃連一兩半夏半升洗栝蔞實大者一個右三味以水六升先煮栝蔞取三升去滓內諸藥煮取二升去滓分溫三服白虎湯治脈滑而厥裏有熱也又治三陽合病腹滿身重讝語遺尿自汗出者知母六兩石膏一斤碎甘草二兩粳米六合右四味以水一斗煮米熟湯成去滓溫服一升日三服陽極於內發散則路逺故從小便去之麻黃附子細辛湯治少隂始得病反發熱脈沉者麻黃去節細辛各二兩附子一枚泡去皮破八片右三味以水一斗先煮麻黃減二升去上沫內藥煮取三升去滓溫服一升日三服四逆散治少隂傳經熱邪四逆或咳或悸或小便不利或腹中痛或泄痢下重者甘草炙枳實破水漬炙乾柴胡芍藥各十分右四味搗篩白飲和服方寸七日三服咳者加五味子乾薑各五分并主下痢悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮令拆泄痢下重者先以五升煮薤白三升煮取三升去滓以散三方寸匕內湯中煮取一升半分溫再服熱邪入深乃見四逆誤認為寒貽害匪細薤白能治下重以能泄大腸之氣也四逆湯治脈沉體痛溫溫欲吐下利清榖手足厥冷內寒外熱脈微欲絶等症甘草二兩炙乾薑一兩半附子一枚生用去皮破八片右三味㕮咀以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩四逆湯不可輕用一症不其即當細審必諸症皆全方可決用無疑四逆加人參湯治痢後亡血本方加人參通脈四逆湯治下痢清穀脈絶汗出而厥本方加乾薑一倍通脈四逆加豬膽汁湯治汗出而厥脈絶拘急本方加豬膽汁當歸四逆湯治手足厥冷脈細欲絶脈浮革因爾腸鳴者當歸桂枝芍藥各三兩細辛二兩大棗二十五個甘草通草各二兩右七味以水八升煮取三升去滓溫服一升日三服此四逆症乃從太陽誤下所致非厥隂少隂之四逆也故仍以桂枝湯為主理中丸及湯治霍亂頭痛發熱身疼痛寒多不用水者理中湯若大病瘥後喜唾久不了了胃上有寒者用理中丸人參甘草炙白术乾薑各三兩右四味搗篩為末蜜丸如雞子黃大以沸湯數合和一丸研碎溫服之日三服夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服四逆乃溫下焦中焦之法理中為溫上焦中焦之法各有部位也附子㵼心湯治心下痞而復惡寒汗出大黃二兩黃連黃芩各一兩附子一枚泡去皮破别煮取汁右四味切三味以麻沸湯二升漬之須臾絞去滓內附子汁分溫再服治上焦用生藥故漬而不煎附子能回陽止汗梔子䜴湯治汗吐下後虛煩不得眠及大下之後身熱未去心中結痛或微煩者梔子十四枚擘香䜴四合綿褁右二味以水四升先煮梔子得二升半內䜴煮取一升半去滓分為二服溫進一服得吐者止後服邪在至髙之分以此吐之所謂在上者因而越之也此吐方之最和平者真武湯治太陽汗出不解仍發熱心悸頭眩身瞤動振振欲僻地者又治少隂至四五日小便不利四肢沉重疼痛自下痢此為有水氣茯苓芍藥生薑各三兩切白术二兩附子一枚泡去皮破八片右五味以水八升煮取三升去滓溫服七合日三服此治水逆之正方若咳者加五味半升細辛乾薑各一兩若小便利者去茯苓若下痢者去芍藥加乾薑二兩若嘔者去附子加生薑足前成半斤大黃黃連㵼心湯治傷寒脈浮緊而復下之緊反入裏則作痞按之自濡但氣痞耳此主之大黃二兩黃連一兩右二味以麻沸湯二升漬之須臾絞去滓分溫再服凡治下焦之補劑當多煎以熟為主治上焦之㵼劑當不煎以生為主此亦治至髙之熱邪故亦用生藥白通湯治少隂下痢蔥白四莖乾薑一兩附子一枚生用去皮破八片右三味以水三升煮取一升去滓分溫再服此為寒痢白通加豬膽汁方治服白通湯利不止汗出而厥逆無脈乾嘔而煩服湯後脈暴出者死微續者生即白通湯煎成內人尿五合豬膽汁一合分溫再服豬膚湯少隂病下痢咽痛胸滿心煩者此主之豬膚一斤右一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和令相得溫分六服引少隂之虛火下逹甘草湯桔梗湯治少隂咽痛先與甘草湯不瘥與桔梗湯甘草二兩右一味以水二升煮減半去滓溫服七合日二服桔梗湯加桔梗一兩煎法同此方制少隂在上之火瓜蒂散治太陽病胸中痞鞕氣上沖胸不得息此胸中有寒也又或手足厥冷脈乍緊心中煩滿不能食病在胸中並當吐之瓜蒂熬赤小豆各一分右二味各别搗篩為散已合治之取一錢七以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與之麻黃升麻湯治傷寒六七日大下後厥逆寸脈沉遲下部脈不至咽喉不利吐膿血泄痢為難治此主之麻黃二兩半去節升麻當歸各一兩一分知母黃芩蔞㽔各十八銖石膏碎綿褁白术乾薑芍藥天冬去心桂枝茯苓甘草炙各六銖右十四味以水一斗先煮麻黃一兩沸去上沫內諸藥煮取三升去滓分溫三服令汗出愈旋復代赭湯治傷寒汗出吐下後心下痞鞕噫氣不除此主之旋復花三兩人參二兩生薑五兩切半夏半升洗代赭石一兩大棗十二枚擘甘草三兩炙右七味以水一斗煮取六升去滓再煎取三升溫服一升日三服苦酒湯治少隂病咽中生瘡聲不出者半夏洗破十四枚雞子一枚去黃內苦酒著殼中右二味內半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不差更作三劑服之製法竒枳實梔子豉湯治大病瘥後勞復枳實三枚炙梔子十四枚擘豉一升綿褁右三味以清漿水七升空煮取四升內枳實梔子煮取二升下䜴更煮五六沸去滓溫分再服覆令微似汗若有宿食者加大黃如博碁子大五六枚大病後勞復庸醫必作虛治乃純用降氣清火之品當細參之竹葉石膏湯治傷寒解後虛羸少氣氣逆欲吐者方見通治多壯火食氣故少氣者屬火症燒裩散治隂陽易病其人身重少氣少腹裏急隂中拘攣熱上衝胸頭重不舉眼中生花膝脛拘急右取婦人中裩近隂處剪燒灰以水和服方寸七日三服小便即利隂頭微腫則愈婦人病取男子裩襠燒灰豬膽導法以豬膽汁加醋內榖導中蜜煎導法以蜜煎老揑作指大一條內榖導中以手按之右二方俱治傷寒大發汗小便利津液內竭大便雖鞕不可攻之用此法治男子新病起房內復者方千金取女人月經赤帛燒服方寸七亦治隂卵腫縮入腹絞痛欲死治交接勞復隂卵腫縮腹中絞痛便欲死方千金取所交接婦人衣服以覆男子立愈竹皮湯外臺治交接勞復卵腫腹痛便絶欲死青竹皮一升右一味水三升煮五六沸絞汁頓服立愈此方范汪亦治大便後勞復療食勞方外臺杏仁五十枚右一味以酢二升煎取服之取汗則差治結胸灸法本事方巴豆十四枚黃連七寸連皮用右搗細末用津唾和成膏填入臍心以艾灸其上腹中有聲其病去矣不拘壯數以病退為度才炙了便以溫湯浸手帕拭之恐生瘡也此法最穩凡胸中病俱可依此法外治鵲石散本事方治傷寒發狂棄衣奔走踰牆上屋黃連寒水石各等分右為細末每服二錢濃煎甘草汁調服鱉甲散活人書治傷寒八九日不瘥名曰壞症傷寒不能治者宜此療之升麻前胡去蘆烏梅去核枳實麩炒去麩犀角鎊黃芩各半兩生地黃切兩合甘草一分炙鱉甲去裙米醋炙赤黃杵碎用半兩右銼如麻豆大每服抄五錢七水一盞半煎至八分去滓溫服升麻鱉甲湯金匱陽毒之為病面赤斑斑如錦文咽喉痛唾膿血五日可治七日不可治此湯主之升麻二兩當歸一兩蜀椒炒去汗一兩甘草二兩鱉甲手指大一片炙雄黃半兩研右六味以水四升煮取一升頓服之老小再服取汗升麻鱉甲去雄黃蜀椒方隂毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒主之肘後千金方陽毒用升麻湯無鱉甲有桂隂毒用甘草湯即本方無雄黃活人陽毒升麻湯用犀角射干黃芩人參無當歸蜀椒鱉甲雄黃蜀椒辛熱之品陽毒用而隂毒反去之疑誤活人書加犀角等四味頗切當梔子仁湯活人書治陽毒傷寒壯熱百節疼痛梔子仁一兩柴胡一兩半升麻黃芩各二兩赤芍一兩大青一兩石膏二兩知母一兩甘草半兩炙杏仁二兩湯浸去皮尖及雙仁者麩炒微黃右件搗為粗末每服抄四錢以水一盞入生薑半分豉一百粒煎至六分去滓不計時候溫服還陽湯本事方治隂毒面色青四肢逆冷心燥腹痛用硫黃末新汲水調下良久或寒一起或熱一起更看緊慢再服一二錢則為汗出差萎㽔湯活人書治風溫兼療冬溫及春月中風傷寒發熱頭眩痛喉咽乾舌強胸內疼痞滿腰背強萎㽔三分石膏一兩杵碎白薇麻黃湯泡焙乾稱川芎葛根生者可用二兩尤妙大羌活去蘆甘草炙杏仁去皮尖雙仁捶碎各半兩青木香一分冬一兩始春用半兩炒右銼如麻豆大每服五錢水一盞半煎一盞日三四服此清散之劑可治時疫白虎加蒼术湯本事方治濕溫多汗知母五兩甘草二兩炙石膏一斤蒼术粳米各三兩右為末每服四錢水一盞半煎至七分去滓取汁溫服黑膏活人書治溫毒發斑好豉一升生地黃半斤切右二味以豬膏二斤合露之煎令三分減一絞去滓用雄黃麝香如大豆者內中絞和盡服之毒便從皮中出則愈凡外感之症治之得宜六七日間無不愈者過期不愈皆治之不得其法所以或傳經或變病種種現症不可窮極以致治法千端聚訟不息故仲景傷寒論治傷寒之正方不過數首餘皆誤治之變症故取治雜病之方隨症救療也傷按傷寒為外感之總名傳變出入千頭萬緒仲景寒論一字不可遺漏今止舉六經本症及六經主方數首以存大略不可以此而廢全書也能將傷寒全書熟讀而精通之則凡為外感之病遊刃有餘矣故此集外感之方選録甚少意有在也百合病金匱論曰百合病者百脈一宗悉致其病也意欲食復不能食常默然欲卧不能卧欲行不能行飲食或有美時或有不用聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脈微數每溺時頭痛者六十日乃愈若溺時頭不痛浙然者四十日愈若溺快然但頭眩者二十日愈其症或未病而預見或病四五日而出或病二十日或一月微見者各隨症治之百合病見於隂者以陽法救之見於陽者以隂法救之見陽攻隂復發其汗此為逆見隂攻陽乃復下之此亦為逆此等症病後得之者甚多醫者不知多方誤治以致病氣日深不可救療始終無一人能識之者遍地皆然也藥百脈一宗悉病蓋肺朝百脈故以百合治肺為主百合病方百合知母湯金匱百合病發汗後者主之百合七枚擘知母三兩切右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓别以泉水二升煎知母取一升去滓後合和煎取一升五合分溫再服滑石代赭湯金匱百合病下之後者主之百合七枚擘滑石三兩碎綿裏代赭石如彈丸大一枚碎綿褁右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓别以泉水二升煎滑石代赭取一升去滓後合和重煎取一升五合分溫服百合雞子湯金匱百合病吐之後者主之百合七枚擘雞子黃一枚右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓內雞子黃攪勻煎五分溫服百合地黃湯金匱百合病不經吐下發汗病形如初者主之百合七枚擘生地黃汁一升右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓內地黃汁煎取一升五合分溫再服中病勿更服大便常如漆百合洗方金匱百合病一月不解變成渴者主之百合一升以水一斗漬之一宿以洗身洗已食煮餅勿以鹽豉也栝蔞牡蠣散金匱百合病渴不差者主之栝蔞根牡蠣熬等分右為細末飲服方寸七日三服百合滑石散金匱百合病變發熱者一作發寒熱主之百合一兩炙滑石三兩右為散飲服方寸七日三服當微利者止服熱則除感冒方附九味羌活湯張元素方四時發散羌活防風川芎白芷細辛蒼术黃芩甘草生地右加生薑三片蔥白三莖水煎服此外感之總方惟生地不若易當歸為佳加此方之分兩當因病之輕重減故不為一定之數敗毒散活人書治傷寒瘟疫風濕風眩拘踡風痰頭痛目眩四肢痛憎寒壯熱項強睛疼羌活獨活前胡柴胡川芎枳殼白茯苓桔梗人參各一兩甘草五錢右為細末每服二錢水一盞入生薑三片煎七分溫服或沸湯點服煩熱口渴加黃芩參蘇飲易簡治感冒風寒頭痛發熱憎寒咳嗽涕唾稠黏胸膈滿悶脈弱無汗人參蘇葉乾葛前胡陳皮枳殼茯苓半夏各八分桔梗木香甘草各五分生薑五片大棗一枚右十三味水煎熱服取汗以上三方乃感冒風寒之總法其病止在皮毛肌肉之中未入經絡故不能傳變大段驅散太陽陽明之風寒足矣其有食者則兼用消食之品可也此等症四時皆有南方最多寒熱靈素靈口問篇帝曰人之振寒者何氣使然岐伯曰寒氣客於皮膚隂氣盛陽氣虛故為振寒寒栗素逆調論黃帝問曰人身非常溫也非常熱也為之熱而煩滿者何也岐伯對曰隂氣少而陽氣勝故熱而煩滿也帝曰人身非衣寒也中非有寒氣也寒從中生者何岐伯曰是人多痺氣也陽氣少隂氣多故身寒如從水中出帝曰人有四肢熱逢風寒如灸如火者何也岐伯曰是人者隂氣虛陽氣盛四肢者陽也兩陽相得而隂氣虛少少水不能滅盛火而陽獨治獨治者不能生長也獨勝而止耳逢風寒如炙如火者是人當肉爍也帝曰人有身寒湯火不能熱厚衣不能溫然不凍栗是為何病岐伯曰是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨腎不生則髓不能滿故寒甚至骨也所以不能凍栗者肝一陽也心二陽也腎孤臟也一水不能勝二火故不能凍栗病名曰骨痺是人當攣節也帝曰人之肉苛者雖近於衣絮猶尚苛也是為何疾岐伯曰榮氣虛衛氣實也榮氣虛則不仁衛氣虛則不用榮衛俱虛則不仁且不用肉如故也人身與志不相有曰死移熱移寒素氣厥論黃帝問曰五臟六腑寒熱相移者何岐伯曰腎移寒於脾癰腫少氣脾移寒於肝癰腫筋攣肝移寒於心狂隔中心移寒於肺肺消飲一溲二死不治肺移寒於腎為涌水涌水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊褁漿水之病也脾移熱於肝則為驚衄肝移熱於心則死心移熱於肺傳為鬲消肺移熱於腎傳為柔痓腎移熱於脾傳為虛腸澼死不可治胞移熱於膀胱則癃溺血膀胱移熱於小腸鬲腸不便上為口糜小腸移熱於大腸為虙瘕為沉大腸移熱於胃善食而瘦又謂之食亦胃移熱於膽亦曰食亦膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也傳為衄衊瞑目故得之氣厥也難經寒熱之病候之如何也然皮寒熱者皮不可近席毛髮焦鼻藁不得汗肌寒熱者皮膚痛唇口藁無汗骨寒熱者病無所安汗注不休齒藁痛陽維為病苦寒熱傷寒論病人身大熱反欲近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也此種寒熱既非感冒亦非傷寒其淺深有皮膚骨髓之殊其久暫有歲月之異輕者有似感冒重者即變骨蒸所以內經以後諸書寒熱自有方論不入傷寒等法大段以清營中之熱為主其或有風有痰有積有瘀者則隨症消息之可也寒熱方四時加減柴胡湯金匱治五臟寒熱柴胡白术各八分大腹檳榔四枚并皮子用陳皮五分生薑五分桔梗七分已上冬三月柴胡稍多春三月減白术增枳實夏三月又增甘草仍用枳實白术秋三月同冬三月惟陳皮稍多右各㕮咀分為三貼一貼以水三升煮取二升分溫三服如人行四五里進一服渣再合煎一服治寒熱總不能外柴胡去寒熱久者必有積滯分讀聲二錢半為一分天行熱病方外臺療天行三日外至七日不歇內熱令人更相染著主大青消毒湯大青四兩香豉八合熬綿褁乾葛梔子各四兩生地一升切芒硝三兩右六味切以水五升煮取二升半去滓下芒硝分三服一方有石膏八兩忌蕪荑熱麵酒蒜等物此方專清陽明之熱苦參湯千金療天行熱病五六日以上宜服苦參三兩黃芩二兩生地黃八兩右三味切以水八升煮取二升去滓溫服半升日再服忌蕪荑凝雪湯外臺療天行毒病七八日熱積胸中煩亂欲死芫花一升右一味以水三升煮取一升半漬故布薄胸上不過再三薄熱則除當溫四肢護厥逆也按本草芫花能治蠱毒消胸中痰水大黃湯外臺療天行五六日不解頭痛壯熱四肢煩疼不得飲食大黃胃黃連心肝黃柏腎梔子肺各半兩擘右四味以水八升煮六七沸內䜴一升蔥白七莖煮取三升去滓分三服此許推然方神良又療傷寒已五六日頭痛壯熱四肢煩疼取汗並宜老小忌豬肉冷水此三黃湯之變能除六經之熱桃葉熏身法外臺水一石煮桃葉取七斗以薦席自圍衣被蓋上安桃湯於牀簀下取熱自熏停少時當雨汗汗遍去湯待歇速粉之并炙大椎則愈按寒熱之因千變萬殊有屬外感有屬內傷而外感內傷之中又各不同其外有屬痰飲有屬瘀血有屬積聚有屬敗症不可勝舉其治法各詳於本病條下當細審之此只録時行熱病之數方耳霍亂附轉筋傷寒論問曰病有霍亂者何答曰嘔吐而利名曰霍亂問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下又利止復更發熱也傷寒其脈微澀者本是霍亂今是傷寒却四五日至隂經上轉入隂必利本嘔下利者不可治也欲似大便而反失氣仍不利者屬陽明也便必鞕十三日愈所以然者經盡故也下利後當便鞕鞕則能食者愈今反不能食則後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也吐利發汗脈平小煩者以新虛不勝榖氣也此霍亂是傷寒變症與霍亂本症微别病源霍亂者由人溫涼不調隂陽清濁二氣有相干亂之時其亂在於腸胃之間者因遇飲食而變發則心腹絞痛其有先心痛者則先吐先腹痛者則先利心腹並痛者則吐利俱發挾風而實者身發熱頭痛體疼而復吐利虛者但吐利心腹刺痛而已亦有飲酒食肉腥膾生冷過度因居處不節或露卧濕地或當風取涼而風冷之氣歸於三焦傳於脾胃脾胃得冷則不磨不磨則水榖不消化亦令清濁二氣相干脾胃虛弱便則吐利水榖不消則心腹脹滿皆成霍亂霍亂脈大可治微細不可治霍亂吐下脈微遲氣息劣口不欲言者不可治此霍亂之正病言之最詳乾霍亂者是冷氣搏於腸胃致飲食不消但腹滿煩亂絞痛短氣其腸胃先挾實故不吐利名為乾霍亂也霍亂而轉筋者由冷氣入於筋故也冷入於足之三隂三陽則腳轉筋入於手之三隂三陽則手轉筋隨冷所入之筋筋則轉轉者皆由邪冷之氣擊動其筋而移轉也按轉筋之病金匱有雞屎白散一方附腳氣條下而轉筋之症不一有平時常轉筋者有霍亂而轉筋者并有轉筋入腹者當用木瓜吳茱茰等藥及外治湯尉之法以偹選擇霍亂轉筋方五苓散霍亂頭痛發熱多欲飲水者主之寒多不用水者理中丸主之二方俱傷寒論見通治理中丸此是寒霍亂之方百不得一者也誤用者害不旋踵加減法若臍上築者腎氣動也去术加桂四兩吐多去术加生薑三兩下多者還用术悸者加茯苓二兩渴欲得水者加术足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑成四兩半腹滿者去术加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣服霍亂轉筋入腹極鹹作鹽湯於糟中暖漬之則差千金又方以醋煮青布㩉腳膝冷復易之又方千金翼治霍亂轉筋兩臂及腳胸脅諸轉筋並主之香薷一把水煮令極濃服二三升即差青木香亦佳廣濟髙良薑湯外臺治霍亂吐痢轉筋入腹髙良薑四兩桂心各四兩右二味以水七升煮取二升去滓分三服此亦治寒霍亂之方霍亂轉筋入腹方外臺木瓜子根皮合煎湯服之茱茰湯外臺療霍亂轉筋不止吳茱茰一升甘草乾薑各二兩泡蓼子一把亂髮一兩燒桂心二兩右六味以水七升煮取二升三合去滓分溫三服灸法外臺以手拗所患腳大拇指當腳心急筋上七壯又灸當足大拇指聚筋上七壯又灸足大拇指下約中一壯又灸湧泉入腹者灸臍左二寸十四壯又灸股中大筋上隂一寸轉筋四逆者灸兩乳根黑際各一壯轉筋欲死者灸臍上一寸十四壯藿香正氣散局方一元散河間蘇合香丸局方香薷飲局方俱見通治痓金匱太陽病發熱無汗反惡寒者名曰剛痓一作痙餘同太陽病發熱汗出而不惡寒名曰柔痓太陽病發熱脈沉而細者名曰痓為難治太陽病發汗太多因致痓夫風病下之則痓復發汗必拘急瘡家雖身疼痛不可發汗汗出則痓病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痓病也若發其汗者寒濕相得其表益虛即惡寒甚發其汗已其脈如蛇暴腹脹大者為欲解脈如故反伏弦者痓夫痓脈按之緊如弦直上下行痓病有炙瘡難治太陽病其症備身體強几几然脈反沉遲此為痓太陽病無汗而小便反多氣上衝胸口噤不得語欲作剛痓痓為病胸滿口噤卧不著席腳攣急必介齒痓方栝蔞桂枝湯金匱太陽病其症備身體強几几然脈反沉遲此湯主之栝蔞根二兩桂枝芍藥各三兩甘草二兩生薑三兩大棗十二枚右六味以水九升煮取三升分溫三服取微汗汗不出食頃啜熱粥法麻黃加獨活防風湯金匱治剛痓麻黃桂枝各一兩芍藥三兩甘草半兩獨活防風各一兩右六味每服一兩水煎痓病乃傷寒壞症小兒得之猶有愈者其餘則百難療一其實者或有因下而得生虛者竟無治法金匱諸方見效絶少葛根湯金匱大承氣湯金匱桂枝加葛湯有汗用見傷寒門小續命湯見中風門癃閉利淋靈素靈本輸篇三焦手少陽之脈入絡膀胱約下焦實則閉癃虛則遺溺五味篇酸走筋多食之令人癃素宣明五氣論膀胱不利為癃不約為遺溺氣厥論胞移熱於膀胱則癃溺血骨空論督脈為病癃痔遺溺金匱淋之為病小便如粟狀小腹弦急痛引臍中淋家不可發汗發汗則必便血熱在下焦者則尿血亦令淋祕不通小便不利者有水氣其人苦渴病源石淋淋而出石也腎主水水結則化為石氣淋腎虛膀胱熱氣脹所為也膏淋淋而有肥狀似膏故謂之膏淋亦曰肉淋此腎虛不能制於肥液故與小便俱出也勞淋謂勞傷腎氣而生熱成淋也血淋熱淋之甚者則尿血心主血血之行身通遍經絡循環腑臟勞甚則散失其常經溢滲入胞而成血淋也胞轉其病狀臍下急痛小便不通是也或因小便應下而強忍之或為寒熱所迫此二者俱合水氣還上氣於胞使胞屈别不得充張外水應入不得入內溲應出不得出外內相壅塞故令不通病至四五日乃有致死者飽食訖應小便而忍之或飽食訖而走馬或小便急疾走或忍水入房皆令胞轉或胞落並致死數便為癃絶不便為胞轉尿床小便乃水液之餘從膀胱入於胞夜卧則陽氣衰伏不能制於隂所以隂氣獨發於眠睡不覺尿出也癃閉利淋方栝蔞瞿麥圓金匱小便不利者有水氣其人苦渴此主之栝蔞根二兩茯苓三兩薯蕷三兩附子一枚泡瞿麥一兩右五味末之煉蜜丸梧子大飲服三丸日三服不知增至七八丸以小便利腹中溫為知滑石白魚散金匱主小便不利滑石二分亂髮二分燒白魚二分右三味杵為散飲服半錢七日三服茯苓戎鹽湯金匱小便不利主之茯苓半斤白术二兩戎鹽一枚彈丸大右三味以水五升煮取三升分溫三服豬苓湯金匱脈浮發熱渴欲飲水小便不利者主之豬苓去皮茯苓阿膠滑石澤㵼各一兩右五味以水四升先煮四味取二升去滓內膠煬消溫服七合日三服此蓄飲之症治諸種淋方千金葵根八兩茅根石首魚頭口各三兩宜用頭中骨甘草一兩通草二兩貝子五合天麻根五兩右七味㕮咀以水一斗二升煮取五升分五服日三夜二亦主石淋治石淋尤切石葦散千金治血淋石葦當歸蒲黃芍藥右四味各等分治下篩酒服方寸七日三胞轉方千金翼治丈夫女人胞轉不得小便八九日者滑石一斤寒水石一兩碎葵子一升右三味以水一斗煮取五升盡服即利療小便難方本事方治便難小腹脹不急治殺人用蔥白三斤細銼炒令熱以帕子褁分作二處更替運臍下即通石葦散局方治膀胱有熱淋瀝不宣或尿如豆汁或便出砂石並治之木通銼二兩石葦二兩去毛滑石白术瞿麥芍藥葵子各三兩當歸甘草炙王不留行右為細末每服二錢小麥湯調下食前日二三服藕蜜煎養老書治老人淋病小便不利痛悶之極藕汁五合白蜜五合生地黃汁一升右相和微火煎之令如餳空心含半匙漸漸下飲食忌熱食炙肉此方亦治血淋治石淋方千金翼車前子二升絹袋貯以水八升煮取三升空腹頓服之須臾當下石子宿勿食服之良治熱淋方千金翼白茅根四斤以水一斗五升煮取五升每服一升日三夜二四汁飲治熱淋小便赤澀疼痛蔔萄取自然汁生藕取汁生地取汁白蜜各五合右和勻先把一盞銀器石器內慢火熬沸不拘時溫服牛膝膏治死血作淋桃仁去皮尖歸尾各一兩牛膝四兩酒浸一宿赤芍生地各一兩半水十鍾微火煎至二碗入麝香少許分四次空心服如夏月用涼水換此膏不壞八正散寶鑑治諸淋瞿麥梔子萹蓄大黃滑石木通車前子甘草各一錢加燈心一錢煎服治小便失禁方千金以水三升煮雞腸取一升分三服家韭子丸治遺溺及陽氣衰敗白濁遺精家韭子炒六兩鹿茸四兩酥炙肉蓯蓉酒浸牛膝酒浸熟地當歸各二兩兔絲子酒浸巴戟各一兩半杜仲石斛桂心乾薑各一兩右為末酒糊丸桐子大每服五十丸加至百丸食前鹽湯溫酒任下小兒遺尿者多因胞寒亦陽氣不足也别作小丸服夜多小便方千金翼治膀胱冷故小便至夜獨多雞腸五具治如食法羊腎一具去脂並令乾赤石脂六兩龍骨三兩肉蓯蓉四兩川連五兩桂心二兩右七味為末每服方寸七日二服五日中作羊腎炙一劑十日外作羊腎臛香味如常食飽與之豬肚丸治小便頻數豬肚一個蓮子一升同煮一同去皮心焙乾為末舶上茴香五錢破故紙一兩鹽水炒川練子酒炒去核一兩母丁香三錢加桑螵蛸一兩尤效蜜丸桐子大每服五十丸空心溫酒送下縮泉丸治脬氣不足小便頻多烏藥益智仁各等分右二味為末酒煮山藥糊丸如梧子大每服五十丸空心鹽湯送下一方有覆盆子治尿床千金取雞肶脛一具并腸燒末酒服男雌女雄威喜丸見通治蒲灰散見水腫龍腦雞蘇丸治五淋血崩見通治蘭臺軌範卷三
