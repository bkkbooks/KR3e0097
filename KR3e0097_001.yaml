body:
  text: 蘭臺軌範卷一吳江徐大椿撰通治方雖云通治亦當細切病情不得籠統施用也小建中湯金匱虛勞裏急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥此湯主之桂枝三兩去皮甘草三兩炙大棗十二枚芍藥六兩生薑三兩膠飴一升右六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服此方治陰寒陽衰之虛勞正與隂虛火旺之病相反庸醫誤用害人甚多非此咽乾口燥乃津液少有火也黃茋建中湯金匱虛勞裏急諸不足者主之於小建中湯內加黃茋一兩半餘依前法大建中湯治內虛裏急少氣手足厥冷小腹攣急或腹滿弦急不能食起即微汗隂縮或腹中寒痛不堪口乾精出或手足乍寒乍熱而煩寃酸痛不能久立黃茋當歸桂心芍藥人參甘草各一錢半夏炮黑附子炮各二錢半右藥每服五錢加薑三片棗二枚煎服此非金匱大建中湯金匱方入腹痛門方桂枝去皮即桂心非近時所用之肉桂心也此兼治下焦虛寒之症不但建立中宫炙甘草湯傷寒論一名復脉湯治虛勞不足汗出而悶脉結悸行動如常不出百日危急者十一日死甘草四兩炙桂枝生薑各三兩麥門冬半斤麻仁半斤阿膠人參各二兩大棗三十枚生地黃一斤右九味以酒七升水八升先煮八味取三升去滓內膠消盡溫服一升日三服此治血脉空竭方見用酒所以和血脉凡脉結悸者雖行動如常亦不出百日必死若復危急不能行動則過十日必死語極明白從前解者多誤八味地黃丸崔氏虛勞腰痛少腹拘急小便不利者主之又婦人病飲食如故煩熱不得卧而反倚息者此名轉胞不得溺也以胞系了戾故致此病但利小便則愈此亦主之乾地黃八兩九蒸為度搗膏乾山藥山茰肉各四兩丹皮白茯苓澤㵼各三兩桂枝附子各一兩右八味為末煉蜜丸如桐子大酒下十五丸日再服此方亦治腳氣乃驅邪水以益正水之法也方此方專利小便水去而陰不傷扶陽而火不升製之妙固非一端但近人以此一方治天下之病則又大失此方之義矣資生腎氣丸治肺腎虛腰重腳輕小便不利或肚腹腫脹四肢浮腫或喘急痰盛已成蠱症於前八味丸加車前子牛膝各一兩餘依前法六味地黃丸錢氏治腎隂不足發熱作渴小便淋閉氣壅痰嗽頭目眩暈眼花耳聾咽乾舌痛齒牙不固腰腿痿軟自汗盜汗便血諸血失音水泛為痰血虛發熱等症於前方去肉桂附子餘依前法此方錢氏專治小兒當歸生薑羊肉湯金匱治産後腹中㽲痛并治腹中寒疝虛勞不足當歸三兩生薑五兩羊肉一斤右以水八升煮取三升溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加陳皮二兩白术一兩如加生薑等者亦加水五升煮取三升二合服之精不足者補之以味此方是也竹葉石羔湯傷寒論治傷寒解後虛羸少氣氣逆欲吐者竹葉二把石羔一斤碎半夏半斤洗人參三兩甘草二兩炙麥門冬一升去心粳米半升右七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服集驗載此方加生薑治嘔最良此治三陽餘熱未盡峻凡大病之後必有留熱總宜清解後人俱概用補以留其邪則元氣不能驟復愈補愈虛矣亦治傷暑發渴脉虛暑病有虛熱者宜之若吐逆瞀亂之症則大誤矣脾約丸金匱即麻仁丸治腸胃熱燥大便祕結麻仁五兩另研大黃一斤蒸焙厚朴薑炒枳實麩炒芍藥炒各五兩杏仁五兩半右為末蜜丸梧子大臨睡用白湯送下二十丸大便利即止此潤腸之主方四君子湯治面色痿白言語輕微四肢無力脉來虛弱者若內傷虛熱或飲食難化須加炮薑人參白术茯苓甘草各二錢右加薑棗水煎服此補脾之主方五味異功散錢氏調理脾胃於四君子湯加陳皮一錢為末每服二錢白湯調服七味白术散治一切吐㵼煩渴霍亂虛損氣弱保養衰老及治酒積嘔噦於四君子湯加藿香半兩葛根一兩木香二錢半為末每服二錢白湯調下六君子湯治氣虛有痰脾虛臌脹即前方加陳皮半夏餘依前法更加藿香砂仁為香砂六君子湯獨參湯治元氣大虛昏厥脉微欲絶及婦人崩産脫血血暈人參分兩隨人隨症右一味須上揀者濃煎頓服待元氣漸回隨證加减此一時急救之法服後即當隨症用藥參附湯治隂陽血氣暴脫證人參一兩附子製五錢右加薑棗水煎服此亦急救之方本方去人參加黃茋名茋附湯保元湯黃茋三錢人參二錢甘草一錢肉桂春夏二三分秋冬六七分右四味水煎服氣血虛寒者用之純虛寒之痘症亦用此乃宋以後之方故肉桂止用二三分以為氣分引藥乃厚桂非桂枝也生脉飲醫録治熱傷元氣氣短倦怠口渴出汗人參五錢麥門冬五味子各三錢右三味水煎服此方傷暑之後存其津液庸醫即以之治暑病誤甚觀方下治症並無一字治暑邪者味此即於復脉湯內取參麥二味以止汗故復加五子近人不論何病每用此方收住邪氣殺人無算歸脾湯濟生治思慮傷脾或健忘怔忡驚悸盜汗寤而不寐或心脾作痛嗜卧少食及婦女月經不調人參龍眼肉黃茋各二錢半甘草五分白术二錢半茯苓二錢半木香五分當歸酸棗仁炒研逺志各一錢右加薑三片水煎服補脾有二法一補心以生脾血一補腎以壯脾氣此方乃心脾同治之法補後天以生血即所以調經補中益氣湯東垣治隂虛內熱頭痛口渴表熱自汗不任風寒脉洪大心煩不安四肢困倦懶於言語無氣以動動則氣髙而喘黃茋炙人參雲术炒各一錢五分甘草炙一錢陳皮五分當歸一錢升麻柴胡各五分右八味加生薑三片大棗二枚水煎溫服東垣之方一概以升提中氣為主如果中氣下陷者最為合度若氣髙而喘則非升柴所宜學者不可誤用也虎潛丸丹溪治腎隂不足筋骨痿不能步履龜板黃柏各四兩知母熟地各三兩牛膝三兩五錢鎖陽虎骨當歸各一兩芍藥一兩五錢陳皮七錢五分冬月加熟薑五錢右為末煮羯羊肉搗為丸桐子大淡鹽湯下痿症皆屬於熱經有明文此方最為合度後人以溫補治痿則相反矣痿症又有屬痰濕風寒外邪者此方又非所宜資生丸治婦人妊娠三月脾虛嘔吐或胎滑不固兼丈夫調中養胃饑能使飽飽能使饑神妙難述人參三兩茯苓二兩雲术三兩山藥二兩薏仁一兩半蓮肉二兩芡實一兩半甘草一兩陳皮麥蘖神麯各二兩砂仁一兩半白豆蔲八錢桔梗一兩藿香一兩川黃連四錢白扁豆山查各一兩半右十八味為細末煉蜜丸彈子大每服二丸米飲下此方治懷孕氣阻用兼消兼補之法意亦可取今人不論何因為總治脾胃之藥則失製方之義矣藥味太雜全無法度姑存之以備一格龜鹿二仙膠大補精髓益氣養神鹿角血者十斤龜板自敗者五斤以上二味另熬膏枸杞子甘州者三十兩人參十五兩右用鉛罈如法熬膠初服酒化一錢五分漸加至三錢空心下精不足者補之以味而龜鹿又能通督任填補之法此為最穩三才封髓丹寶鑑除心火益腎水滋隂養血潤補不燥天冬熟地人參各五錢黃柏三兩砂仁一兩甘草炙七錢右為末麵糊丸梧子大每服五十丸用蓯蓉半兩切作片酒浸一宿次日煎三四沸空心食前送下此補隂氣之方虛人老人便結者為宜七寶美髯丹邵應節補腎氣烏鬚髮延年益壽何首烏赤白雌雄各一斤牛膝八兩以何首烏先用米泔水浸一日夜以竹刀刮去粗皮切作大片用黑豆鋪甑中一層却鋪何首烏一層每鋪豆一層却鋪牛膝一層重重相間上鋪豆覆之以豆熟為度去豆晒乾次日如前用生豆蒸如法蒸七次去豆用破故紙半斤酒浸洗淨用黑芝麻同炒無聲為度去芝麻當歸半斤去頭尾酒洗白茯苓半斤用人乳拌浸透晒乾蒸赤茯苓半斤黑牛乳浸晒乾蒸莵絲子半斤酒浸一宿洗晒乾蒸晒三次枸杞子半斤去蒂枯者右共為末蜜丸龍眼大每日空心嚼二三丸溫酒或米湯白鹽湯皆可下製法不可犯鐵器此補腎血之方無比山藥丸千金治丈夫久虛百損五勞七傷頭痛目眩支厥或煩熱或脾疼腰臗不隨飲食不生肌肉或少食而脹滿體無光澤陽氣衰絶隂氣不行熟地酒浸赤石脂巴㦸去心茯苓牛膝酒浸山茱茰肉澤㵼各三兩乾山藥二兩五味子六兩肉蓯蓉酒浸四兩兔絲子杜仲炒各三兩右藥煉蜜丸桐子大每服二十丸至三十丸食前溫酒或米飲下服七日後令人身健體潤面光音響為驗此藥通中入腦鼻必酸疼勿怪此收攝腎氣之方最為穩妥還少丹楊氏大補心腎脾胃虛寒飲食少思發熱盜汗遺精白濁及真氣虧損肌體羸瘦肢節倦怠等症山藥牛膝逺志山茰肉茯苓五味子楮實子巴㦸酒浸去心肉蓯蓉酒浸一宿石菖蒲杜仲薑汁酒同拌炒茴香各一兩枸杞子熟地各二兩右共為細末煉蜜同棗肉為丸梧子大每服三十丸溫酒或鹽湯下日三服此交通心腎之方羊腎丸治腎勞虛寒面腫垢黑腰脊引痛屈伸不利夢寐驚悸小便不利熟地杜仲兔絲子另研石斛黃茋續斷肉桂牛膝磁石煆醋淬沉香五加皮山藥炒各一兩右為末雄羊腎兩對以葱椒酒煮爛入少酒糊杵丸梧子大每服七十丸空心鹽湯送下此降納腎氣之方羊肉粥方養老書治老人虛損羸瘦助陽壯筋骨羊肉二斤黃茋一兩生用人參二兩白茯苓一兩大棗五枚粳米三合加生薑少許尤佳入核桃去羶氣亦可右先以肉去脂皮取精膂肉留四兩細切餘一斤十二兩以水五大盞并黃茋等煎取汁三盞去滓入米煮粥臨熟下切生肉更煮入五味調和空心服之此古人服食之方也三才丸潔古治脾肺虛咳嗽人參天門冬地黃各等分右為末煉蜜丸空心服此方與嗽症非宜必上下純虛而不嗽者可用天王補心丹道藏治心血不足神志不寧津液枯竭健忘怔忡大便不利口舌生瘡等證人參白茯苓元參桔梗逺志各五錢當歸五味子麥冬天冬丹參酸棗仁各一兩生地四兩柏子仁一兩右為末煉蜜丸如椒目大白湯下此養心之主方一方有石菖蒲四錢無五味子一方有甘草川連祕方補心丸治心虛手振當歸一兩五錢川芎粉甘草各一兩生地一兩半逺志二兩半棗仁炒柏子仁去油各三兩人參膽星硃砂另研各五錢金箔二十片麝香一錢琥珀三錢茯苓七錢石菖蒲六錢右為末餅糊丸菉豆大硃砂為衣每服七八十丸吐津咽下或薑湯送下此心神恍惚而有痰者宜之黑地黃丸治陽盛隂衰脾胃不足房室虛損形瘦無力面多青黃而無常色此補腎益胃之劑也蒼术一斤油浸熟地一斤五味子半斤乾薑秋冬一兩夏五錢春七錢右為末棗肉丸梧子大食前米飲服百丸治血虛久痔甚妙按此治脫血脾寒之聖藥乾薑當泡淡炒黑用元精丹北方黑氣入通於腎開竅於二隂藏精於腎味醎其類水其病在骨此藥主之血餘自已髮及父子一本者及少壯男女髮㨂去黃白色者用灰湯洗二三次以大皂角四兩捶碎煮水洗淨務期無油氣為佳將髮扯斷晒乾每洗髮一斤用川椒四兩㨂去梗核於大鍋內髮一層椒一層和勻以中鍋蓋蓋鹽泥固濟勿令泄氣桑柴火慢煮三炷香即退火待冷取出約重四兩有餘於無風處研為細末何首烏製法如前七寶美髯丹法取淨末一斤黑芝麻九蒸九晒取淨末八兩女貞實四兩破故紙炒取淨末四兩生地酒浸杵膏入藥熟地同上製各八兩旱蓮草桑椹各取淨汁熬膏各四兩胡桃仁二兩研膏膠棗二兩研膏槐角子入牛膽內百日四兩右以藥末和諸膏和勻加煉蜜一斤入石臼杵千餘下為丸梧子大每服六十丸空心用首烏釀酒二三杯送下日三服諸品皆色黑之藥專補腎血此治便後脫血之神方也青州白丸局方治一切風及小兒驚風婦人血風大人頭風南星三兩白附子二兩半夏七兩川烏半兩各生用右為細末放磁器中日晒夜露春五夏三秋七冬十日以糯米粉煮粥丸薑湯下風症溫酒下驚風薄荷湯下此四味宜水研取漿澄粉晒露七日去水作丸此治風痰之要藥指迷茯苓丸治中脘留伏痰飲臂痛難舉手足不得轉移茯苓二兩半夏一兩枳殼半兩炒風化硝二錢半右為末薑汁和丸桐子大每服三十丸薑湯下按方極和平而義精效速方內半夏宜生研澄粉用威喜丸局方治飲食積滯蟲痞脹滿久痢久瘧沉冷積寒廣木香肉豆蔲各四錢乾薑泡炒二錢五分巴豆二十粒去皮心及油炒研杏仁四十粒去皮尖研百草霜五錢加茯苓亦可右前四味為末入百草霜同研後入杏仁巴豆霜研黃蠟一兩五錢酒煮一時去酒將蠟入麻油七錢溶化拌藥研勻乘熱丸如菉豆大每服二三十丸用黃蠟之義最精凡治積新病宜急下久病宜緩下此方治久患寒積之症乃緩下法也靈砂局方治上盛下虛痰涎壅盛最能鎮墜升降隂陽和五臟助元氣水銀一斤硫黃四兩右二味用新鐵銚炒成砂子或有烟熖即以醋灑候研細入水火鼎醋調赤石脂封口鐵線扎縳㬠乾鹽泥固濟用炭二十斤煆如鼎子烈筆蘸赤石脂頻抹其處火盡為度經宿取出研為細末糯米糊為丸如麻子大每服三丸空心棗湯米飲井花水人參湯任下量病輕重增至五七丸此鎮墜之藥若用黑錫丹則此方可不備二神丸本事方治腰痛腎虛全不進食破故紙四兩炒肉豆蔲二兩生右為末用大棗四十枚生薑四兩同煎糜爛去薑棗核皮研膏入藥末丸鹽湯下此治腎家有寒濕之方本方加五味子吳茱茰各二兩為四神丸導赤散錢氏治心熱口糜舌瘡小便黃赤莖中作痛熱淋不利生地木通甘草梢各等分右三味水煎服此㵼心火從小腸中出也亡血脫血方千金翼治亡血脫血鼻頭白色唇白去血無力者生地黃十斤右一味搗以酒一斗絞取汁令極盡去渣微火煎减半內白蜜五升棗膏一升以攪之勿止令可丸酒服如雞子一丸日三久服不已老而更少萬病除愈千金又以此二味加阿膠甘草作煎服亦可用當歸補血湯寶鑑治男婦血虛似白虎證肌熱面赤煩渴引飲脉來洪大而虛重按則微當歸二錢黃茋一兩右二味水煎服此補表血之方益血潤腸丸治津液亡大腸祕老人虛人皆可服并祛風養血熟地六兩杏仁炒麻仁各三兩以上三味俱搗膏枳殼當歸橘紅淨各二兩五錢阿膠肉蓯蓉各一兩半蘇子荆芥各一兩右為末以前三味膏同杵千餘下仍加蜜丸梧子大每服五六十丸空心白湯下此脾約丸之變法芎當膠艾湯金匱婦人有漏下者有半産後因續下血不絶者有妊娠下血者假令妊娠腹中痛為胞阻膠艾湯主之芎藭阿膠甘草各二兩艾葉當歸各三兩芍藥四兩乾地黃六兩右六味水五升清酒三升合煮取三升去渣內膠令消盡溫服一升日三服不差更作四物湯局方治一切血熱血虛血燥諸證當歸熟地各三錢川芎一錢五分白芍二錢酒炒右四味水煎服此血病之主方八珍湯治心肺虛損氣血兩虛即四君子湯合四物湯餘依上法十全大補湯局方治男子婦人諸虛不足五勞七傷不進飲食久病虛損時發潮熱氣攻骨脊拘急疼痛夜夢遺精面色痿黃腳膝無力即八珍湯加桂心陳皮人參養營湯局方治脾肺俱虛發熱惡寒肢體瘦倦食少作㵼人參白术茯苓甘草黃茋陳皮當歸各一錢熟地七分半白芍一錢半桂心一錢逺志五分五味子七分半右十二味加薑三片大棗二枚此即十全大補湯去川芎加五味逺志黃茋以生心血柴胡四物湯保命治日久虛勞微有寒熱脉沉而數川芎當歸白芍熟地各一錢五分當用生地柴胡一錢人參黃茋甘草半夏各三錢右為末水煎服柴胡加入補藥俱不相合獨此為宜柴胡疏通少陽調和營衛非專於散風也兔絲子丸和劑治腎氣虛損五勞七傷腳膝痠疼面目黧黑目眩耳鳴心冲氣短時有盜汗小便數滑兔絲子鹿茸酥炙去毛澤㵼石龍芮去土淨再用水洗桂枝附子各一兩石斛熟地茯苓牛膝酒浸焙山茰肉續斷防風杜仲肉蓯蓉酒浸焙補骨脂酒炒蓽澄茄巴㦸沉香茴香炒各七錢五分五味子川芎桑螵蛸酒浸炒覆盆子各五錢右為細末酒煮麵糊為丸梧子大每服三十丸溫酒下或鹽湯下此等方不過隂陽兼補之法泛而無統近時補劑盡如此然能多而不雜尚屬可取蓯蓉兔絲子丸此方不寒不熱助隂生子肉蓯蓉一兩三錢覆盆子蛇麻子川芎當歸兔絲子各一兩二錢白芍一兩牡蠣鹽泥固煆烏鰂魚骨各八錢五味子防風各六錢艾葉三錢條芩五錢右為末煉蜜丸如梧子大每服三四十丸鹽湯下早晚皆可服此乃婦人溫經之主方也餌术方千金翼生术削去皮炭火急炙令熟空肚飽食之全無藥氣可以當食不假山糧惟飲水神祕之勿傳真於术尤佳此服食之方也服牛乳方千金翼能補虛破氣牛乳三升蓽撥半兩末之綿裏右二味於銅器中水三升和乳合煎取三升頓服日三七日除一切氣生地黃煎外臺主補虛損填骨髓長肌肉去客熱生地汁五升棗膏六合白蜜七合酒一升牛酥四合生薑汁二合紫蘇子一升以酒一升絞取汁鹿角膠四兩炙末右煎地黃等六味汁三分減一內蜜調入膠末候煎成以器盛之酒和服阿伽陀藥千金翼主諸種病及將息服法久服益人神色無諸病方此等即所謂海上竒方如紫金錠之類其所治之症皆與本草不相合而確有神驗真不可思議也紫檀用蘇木亦可小蘗一名山石榴茜草鬱金胡椒各五兩右為末水和內臼中更搗一萬杵丸好隂乾用諸咽喉口中熱瘡以水煮升麻湯下桐子大一丸旦服之諸面腫心悶因風起者煮防風湯服一丸諸四體酸疼或寒或熱麻黃湯一丸諸䘌下部有瘡吞一丸又煮艾槐白皮湯研一丸灌下部諸卒死冷水服二丸諸被壓搗當心帶一丸又水研一丸三服諸被蛇及惡獸等毒以麝香如相思子研藥一丸服并以紫檀磨汁和藥塗患處諸被鬼撓亂失心癲狂艾汁下如無青艾乾艾取汁亦可并隨身帶一丸諸傳尸水磨雄黃下諸消渴朴硝湯下諸淋水服二丸諸疔腫元參湯下諸卒胸膈熱苦竹葉湯下諸難産以蓀蔣二七水煮服一丸薑黃亦得諸熱瘡大黃取汁服又以大黃和藥調塗諸吐血若因熱吐者服之並差因冷吐者菖蒲汁下諸鼻中血刺薊汁下並研灌鼻諸噎病栝蔞汁下諸赤白帶下以丹皮刺薊根各二分煮服後補法以地榆桑螵蛸一云桑耳各二分水二升煮取一升分作二服取汁一合研藥一二丸服之諸藥毒惡忤研服惡瘧常山湯下瘟疫時氣元參湯下諸䘌疳濕及心風心驚戰悸多忘恍惚嘔吐黃疸失音風癎臍下絞痛霍亂吐痢小兒驚啼産後血結並宜服之玉屏風散得效治風邪久留而不散者自汗不止者亦宜防風黃茋白术各等分或加炒糯米右為細末酒調服此能固表使風邪不易入加牡礪名白术散盜汗方外臺麻黃根牡礪各三錢黃茋人參各三兩龍骨枸杞根白皮各四兩大棗七枚右以水六升煮取二升五合分六服止汗紅粉麻黃根牡礪煆各一兩赤石脂龍骨各五錢右為末以絹袋盛貯如朴粉用之當歸六黃湯治隂虛有火盜汗發熱當歸生地熟地黃芩黃連黃柏等分黃茋加倍右水煎服凡止汗方內俱可加浮麥大棗麥門冬湯三因治漏氣因上焦傷風開其腠理上焦之氣慓悍滑疾遇開即出經氣失道邪氣內著故有是症麥冬生蘆根竹茹白术各五錢甘草炙茯苓各二兩人參陳皮葳蕤各三兩右九味每服四錢薑五片陳米一撮煎熱服不論冬夏頭汗自出謂之漏風俗名蒸籠頭二賢散治積塊進飲食橘紅一斤甘草四兩鹽五錢右以水煮爛晒乾為末淡鹽湯下有塊加薑黃半兩同前藥煮氣滯加香附二兩氣虛加沉香半兩另入噤口痢加蓮肉二兩逍遙散局方治肝家血虛火旺頭痛目眩頰赤口苦倦怠煩渴抑鬱不樂兩肋作痛寒熱小腹重墜婦人經水不調脉弦大而虛芍藥酒炒當歸白术炒茯苓甘草炙柴胡各二錢本方加丹皮梔子即加味逍遙散加煨薑三片薄荷少許煎服此疏逹肝脾之方平胃散東垣治濕淫於內脾胃不能尅制有積飲痞膈中滿者蒼术五斤米泔浸七日陳皮去白厚朴各三斤薑汁炒甘草三十兩炙右為末每服二錢薑湯下日三服或水煎每服五錢如小便赤澀加茯苓澤㵼米榖不化飲食傷多加枳殼胃中氣不快心下痞氣加枳殼木香心下痞悶腹脹者加厚朴甘草減半遇夏加炒黃芩遇雨水濕潤時加茯苓澤㵼如有痰涎加半夏陳皮咳嗽飲食減少脉細加當歸黃茋脉洪大緩加黃芩黃連大便硬加大黃三錢芒硝三錢先嚼麩炒桃仁爛以藥送下本方加皂礬即皂礬平胃丸消食積蟲痞五苓散金匱治瘦人臍下有悸吐涎沫而癲眩此水也此方主之此乃散方近人用以作湯往往鮮效澤㵼一兩一分猪苓去皮白术茯苓各三分桂二分去皮右五味為末白飲服方寸七日三服多飲暖水汗出愈傷寒論以此方治太陽表裏未清之症所謂表裏者經與府也故此方為利膀胱水道之主藥二陳湯局方治肥盛之人濕痰為患喘嗽脹滿半夏製茯苓各三錢陳皮二錢去白甘草一錢右四味加薑三片水煎服枳术丸治痞積消食強胃金匱名枳术湯治心中堅大如盤枳實一兩白术二兩右用荷葉裹燒飯為丸桐子大每服五十丸加木香砂仁即香砂枳术丸方本金匱張潔古變其法成丸㵼黃散治脾胃伏火口燥唇乾口瘡口臭煩渴藿香七錢山梔一兩甘草二兩防風四兩右四味同蜜酒炒為末每二錢煎服其妙在用蜜酒炒保和丸丹溪治食積酒積山查二兩半夏薑製橘紅神麴麥芽茯苓各一兩連翹萊蔔子炒黃連各半兩右為末水丸加白术二兩名大安丸此治脾胃濕火氣阻之方加減思食丸治脾胃俱虛水榖不化胸膈痞悶腹脅時脹食減嗜卧口苦無味虛羸少氣胸中有寒飲食不下反胃惡心及病後心虛不勝榖氣食不服常並宜服之神麴炒黃麥芽炒黃各二兩烏梅四兩乾木瓜半兩白茯苓甘草炒各二錢半右為末蜜丸櫻桃大每服一丸細嚼白湯送下如渴時噙化一丸此收納胃氣之方用烏梅木瓜甚巧越鞠湯丸丹溪治一切濕痰食火氣血諸鬱香附蒼术撫芎各二兩神麴山梔仁各一兩右以水煎服或作丸菉豆大每服百丸白滚湯下四磨飲濟生治七情傷感上氣喘急胸膈不快妨悶不食人參檳榔沉香天台烏藥右四味各濃磨水取七分煎三五沸空心溫服濃汁使藥存留胸中不即下逹亦古製方之法也妙香丸局方治時疾傷寒解五毒治潮熱積熱及小兒驚癎百病巴豆三百十五粒去殼心膜炒熱研如麵按巴豆太多宜酌減牛黃研龍腦研膩粉麝香研各三兩辰砂研飛九兩金箔研九十片右合研勻煉黃蠟六兩入白蜜三分同煉勻為丸每兩作三十丸如治潮熱積熱傷寒結胸發黃狂走􅏥熱口乾面赤大小便不通大黃炙甘草湯下一丸毒痢下血黃連湯調膩粉少許如患酒毒食毒茶毒氣毒風痰伏痞吐逆等症並用膩粉龍腦米飲下中毒吐血悶亂煩躁欲死者用生人血下立愈小兒百病驚癎急慢驚風涎潮搐搦用龍腦膩粉蜜湯下菉豆大二丸諸積食積頰赤煩躁睡卧不寧驚哭㵼痢並用金銀薄荷湯下更量歲數加減如男婦因病傷寒時疾陰陽氣交結伏毒氣胃中喘燥眼赤潮發經七八日至半月日未安醫所不明證候脉息交亂者可服一丸或分作三丸亦可並用龍腦膩粉米飲調下一服取轉下一切惡毒涎并藥丸㵼下如要藥即行用針刺一孔冷水浸少時服之其效更速凡用蠟丸之藥既不可化開服則三分一丸之大丸不能下咽宜作一分一丸之小丸每服三丸為妥藿香正氣散局方治外受四時不正之氣內停飲食頭痛寒熱或霍亂吐泄或作瘧疾厚朴陳皮桔梗半夏各二兩甘草一兩炙大腹皮換檳榔亦可白芷茯苓蘇葉各三兩藿香三兩右十味加薑棗水煎熱服此方可治時疫天水散河間一名益元散一名六一散治夏時中暑熱傷元氣內外俱熱無氣以動煩渴欲飲腸胃枯涸者又能催生下乳積聚水畜裏急後重暑注下迫者宜之桂府滑石六兩水飛甘草一兩辰砂三錢右為細末新汲水一碗調服三錢滑利清凉通逹水道而不傷隂所以為佳二氣丹局方治內虛裏寒胸腹滿痛泄利無度嘔吐自汗小便不禁陽氣漸微手足厥冷及傷寒隂症霍亂轉筋久下冷痢少氣羸困一切虛寒痼冷肉桂硫黃細研各二錢半乾薑炮硃砂另研為衣各二錢黑附子製五錢右為末麵糊丸桐子大每服三十丸艾湯或鹽湯下此治下焦無陽積寒犯腎之症㵼白散錢乙治肺熱咳嗽桑皮炒地骨皮各一兩甘草五錢右為末每服一二錢入粳米百粒水煎此方能治肺中之飲三黃湯本事方治三焦實熱一切有餘火症大便祕結者黃芩大黃黃連各等分右三味水煎服凉膈散局方治心火上盛中焦燥實煩躁口渴目赤頭眩口瘡唇裂吐血䘐血大小便祕諸風瘛瘲發斑發狂及小兒驚風痘瘡黑陷連翹四兩大黃酒浸芒硝甘草各二兩黃芩酒炒薄荷梔子各一兩右為末每服三錢加竹葉生蜜煎此㵼中上二焦之火即調胃承氣加疏風清火之品也四物二連湯元戎治血虛五心煩熱晝則明了夜則發熱當歸白芍炒生地各一兩川芎七分黃連炒五分胡黃連三分右六味水煎服血中有實熱此方主之左金丸治肝藏火實左脅作痛黃連六兩吳茱茰一兩洗泡右為末作丸吳茰仲景用以治嘔逆吐涎等症脅痛亦痰飲為害也兩脅皆屬於肝此方亦不專治左脅龍膽㵼肝湯局方治脅痛口苦耳聾耳腫筋痿隂濕熱癢隂腫白濁溲血龍膽酒炒三分黃芩炒梔子酒炒澤㵼一錢木通車前子各五分當歸三分炒酒洗柴胡一錢甘草生地酒炒各三分右十味水煎服此㵼中上焦之火純用苦味甘露飲局方治丈夫小兒胃中客熱牙宣齒爛目垂欲閉饑不欲食及目赤腫痛口瘡咽腫瘡疹已發未發又療脾胃濕熱醉飽房勞黃疸腹滿或時身熱並宜服之枇杷葉熟地天冬枳殼茵蔯生地麥冬石斛甘草炙黃芩各等分右為末每二錢水一盞煎七分去滓食後臨卧溫服本事方去麥冬加犀角名加减甘露飲此乃以散作飲者清心蓮子飲局方治心虛有熱小便赤澀黃芩麥門冬去心地骨皮甘草炙車前子各半兩石蓮肉去心白茯苓去皮黃茋蜜炙人參各七錢半右銼散每三錢另用麥冬十粒水煎八分水中沉冷空心服發熱加柴胡薄荷亦以散作飲者㵼熱梔子煎外臺治膽府實熱精神不守梔子二十一枚竹茹一兩香豉六合大青橘各二兩赤蜜三合右六味以水六升煮取一升七合去滓下蜜再微煎二三沸分再服大順散局方治胃暑伏熱引飲過多脾胃受濕水榖不分霍亂嘔吐藏腑不調甘草三十斤銼寸長乾薑杏仁去皮尖肉桂去粗皮各四斤右先將甘草用白砂糖炒及八分黃熟次入乾薑同炒令薑裂次入杏仁又同炒候不作聲為度篩淨後入肉桂一處搗為散每服二錢水煎溫服如煩躁井花水調下不拘時沸湯調亦得此治暑天內傷冷飲之症非治暑也又甘草多於諸藥八倍亦非法此等病百不得一偶用之耳而製藥四十二斤又止服二錢其意何居其方本不足取而後之庸醫竟以此治燥火之暑病殺人無算故録此以證其非十精丸又名保真丸元和紀用經兔絲子人精長隂發陽酒浸一宿濕搗甘菊花月精二味春加一倍五加皮草精益肌去皮用柏子仁木精明目通氣二味夏加白术日精長肌肉人參藥精鎮心療驚癎二味秋加石斛山精治筋骨如金叉者酥炙鹿茸血精止腰痛益精酥炙肉蓯蓉地精破癥消食酒浸一宿蒸用巴㦸天精治精冷益智紫色者去心酒浸一宿四味冬加右十味等分隨四季各加分兩為末煉蜜丸梧桐子大空心溫酒或鹽湯下二十五粒至三十粒忌牛肉生葱此世所謂丹藥也溫平補益成煉鍾乳粉千金翼主五勞七傷咳逆上氣治寒嗽通音聲明目益精安五藏通百節利九竅下乳汁益氣補虛療腳弱冷疼下焦傷竭強隂久服延年益壽令人有子鍾乳不拘多少右取韶州鍾乳顔色明淨光澤者不拘多少置鍾乳於金銀器中即以大鐺著水沉金銀器於鐺中煮之常令如魚眼沸水减即添薄乳三日三夜粗厚管者七日七夜候乳色變黃白即熟如疑生更煮滿十日最佳出金銀器中更著清水更煮經半日許即出之水色清不變則止即於磁鉢中用玉鎚著水研之每日著水攪令勻勿使著鎚鉢勿使纎塵入內研覺乾澀即更添水常令如稀米泔狀乳細者皆浮在上粗者沉在下復繞鎚鉢四邊研之狀若乳汁研指上如書中白魚膩即成澄取曝乾每服稱半兩分為三服用溫酒調下空腹服更量病輕重加減服之亦可和為丸服之此鎮心強腎之聖藥唐人最重之玉霜圓局方治真氣虛􅉵下焦傷竭臍腹弦急腰腳疼痛精神困倦面色枮槁或亡血盜汗遺瀝失精二便滑數肌消陽痿久服續骨聨筋祕精堅髓安魂定魄輕身壯陽白龍骨一斤細搗羅研水飛三次晒乾用黑豆一斗蒸一伏時以夾袋盛晒乾牡蠣火煆成粉紫稍花如無以木賊代之各三兩牛膝酒浸炙乾稱磁石醋淬七次紫巴㦸穿心者澤㵼酒浸一宿炙石斛炙硃砂研飛肉蓯蓉去皮酒浸一宿炙乾各二兩茴香微炒肉桂去皮各一兩兔絲子酒浸一伏時蒸杵為末鹿茸半兩酒浸一伏時慢火炙脆韭子微炒五兩天雄十兩酒浸七日掘一地坑以炭燒赤速去火令淨以醋二升沃於坑候乾乘熱便投天雄在內以盆合土擁之經宿後取出去皮臍右為細末煉酒蜜各半和圓如桐子大每服三十丸空心晚食前溫酒下按此藥澀精納氣腎中陽虛者最宜亦丹藥也礞石滚痰丸養生主論治實熱老痰之峻劑虛寒者不可用黃芩大黃酒蒸各八兩礞石一兩焰消煆過埋地內七日沉香五錢忌火右四味為細末水丸川椒大量人大小用之用溫水一口送過咽即仰卧令藥徐徐而下半日不可飲食勿起身行動言語待藥氣自胃口漸下二腸然後動作飲食服後喉間稠黏壅滯不快此藥力相攻故痰氣從上也少頃藥力至而漸逐惡物入腹下腸效如響應下結痰之主方黑錫丹局方治脾元久冷上實下虛胸中痰飲或上攻頭目及奔豚上氣兩脅膨脹并隂陽氣不升降五種水氣腳氣上攻或卒暴中風痰潮上膈等症沉香附子胡蘆巴肉桂各半兩茴香破故紙肉豆蔲金鈴子木香各一兩黑錫硫黃與黑錫結炒子各三兩右為末同研酒煮麵糊為丸梧子大隂乾以布袋擦令光瑩每服四十丸薑湯下此鎮納上越之陽氣為醫家必備之要藥按黑錫成砂最難加水銀少許為妙龍腦雞蘇丸局方治上焦熱除煩解勞去肺熱咳衄血熱驚悸脾胃熱口甘吐血肝膽熱泣出口苦腎熱神志不定上而酒毒膈熱消渴下而血滯五淋血崩薄荷一斤生地另為末六兩黃芩新蒲黃炒麥冬阿膠炒人參俱為末木通銀柴胡各二兩木通沸湯浸一日夜絞汁甘草一兩半黃連一兩右為末好蜜二斤先煎一二沸然後下生地末不住手攪時加木通柴胡汁慢火熬膏勿令火緊膏成然後加藥末和丸豌豆大每服二十丸白湯下此方製法精妙虛勞虛煩梔子湯下肺熱黃芩湯下心熱悸動恍惚人參湯下衄血吐血麥冬湯下肝熱防風湯下腎熱黃柏湯下已上並食後臨卧服治五淋及婦人漏下車前湯下痰嗽者生薑湯下莖中痛者蒲黃滑石水一鍾調下氣逆橘皮湯下室女虛勞寒熱潮作柴胡人參湯下生地末不若鮮者一斤同蜜熬成膏尤妙此方能治血中之熱骨蒸病最宜惟薄荷太多宜减十分之九想製方之人所用薄荷乃他處之薄荷非蘇州之真龍腦也真龍腦芳烈透腦發泄太過反有所害故醫者不可不知藥也至寶丹局方治中惡氣絶中風不語中諸物毒熱疫煩躁氣喘吐逆難産悶亂死胎不下以上並用童便一合生薑自然汁三五滴和溫化下三圓至五丸神效又治心肺積熱嘔吐邪氣攻心大腸風祕神魂恍惚頭目昏眩口乾不眠傷寒狂語並治之生烏犀屑生玳瑁屑琥珀研硃砂研飛雄黃研細各一兩龍腦麝香研各一分牛黃五錢研安息香一兩半為末酒研飛淨一兩熬膏用水安息尤妙銀箔金箔各五十片研細為衣右將生犀玳瑁為細末入餘藥研勻將安息香膏重湯煮凝成後入諸藥中和搜成劑丸如桐子大用人參湯化下三丸至五丸又治小兒諸癎急驚心熱卒中客忤不得眠煩躁風涎搐搦每二歲兒服二丸人參湯下本事方中多人參南星天竺黃安神定魄必備之方真神丹也蘇合香丸局方療傳尸骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐利時氣瘴瘧赤白暴利瘀血月閉痃癖丁腫驚癎小兒吐乳大人狐狸等疾蘇合香油五錢入安息香內安息香一兩另為末用無灰酒半斤熬膏丁香青木香白檀香沉香蓽撥香附子訶子煨取肉烏犀鎊硃砂水飛各一兩薰陸香片腦研各五錢麝香七錢半右為細末入安息香膏煉蜜和劑圓如芡實大每四丸空心用沸湯化下溫酒下亦得此辟邪驅穢之聖方惟氷麝太多宜減大半瓊玉膏申先生方治虛勞乾咳生地黃四斤若取鮮生地汁須用十斤白茯苓十二兩白蜜二斤人參六兩有加沉香血珀粉各一錢五分右以地黃汁同蜜熬沸用絹濾過將參茯為細末入前汁和勻以磁瓶用綿紙十數層加箬葉封瓶口入砂鍋內以長流水沒瓶頸桑柴火煮三晝夜取出換紙扎口以蠟封固懸井中一日取起仍煮半日湯調服此方别本製法各殊自此為血症第一方按乾淮生地四斤浸透可取然汁一斤若浙地則十斤祗取自然汁一斤須三十斤方可配諸藥故修合之法當隨時隨地變通也大活絡丹聖濟治一切中風癱瘓痿痺痰厥拘攣疼痛癰疽流注跌撲損傷小兒驚癎婦人停經白花蛇烏稍蛇威靈仙兩頭尖俱酒浸草烏天麻煨全蝎去毒首烏黑豆水浸龜板炙麻黃貫仲炙草羌活官桂藿香烏藥黃連熟地大黃蒸木香沉香以上各二兩細辛赤芍沒藥去油另研丁香乳香去油另研殭蠶天南星薑製青皮骨碎補白蔲安息香酒熬黑附子製黃芩蒸茯苓香附酒浸焙元參白术以上各一兩防風二兩半葛根虎脛骨炙當歸各一兩半血蝎另研七錢地龍炙犀角麝香另研松脂各五錢牛黃另研片腦另研各一錢五分人參三兩右共五十味為末蜜丸如桂圓核大金箔為衣陳酒送下頑痰惡風熱毒瘀血入於經絡非此方不能透逹凡治肢體大症必備之藥也方書亦有活絡丹祇用地龍乳香等四五味此乃治藜藿人實邪之方不堪用也紫雪局方療腳氣口中生瘡狂易呌走瘴疫毒厲卒死溫瘧五尸五注心腹諸疾㽲痛及解諸熱毒藥邪熱卒黃等症并解蠱毒鬼魅野道熱毒又治小兒驚癎百病黃金一百兩寒水石磁石石膏滑石各三斤以上並搗碎用水一斛煮至四斗去滓入下藥羚羊角屑犀角屑青木香沉香各五斤丁香一兩元參升麻各一斤甘草八兩炙以上入前藥汁中再煮取一斗五升去渣入下藥朴硝十斤硝石四斤二味入前藥汁中微火上煎柳木篦攪不住手候有七升投在木盆中半日欲凝入下藥麝香當門子一兩二錢半硃砂三兩上藥入前藥中攪調令勻磁器收藏藥成霜雪紫色水調下按二硝太多當只用十分之一則藥力方厚丁香用二兩余所合者皆然方中黃金百兩以飛金一萬頁代之尤妙邪火毒火穿經入臟無藥可治此能消解其效如神解毒萬病丹一名紫金錠治一切藥毒菰子鼠莽惡菌疫死牛馬河豚等毒及時行瘟疫山嵐瘴瘧纒喉風痺黃疸赤眼瘡癤熱毒上攻或自縊溺水打撲傷損癰疽發背魚臍瘡腫百蟲蛇犬所傷男子婦人癲邪狂走鬼胎鬼氣並宜服之山茨菰去皮洗淨焙二兩川文蛤一名五棓子捶破洗刮內桴二兩千金子去殼用紙包裹換紙研數十次去盡油無油成霜二兩麝香細研淨三錢紅芽大㦸洗焙一兩右各研細末和勻以糯米粥為劑每料分作四十粒於端午七夕重陽合如欲急用辰日亦得於木臼中杵數百下不得令婦人孝服人不具手足人及雞犬之類見之此祕藥中之第一方也黃用藥之竒不可思議或加入硃砂雄各五錢尤效蘭臺軌範卷一
