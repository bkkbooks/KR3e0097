body:
  text: 蘭臺軌範卷七吳江徐大椿撰疫癘鬼疰素問遺篇刺法論黃帝曰余聞五疫之至皆相染易無問大小病狀相似不施救療如何可得不相移易者岐伯曰不相染者正氣存內邪不可干避其毒氣天牝從來天牝內經注云鼻也空虛能受天地之氣故曰天牝欲其來往出入復得其性氣出於腦即不邪干氣出於腦即先想心如日欲將入於疫室先想青氣自肝而出左行於東化作林木次想白氣自肺而出右行於西化作戈甲次想赤氣自心而出南行於上化作焰明次想黑氣自腎而出北行於下化作水次想黃氣自脾而出存於中央化作土五氣護身已畢以想頭上如北斗之煌煌然後可入於疫室又一法於春分之日日未出而吐之又一法於雨水日後三浴以藥泄汗病源一歲之內節氣不和寒暑乖候或有暴風疾雨霧露不散則民多疾疫無長少卒皆相似如有鬼厲故云疫癘中惡精神衰弱為鬼神之氣卒中之卒然心腹刺痛悶亂欲死凡卒中惡腹大而滿者診其脈緊大而浮者死緊細而浮者生又中惡吐血數升脈沉數細者死浮焱如疾者生脈大段如此亦不可泥吐卒然吐血多者多係中惡莫作血治尸厥隂陽逆也其狀如死猶微有息而不恆脈尚動而形無知也脈沉大而滑身溫而汗此為入腑氣復自愈若唇青身冷此為入臟即死鬼擊謂鬼癘之氣擊著於人也得之無漸如人以刀矛持刺狀胸脅腹內絞急切痛不可抑按或吐血或鼻中出血或下血一名為鬼排重者死卒魘魂魄外遊為他邪所執欲還未得忌火照之照則神魂遂不復入乃死若在燈光前魘者是本由明出不忌火三尸諸蟲其蟲與人俱生而此蟲忌血能與鬼靈相通常接引外邪為人患害其發作之狀或沉沉默默不知所苦而無處不惡或腹痛脹急或磊塊踊起或攣引腰脊或精神雜錯變狀多端其病大同小異但以一方治之者故名諸尸也尸注是五尸內之尸注而挾外鬼邪之氣流注身體令人無處不惡每節氣改變輒至大惡積月纍年漸就頓滯以至於死死後復易旁人乃至滅門以其尸病注易旁人故曰尸注喪尸人有年命衰弱至於喪死之處心意有所畏惡其身內尸蟲性既忌惡便更接引外邪共為疹病其發亦心腹刺痛脹滿氣急但逢喪處其病則發故謂之喪尸尸氣人有觸值死尸或臨尸其尸氣入腹內與尸蟲相接成病其發亦心腹刺痛脹滿氣急但聞尸氣則發故謂之尸氣諸注謂邪氣居住人身內故名為注又注易旁人也乃有三十六種九十九種而方皆不顯其名所載有風鬼轉生死邪氣寒熱冷蠱毒惡忤遁走溫喪哭殃食水骨血溫痺勞微泄石産土飲以上諸注皆正氣虛而邪氣傳綿也與諸尸病相近又有九種注一曰風注二曰寒注三曰氣注四曰生注五曰凉注六曰酒注七曰食注八曰水注九曰尸注疫癘方小金丹方素問辰砂二兩水磨雄黃一兩叶子雌黃一兩紫金半兩愚按以金箔同藥研之可為細末同入合中外固了地一尺築地實不用爐不須藥制用火二十斤煆之也七日終常令火不絶候冷七日取次日出合子合子即磁罐之屬取出順日研之順日研之謂左旋也三日煉白沙蜜為丸如梧子大每日望東吸日華氣一口氷水下一丸和氣咽之服十粒無疫干也還魂湯金匱救卒死客忤死麻黃三兩去節一方四兩杏仁去皮尖七十個甘草一兩炙千金用桂心二兩右三味水八升煮取三升去渣分令咽之通治諸感忤千金方云此方主卒忤鬼擊飛尸諸奄忽氣絶復覺或已無脈口禁拗不開去齒下湯湯入口不下者分病人髮左右足踏肩引之藥下復增取一升須臾立蘇又方韭根一把烏梅二七個吳茱茰半升炒右三味以水一斗煮之以病人櫛內中三沸櫛浮者生沉者死煮取三升去滓分飲之外臺走馬湯金匱附方治中惡心痛腹脹大便不通并通治飛尸鬼擊巴豆二枚去皮心熬杏仁二枚右二味以綿纒捶令碎熱湯二合捻取自然汁飲之當下老小量之雄黃粉千金翼治卒中鬼擊及刀兵所傷血漏腹中不出煩滿欲絶雄黃一味為粉以酒服一刀圭日三血化為水治瘟方外臺瘟疫轉相染著至滅門延及外人無收視者赤小豆鬼箭羽鬼臼雄黃研丹砂各二兩右五味搗末蜜丸如小豆大服一丸可與病人同牀辟瘟殺鬼丸外臺虎頭骨五兩炙硃砂一兩半研鬼臼一兩雄黃一兩半研皂莢一兩炙雌黃一兩半研蕪荑一兩右七味搗篩以蠟蜜和彈丸大絳囊盛繫臂男左女右家中置屋四角月朔望夜半中庭燒一丸忌生血物八毒赤丸寶鑑治鬼疰病雄黃礬石硃砂附子泡藜蘆丹皮巴豆各一兩蜈蚣一條為末蜜丸小豆大每服五七丸冷水送下無時礬石或作礜石紫金錠蘇合丸二方俱見通治諸疸附黃汗素問平人氣象論溺黃赤安卧者黃疸已食如饑者胃疸目黃者曰黃疸金匱趺陽脈緊而數數則為熱熱則消榖緊則為寒食即為滿脈緊而數則有熱兼有寒故用藥亦當寒熱兼顧古方可考也尺脈浮為傷腎跌陽緊為傷脾風寒相搏食榖即眩榖氣不消胃中苦濁濁氣下流小便不通隂被其寒熱流膀胱身體盡黃名曰榖疸額上黑微汗出手足中熱薄暮即發膀胱急小便自利名曰女勞疸腹如水狀不治心中懊憹而熱不能食時欲吐名曰酒疸夫病酒黃疸必小便不利其候心中熱足下熱是其證也酒疸心中熱欲吐者吐之愈酒疸下之久久為黑疸目青面黑心中如噉蒜虀狀大便正黑皮膚爪之不仁脈浮弱雖黑微黃故知之黃家從濕得之一身盡發熱面黃肚熱熱在裏當下之黃疸之病當以十八日為期治之十日以上瘥反劇為難治疸而渴者其疸難治疸而不渴者其疸可治發於隂部其人必嘔陽部其人振寒而發熱也黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身常暮卧盜汗出者此榮氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以下必汗出下無汗腰臗弛痛如有物在皮中狀劇者不能食身疼痛煩燥小便不利此為黃汗病源黃病黃病者一身盡疼發熱面色洞黃七八日後壯熱口裏有血當下之法如㹠肝狀其人少腹內急若其人眼睛澀疼鼻骨疼兩膞及項強腰背急即是患黃多大便澀但令得小便快即不慮死不用大便多多即心腹脹不存此由寒濕在表則熱蓄於脾胃腠理不開瘀熱與宿榖相搏煩鬱不消則大小便不通故身體面目皆變黃也利小便為治黃總訣急黃脾黃有熱榖氣鬱蒸因為熱毒所加故猝然發黃心滿氣喘命在頃刻故云急黃也勞黃脾臟中風風與瘀熱相搏故令身體發黃額上黑微汗出手足中熱薄暮發膀胱急四肢煩小便自利名為勞黃腦黃熱邪在骨髓腦為髓海故熱氣從骨髓流入於腦則身體發黃頭痛眉疼隂黃陽氣伏隂氣盛熱毒加之故但身面色黃頭痛而不發熱名為隂黃癖黃氣水飲停滯結聚成癖因熱氣相搏則鬱蒸不散故脅下滿痛而身發黃名為癖黃噤黃心脾有瘀熱心主於舌脾之絡脈出於舌下若身面發黃舌下大脈起青黑色舌噤不能語名為噤黃五色黃凡人著五種黃其人冥漠不知東西者看其左手脈名手肝脈兩筋中其脈如有如無又看近手屈肘前臂上當有三岐脈中央者名為手肝脈兩廂者名岐脈看時若肝脈全無兩廂壞其人九死一生若中央脈近掌三指道有如不絶其人必不死酒疸虛勞之人飲酒多進榖少則胃內生熱因大醉當風入水則身目發黃心中懊痛足脛滿小便黃面發赤斑榖疸榖疸之狀食畢頭眩心忪怫鬱不安而發黃由失饑大食胃氣衝熏所致女勞疸其狀身目皆黃發熱惡寒小腹滿急小便難由大勞大熱而交接即入水所致也黑疸黑疸之狀小腹滿身體盡黃額上反黑足下熱大便黑是也諸疸久久多變為黑疸黃汗之為病身體洪腫發熱汗出不渴狀如風水汗染衣正黃如蘗汁其脈自沉此由脾胃有熱汗出而入水中浴若水入汗孔中得成黃汗也諸疸方茵陳蒿湯金匱榖疸之為病寒熱不食食即頭眩心胸不安久久發黃為榖疸此湯主之茵陳蒿六兩梔子十四枚大黃二兩右三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也消石礬石散金匱黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治此方主之消石礬石燒等分右二味為散以大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黑是候也梔子大黃湯金匱酒黃疸心中懊憹或熱痛此方主之梔子十四枚大黃一兩枳實五枚豉一升右四味以水六升煮取二升分溫三服桂枝加黃茋湯金匱諸病黃家但利其小便假令脈浮當以汗解之此方主之亦主治黃汗桂枝芍藥甘草各二兩生薑三兩大棗十二枚黃茋二兩右六味以水八升煮取三升溫服一升須臾飲熱稀粥一升餘以助藥力溫覆取微汗不汗更服猪膏髮煎金匱諸黃主之猪膏半斤亂髮如雞子大三枚右二味和膏中煎之髮消藥成分再服病從小便出茵陳五苓散金匱黃疸主之茵陳膏末一錢五苓散五分右二味和先食飲方寸七日三服此利小便之法大黃消石湯金匱黃疸腹滿小便不利而赤自汗出此為表和裏實當下之大黃黃檗消石各四兩梔子十五枚右四味以水六升煮取二升去渣內消更煮取一升頓服黃疸變腹滿者最多此方乃下法也麻黃醇酒湯千金治黃疸麻黃三兩以美清酒五升煮取二升半頓服盡冬月用酒春月用水黃疸方千金翼治身目皆黃皮肉麴塵出茵陳一把梔子二十四枚石膏一斤以水五升煮二升取二升半去渣以猛火燒石膏令赤投湯中沸定服一升覆取汗周身以粉粉之不汗更服燒石膏之義甚精妙赤苓散千金翼主黑疸身皮大便皆黑赤小豆三十枚茯苓六銖切雄黃一銖瓜丁四銖女蔞六銖甘草二銖炙以水三升煮豆茯苓取八合搗四味為散和半錢服之須臾當吐吐則愈亦主一切黃寒水石散千金翼主肉疸飲少小便多白如泔色此病得之從酒寒水石白石脂栝蔞各五分知母兔絲子桂心各三分搗篩為散麥粥服五分七日三服五日知十日差此方不常用聊備一格女勞疸千金翼治黃疸之為病日晡所發熱惡寒少腹急體黃額黑大便黑溏泄足下熱此為女勞也腹滿者難療滑石研石膏研各五兩為散麥粥汁服方寸七日三小便極利差牛膽煎千金翼酒疸身黃麴塵出此主之牛膽一枚大黃八兩芫花一升熬蕘花半斤熬右三味以酒一升切三味漬之一宿煮減半去渣內牛膽微火煎令可丸丸如豆大服一服日移六七尺不知更服一丸膈上吐膈下痢或不吐痢而愈救急三十種黃方外臺用雞子一顆并殼燒灰研酢一合又溫之總和頓服身體眼暗極黃者不過三顆鼻中蟲出神效療黃疸方外臺取生小麥苖搗絞取汁飲六七合晝夜三四飲三四日便愈無小麥苖穬麥苖亦得近效瓜蒂散外臺療黃疸瓜蒂二七枚赤小豆七枚生秫米二七枚丁香二七枚右四味搗篩重者取如大豆二枚各著一枚鼻孔中痛縮鼻須臾鼻中瀝清黃水或從口中出升餘則愈病輕者小豆大則可不愈間日復頻用效或使人以竹筒極力吹鼻中無不死者嗅鼻出黃水唐以前即有此法或用束腰葫蘆內白膜研細加麝少許吹鼻亦能出水麻黃連軺赤小豆湯傷寒論治傷寒瘀熱在裏身必發黃此主之麻黃二兩去節連軺二兩赤小豆一升杏仁四十粒甘草二兩生梓白皮一升生薑二兩大棗十二枚右以潦一斗先煮麻黃去沫內諸藥煮取三升分溫三服此方治傷寒餘邪未盡之黃與諸症微别黃茋芍藥桂枝苦酒湯金匱黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如蘗汁脈自沉以汗出入水中浴水從汗孔入得之此湯主之黃茋五兩芍藥三兩桂枝三兩右三味以苦酒一升水七升相和煮取三升溫服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也一方以美生醯代苦酒此病在表不在裏金匱等書治疸病之方最多然用之或效或不效非若他症之每發必中者何也蓋疸之重者有囊在腹中包褁黃水藥不能入非决破其囊或提其黃水出淨必不除根此等病當求屢試屢驗和平清淡之單方治之專恃古方竟有全然不應者小建中湯見通治瓜蒂湯方見暍門情志卧夢靈素靈大惑論五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束褁擷筋骨血氣之精而與脈并為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系以入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪同其精其精所中不相比也則精散精散則視岐視岐見兩物目者五臟六腑之精也營衛魂魄之所常營神氣之所生也故神勞則魂魄散志意亂是故瞳子黑眼法於隂白眼赤脈法於陽也故隂陽合傳而精明也目者心使也心者神之舍也故精神亂而不轉卒然見非常處精神魂魄散不相得故曰惑也素舉痛論帝曰余知百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結隂陽氣象大論東方生風在聲為呼在變動為握在志為怒怒傷肝悲勝怒所勝即五行生剋之理南方生熱在聲為笑在變動為憂在志為喜喜傷心恐勝喜中央生濕在聲為歌在變動為噦在志為思思傷脾怒勝思西方生燥在聲為哭在變動為咳在志為憂憂傷肺喜勝憂北方生寒在聲為呻在變動為栗在志為恐恐傷腎思勝恐調經論神有餘則笑不休神不足則悲血有餘則怒不足則恐血并於隂氣并於陽故為驚狂血并於陽氣并於隂乃為炅中血并於上氣并於下心煩惋善怒血并於下氣并於上亂而善忘以上情志不卧多卧靈邪客篇黃帝問於伯髙曰夫邪氣之客人也或令人目不瞑不卧出者何氣使然伯髙曰五榖入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉榮氣者泌其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉衛氣者出其悍氣之栗疾而先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於隂常從足少隂之分間行於五臟六腑今厥氣客於五臟六腑則衛氣獨衛其外行於陽不得入於隂行於陽則陽氣盛陽氣盛則陽蹻陷不得入於隂隂虛故目不瞑黃帝曰善治之奈何伯髙曰補其不足㵼其有餘調其虛實以通其道而去其邪飲以半夏湯一劑隂陽已通其卧立至大惑論黃帝曰人之多卧者何氣使然岐伯曰此人腸胃大而皮膚濕而分肉不解焉善食人多善卧往往如此黃帝曰卒然多卧者何氣使然岐伯曰邪氣留於上焦上焦閉而不通已食若飲湯衛氣留久於隂而不行故卒然多卧焉不夜瞑不晝瞑靈營衛生㑹篇黃帝曰老人之不夜瞑者何氣使然少壯之人不晝瞑者何氣使然岐伯答曰壯者之氣血盛其肌肉滑氣道通榮衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澀五臟之氣相搏其榮氣衰少而衛氣內伐故晝不精夜不瞑寒熱病篇陽氣盛則瞋目隂氣盛則瞑目不得卧素逆調論不得卧而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得卧也下經曰胃不和則卧不安此之謂也夫起居如故而息有音者此肺之絡脈逆也絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音也夫不得卧卧則喘者是水氣之客也夫水者循津液而流也腎者水臟主津液主卧與喘也以上卧按風邪入於隂經亦多卧靈淫邪發夢篇隂氣盛則夢涉大水而恐懼陽盛則夢大火燔焫隂陽俱盛則夢相殺上盛則夢飛下盛則夢墮甚饑則夢取甚飽則夢豫肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚心氣盛則夢喜笑恐畏脾氣盛則夢歌樂身體重不舉腎氣盛則夢腰脊兩解不屬素脈要精微論短蟲多則夢聚衆長蟲多則夢相擊毁傷以上夢情志卧夢方半夏秫米湯靈樞以流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪火沸置秫米一升治半夏五合徐炊令竭為一升半去其滓飲汁一小杯日三稍增以知為度故其病新發者覆杯則卧汗出則已矣久者三飲而已也漢時一斗僅今二升余親見古銅量一枚較凖如此半夏麻黃丸金匱心下悸者此主之半夏麻黃等分右二味末之煉蜜丸小豆大飲服三丸日三此治飲在心下者桂枝救逆湯金匱火邪者主之桂枝三兩去皮甘草二兩炙生薑三兩牡蠣五兩熬龍骨四兩蜀漆三兩洗去腥大棗十二枚右七味末之以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服黃連阿膠湯傷寒論治少隂病心中煩不得卧黃連四兩黃芩一兩芍藥二兩阿膠三兩雞子黃二枚右五味以水六升先煮三物取二升去滓內阿膠煬盡少冷內雞子黃攪和溫服七合此治腎氣沖心之不得卧故清心火以納腎氣酸棗仁湯金匱治虛勞虛煩不得眠酸棗仁二升甘草一兩知母茯苓川芎各二兩右五味以水八升先煮棗仁取六升內諸藥煮取三升分溫三服同一心煩不眠而用藥逈别何醫者之多不審也此方外臺有加乾薑者亦可採取溫膽湯千金治大病後虛煩不得眠此膽寒故也宜服半夏竹茹枳實各二兩橘皮三兩生薑四兩甘草一兩右六味㕮咀以水八升煮取二升分三服又一不眠之症方中一味生薑已足散膽中之寒庸醫則必以熱藥溫膽須知膽為清虛之腑無庸熱補之理也治多忘千金菖蒲二分茯苓茯神人參各五分逺志七分右五味治下篩酒服方寸七日二夜一五日後知神良枕中方千金治好忘龜甲炙龍骨逺志去心菖蒲等分右四味治下篩酒服方寸七日三常服令人大聰鎮心省睡益智方千金翼逺志五十兩去心益智子菖蒲各八兩右三味為末以淳糯米酒服方寸七一百日有效祕不令人知療虛煩不可攻方外臺青竹茹二升以水四升煮取三升去滓分溫五服梔子䜴湯見傷寒補心丸天王補心丹道藏鎮心丸以上三方俱見通治五竅病耳目鼻口齒靈樞靈脈度篇五臟不和則七竅不通耳靈素靈厥氣篇精脫者耳聾液脫者耳數鳴素繆刺論邪客於手陽明之絡令人耳聾時不聞音刺手大指次指爪甲上去端如韭葉許各一痏立聞不已刺中指爪甲上與肉交者立聞其不時聞者不可刺也此乃邪氣入絡卒然所得之症故可刺耳聾刺手陽明不已刺其通脈出耳前者病源耳聤聹耳津液為風熱所乘結􅀈成丸塞耳耳方補腎治五聾方千金翼治勞聾氣聾風聾虛聾毒聾如此久聾耳中作聲萆麻仁五分杏仁去皮尖桃仁去皮尖蠟八分菖蒲磁石各一兩巴豆仁一分去皮心熬石鹽三分附子泡通草各半兩薰陸香一分松脂二兩半右十二味先搗諸草石等令細别搗諸仁如脂加松脂及蠟合搗數千杵可丸乃止取如棗核大綿褁塞耳一日四五度出之轉捻不過三四度日一易之蓯蓉丸濟生治腎虛耳聾或風邪入於經絡耳內虛鳴肉蓯蓉山茰肉石龍芮一名胡椒菜石菖蒲兔絲子羌活鹿茸石斛磁石附子各一兩全蝎七個去毒麝香半字旋入右為末煉蜜丸梧子大每服百丸空心酒下或鹽湯下麝香佛手散竒效治五般耳出血水者麝香少許人牙煆過存性出火毒亦以人牙換石首魚齒良右為細末每用少許吹耳內即乾及治小兒痘瘡出現壓者酒調一字服之即出磁石猪腎羮養老書治老人久患耳聾養腎臟強骨氣磁石一斤杵碎水淘去赤汁綿褁猪腎一對去脂膜細切右以水五升煮磁石取二升去磁石投腎調和以葱豉薑椒作羮空腹食之作粥及入酒並得通耳法濟生磁石用緊者如豆大一塊穿山甲燒存性為末一字右用新綿紙褁了塞耳口中銜少許鐵覺耳內如風雨即愈一方用班毛一箇巴豆一粒研細綿褁塞耳痛取出按此症如有火者服清火藥腎虛者服補腎藥隨症施治無定方也目靈素靈論疾診尺篇診目痛赤脈從上下者太陽病從下上者陽明病從外走者少陽病决氣篇氣脫者目不明素解精微論夫風之中目也陽氣內守於精是火氣燔目故見風則泣下也目方七寶散千金翼主目翳經年不愈方琥珀珠子珊瑚决明子紫貝石膽馬珂各一分硃砂二分㽔仁五錢右為細末傅目中如小豆大日三大良去翳方千金翼貝子十枚燒灰為末取如胡豆著翳上日冉正仰卧令人傅之如炊一石米久乃拭之有息肉者加珍珠如貝子等分研如粉補肝丸千金翼主明目地膚子藍子蒺藜子車前子瓜子兔絲子茺蔚子各二兩黃連一兩半青葙子一合大黃二兩决明子細辛螢火蟲各五合桂心五分右十四味搗篩煉蜜和丸飲服如桐子大下十五丸可加至二十丸慎生冷油蒜等物眼暗神方也磁味丸倪微德原機啓微集治神水寬大漸散昏如霧露中行漸覩空中有黑花覩物成二體及內障神水淡緑色淡白色及治耳鳴及聾磁石二兩辰砂一兩神麴三兩生右三味更以一兩水和作餅煮浮入煎藥煉蜜丸每服十丸加至三十丸空心米湯下石斛夜光丸治神水寬大漸散昏如霧露空中有黑花覩物成二神水淡緑淡白色者天門冬二兩兔絲子七錢人參茯苓各二兩甘菊山藥枸杞石斛杏仁各七錢草决明八錢麥冬熟地生地各一兩肉蓯蓉青葙子羚羊角鎊蒺藜川芎甘草炙黃連防風枳殼烏犀鎊各五錢牛膝七錢半右二十四味為細末煉蜜丸如桐子大每服三十五丸溫酒鹽湯送下眼科藥不外此諸味羚羊角散局方治風熱毒上衝眼目暴發赤腫或生瘡疼痛隱澀羞明羚羊角鎊車前子甘草黃芩川升麻各二兩决明子二十四枚草龍膽去蘆山梔仁各五兩右為細末每服一錢食後溫熟水調下日進三服小兒亦可服五分蟬花散局方治肝經藴熱風毒上攻眼目翳膜遮睛赤腫疼痛昏暗視物不明隱澀難開多生眵淚內外障眼草决明炒甘菊花川芎不見火蟬退洗去土山梔子榖精草防風不見火黃芩去土蔓荆子木賊草羌活不見火荆芥蜜䝉花白蒺藜炒去刺甘草各等分右為末每服二錢用茶清調服或用荆芥湯入茶少許調服亦得食後及臨卧時服此去翳通治方洗眼藥養老書膽礬一兩煆令白去火毒用滑石一兩研秦皮半兩膩粉二錢右四味每用一字湯泡候溫閉目洗兩眥頭以冷為度膽礬入目極痛煆用頗宜按五竅之病惟目病最多所以另有專科此集略述內治數方以備揀取至於全體治法則當廣求眼科諸書而探討之風火時眼煎方即於丸散中擇對症之藥酌用可也鼻靈素靈憂恚無言篇人之鼻洞涕出不收者頏顙不開分氣失也素五臟别篇五氣入鼻藏於心肺心肺有病而鼻為之不利也辛頞鼻淵素氣厥論膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也傳為衄衊瞑目衊血汗也故得之氣厥也鼻方通草散千金翼治鼻中息肉通草半兩礬石一兩燒真珠一銖右三味下篩撚綿如棗核取藥如小豆著綿頭內鼻中日三次真珠能去一切息肉齀鼻方千金翼治鼻中息肉不得息礬石燒藜蘆各半兩瓜蒂二七枚附子半兩泡右四味各搗下篩合和以竹管取藥如小豆大內孔中吹之以綿絮塞鼻中日再以愈為度吹不如吸消鼻痔方苦丁香甘遂各二錢青黛草烏尖枯礬各二分半右為細末麻油搜令硬不可爛旋丸如鼻孔大小用藥內鼻內令至痔肉上每日一次凌霄花散百一選方治酒齄鼻凌霄花山梔等分右為末每服二錢食後茶湯調下蒼耳散治鼻流涕不止名曰鼻淵辛夷仁半兩蒼耳子炒二錢半香白芷一兩薄荷五分右為末每服二錢用葱茶湯食後調服治鼻淵方本事方山梔子不拘多少燒存性末之搐人鼻中立愈又方藿香為末用猪膽汁或牛膽汁丸每服一錢按鼻病惟鼻淵最重當博求效方不得徒恃外治法也又方絲瓜連根處藤炙為末酒服此治鼻中有蟲者鼻中瘜肉磽砂雄黃巴豆炭製信提硝珠氷片硼砂苦丁香以上俱可選用耳痔及諸瘜肉皆同口齒靈素口苦靈邪氣臟腑病形論膽病者善太息口苦嘔宿汁心下淡淡恐人將捕之嗌中吤吤然數唾齒痛靈雜病篇齒痛不惡清飲取足陽明惡清飲取手陽明重舌靈終始篇重舌刺舌柱以披針也瘖靈憂恚無言篇人卒然無音者寒氣客於厭則厭不能發發不能下至其開閣不致故無音肝脈􅕽暴有所驚駭脈不至若瘖不治自己驚駭而瘖者與有娠之瘖皆不必治口糜素氣厥論膀胱移熱於小腸鬲腸不便上為口糜齒寒素繆刺論邪客於足陽明之經令人鼽衄上齒寒病源齘齒者睡眠而齒相磨切也此由血氣虛風邪客於牙車筋脈之間故因睡眠氣息喘而邪動引其筋脈故上下齒相磨切有聲謂之齘齒滯頥脾冷不能收攝唌唾漬於頥也口齒方口甘方素問有病口甘者此五氣之溢也名曰脾痺夫五味入口藏於胃脾為之行其精氣津液在脾故令口甘也此肥美之所發也此人必數食甘美而多肥者也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也蘭草性味甘寒能利水道辟不祥除胸中痰癖其氣清香能生津止渴潤肌肉故可除陳積蓄熱之氣口苦方素問有病口苦者病名膽痺夫肝者中之將也取决於膽咽為之使此人者數謀慮不决故膽虛氣上溢而口為之苦治之以膽募俞數謀慮不决肝膽俱勞勞則必虛虛則氣不固故膽氣上溢而口苦膽募在肋本經之日月也膽俞在背足太陽之穴也經又云口苦取陽陵泉亦膽經之穴在委中之外亷療口瘡千金治口瘡久不差入胸中並生瘡三年已上不瘥者濃煎薔薇根汁含之又稍稍咽之日三夜一冬用根夏用莖葉冬青葉湯亦可潄推頰車法千金治失缺頰車蹉開張不合一人以手指牽其頥以漸推之則復入矣推當疾出指恐誤囓傷人指也外塗南星末口氣鼻穢方千金常以月旦日未出時從東壁取步七步回頭向垣立含水噀壁七遍口即美香此名禁法口中臭方千金細辛豆蔲含之甚良口香去臭方千金井花水三升潄口吐厠中良治緊唇方千金取蛇皮拭淨燒為灰敷之又方灸虎口男左女右塗唇方千金治唇黑腫痛癢不可忍燒亂髮及蜂房六畜毛作灰猪脂和敷之亦治瀋唇刺舌法千金治舌卒腫滿口溢如吹猪胞氣息不得通須臾不治殺人刺舌兩邊大脈血出勿使刺著舌下中央脈血出不止殺人如上治不愈或血出數升則燒鐵箆令赤尉瘡數過以絶血也療舌腫方千金治舌腫起如猪胞釡下墨末以酢厚傅舌上下脫去更傅須臾即消若先决出血汁竟傅之彌佳凡此患人皆不識或錯治益困殺人甚急但看其舌下自有噤蟲形狀或如螻蛄或如蠶子細看之有頭尾其頭少白燒鐵釘烙頭上使熱即自消療舌腫方千金治舌上黑有數方大如筋出血如湧泉此心藏病戎鹽黃芩黃柏大黃各五兩人參桂心甘草各二兩右七味蜜丸梧子大以飲服十丸日三亦燒鐵篦烙之療重舌千金并治舌上生瘡涎出以蒲黃末傅之不過三度差療舌脹方千金用雄雞冠血盞盛浸舌咽下即縮療舌腫脹本事方治心脾壅熱生木舌腫脹元參升麻大黃犀角甘草各等分右為細末每服三錢水一盞煎至五分溫服不拘時治失音養老書皂角一挺刮去黑皮并子蘿蔔一個切作片右以水二碗同煎至半碗服之不過三服便語喫却蘿蔔更妙此方乃去喉間之痰涎也療馬喉痺千金治喉痺深腫連頰吐氣數者名馬喉痺馬鞭草根一握一名杜牛膝勿中風截去兩頭搗取汁服之琥珀犀角膏治咽喉真琥珀研犀角屑生用各一錢人參棗仁茯苓辰砂研各二錢片腦研一錢右為末研勻蜜為膏以磁器收貯候其疾作每服一彈子大以麥冬濃煎湯化下一日連進五服此治隂火上炎之喉痛喉腫刺法千金翼治咽痛不得息若毒氣硬咽毒攻咽喉刺手小指爪文中出血即愈逐左右刺出血神祕立愈一法刺兩手少商穴出血其穴在大指內廉去爪甲如韭葉口旁惡瘡方千金翼亂髮灰故絮灰黃連末乾薑末等分右四味合和為散以粉瘡上不過三遍敷面靨方千金治䵟􅍍烏靨令面潔白馬珂二兩白附子鷹屎白珊瑚各一兩右四味研成粉和勻用人乳調每夜取傅面明旦溫漿水洗之又方千金李子仁為末和雞子白傅一宿即落一方用白附子末酒和傅之即落止牙痛方蟾酥七分硃砂雄黃各三分甘草一分右研極細以飛麵為丸如菜子大絲綿褁包塞在痛處治牙痛仙方以羊前蹄膝合盤骨以酥塗炙黃為末入細辛末一錢雄黃末五分共三味研極細末擦患處立愈治牙疼方千金翼蒼耳子五升右一味以水一斗煮取五升熱含之疼則吐吐復含不過三劑愈無子莖葉皆得用之如神散局方治風牙蚛牙攻疰疼痛牙齗動搖連頰浮腫露蜂房微炙川椒去目及閉口微炒出汗右為末每用一錢水一盞入鹽少許同煎八分乘熱潄之冷即吐一服立效二味炙灰為末擦亦效細辛散局方治風蚛牙疼牙齗宣爛牙齒搖動腮頷浮腫紅椒􅒦砂去殼鶴蝨牙皂蓽撥各半兩荆芥細辛各一兩白芷川烏各二兩右為細末每用少許於痛處擦之有涎吐出不得咽少時用溫水潄口頻頻擦之立有神效治風寒牙疼之症按牙疼有數種寒熱風火蟲虛治各不同非對症則不愈故有效有不效至於喉痺一症病變各殊此屬外科病變無窮兹偶録一二方未及萬一若欲專治此症非廣求博識不可雜病靈素靈口問篇黃帝曰人之缺者何氣使然岐伯對曰衛氣晝日行於陽夜半則行於隂隂者主夜夜者卧陽者主上隂者主下故隂氣積於下陽氣未盡陽引而上隂引而下隂陽相引故數缺陽氣盡隂氣盛則目瞑隂氣盡而陽氣盛則寤矣黃帝曰人之噦者乾嘔為噦或云即噯氣何氣使然岐伯曰榖入於胃胃氣上注於肺今有故寒氣與新榖氣俱還入於胃新故相亂真邪相攻氣并相逆復出於胃故為噦黃帝曰人之唏者何氣使然岐伯曰此隂氣盛而陽氣虛隂氣疾而陽氣徐隂氣盛而陽氣絶故為唏黃帝曰人之振寒者何氣使然岐伯曰寒氣客於皮膚隂氣盛陽氣虛故為振寒寒栗黃帝曰人之噫者噫厄逆也何氣使然岐伯曰寒氣客於胃厥逆從上下散復出於胃故為噫黃帝曰人之嚏者何氣使然岐伯曰陽氣和利滿於心出於鼻故為嚏黃帝曰人之嚲者何氣使然岐伯曰胃不實則諸脈虛諸脈虛則筋脈懈惰筋脈懈惰則行隂用力氣不能復故為嚲黃帝曰人之哀而泣涕出者何氣使然岐伯曰心者五臟六腑之主也目者宗脈之所聚也上液之道也口鼻者氣之門户也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈感宗脈感則液道開液道開故泣涕出焉液者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣黃帝曰人之太息者何氣使然岐伯曰憂思則心係急心係急則氣道約約則不利故太息以伸出之黃帝曰人之涎下者何氣使然岐伯曰飲食者皆入於胃胃中有熱則蟲動蟲動則胃緩胃緩則亷泉開故涎下黃帝曰人之耳中鳴者何氣使然岐伯曰耳者宗脈之所聚也故胃中空則宗脈虛虛則下溜脈有所竭者故耳鳴黃帝曰人之自齧舌者何氣使然此厥逆走上脈氣輩至也少隂氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇矣凡此十二邪者皆竒邪之走空竅者也故邪之所在皆為不足經氣為邪所據則正氣不能復歸故為不足當引本經之正氣以逐邪出外所謂正氣者即本經之氣故能禦邪此指針法言之庸醫不知竟用補藥於邪氣所留之經則是補住其邪矣害忍言哉故上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之眩中氣不足溲便為之變腸為之苦鳴下氣不足則乃為痿厥心悗五味篇酸走筋多食之令人癃醎走血多食之令人渴辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人悶心師傳篇岐伯曰入國問俗入家問諱上堂問禮臨病人問所便此句為萬世辨症之祕訣黃帝曰便病人奈何岐伯曰夫中熱消痺則便寒寒中之屬則便熱胃中熱則消榖令人懸心善饑臍以上皮熱腸中熱則出黃如糜臍以下皮寒按寒字當作熱字胃中寒則腹脹腸中寒則腸鳴飱泄凡脹滿宜溫藥飱泄亦同胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾饑小腹痛脹黃帝曰胃欲寒飲腸欲熱飲百病始生篇陽絡傷則血外溢血外溢則衄血隂絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相摶則并合凝聚不得散而積成矣邪客篇黃帝問於岐伯曰人有八虛各何以候岐伯答曰以候五臟黃帝曰候之奈何岐伯曰肺心有邪其氣留於兩肘肝有邪其氣留於兩腋脾有邪其氣留於兩髀腎有邪其氣留於兩膕凡此八虛者皆機關之室真氣之所過血絡之所遊邪氣惡血固不得住留住留則傷筋絡骨節機關不得屈伸故痀攣也大惑篇黃帝曰人之善饑而不嗜食者何氣使然岐伯曰精氣并於脾熱氣留於胃胃熱則消榖榖消故善饑胃氣逆上則胃脘寒故不嗜食宣明五氣論五味所入酸入肝辛入肺苦入心醎入腎甘入脾是謂五入五氣所病心為噫肺為咳肝為語脾為吞腎為缺為嚏胃為氣逆為噦為恐大腸小腸為泄下焦溢為水膀胱不利為癃不納為遺溺膽為怒是為五病五精所并精氣并於心則喜并於肺則悲并於肝則憂并於脾則畏并於腎則恐是為五并虛而相并者也五臟所惡心惡熱肺惡寒肝惡風脾惡濕腎惡燥是為五惡五臟化液心為汗肺為涕肝為淚脾為涎腎為唾是為五液五味所禁辛走氣氣病無多食辛醎走血血病無多食醎苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是為五禁無令多食五病所發隂病發於骨陽病發於血隂病發於肉陽病發於冬隂病發於夏是為五發五邪所亂邪入於陽則狂邪入於隂則痺摶陽則為癲疾摶隂則為瘖陽入之隂則靜隂出之陽則怒是為五亂五邪所見春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈名曰隂出之陽病善怒不治是謂五邪皆同命死不治五臟所藏心藏神肺藏魄肝藏魂脾藏意腎藏志是為五臟所藏五臟所主心主脈肺主皮肝主筋脾主肉腎主骨是謂五主五勞所傷久視傷血久卧傷氣久坐傷肉久立傷骨久行傷筋是謂五勞所傷五脈應象肝脈弦心脈鈎脾脈代肺脈毛腎脈石是謂五臟之脈至真要大論大要曰君一臣二竒之制也君二臣四偶之制也君二臣三竒之制也君三臣六偶之制也故曰近者竒之逺者偶之汗者不以竒下者不以偶補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也是故平氣之道近而竒偶制小其服也逺而竒偶至大其服也大則數少小則數多多則九之少則二之竒之不去則偶之是謂重方偶之不去則反佐以取之所謂寒熱溫凉反從其病也岐伯曰辛甘發散為陽酸苦涌泄為隂醎味涌泄為隂淡味滲泄為陽六者或收或散或緩或急或燥或潤或耎或堅以所利而行之調其氣使其平也岐伯曰有毒無毒所治無主適大小為制也帝曰請言其制岐伯曰君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也寒者熱之熱者寒之微者逆之甚者從之堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者暖之散者收之損者益之逸者行之驚者平之上之下之摩之浴之薄之劫之開之發之適事為故帝曰反治何謂岐伯曰熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已岐伯曰主病之謂君佐君之謂臣應臣之謂使非上下三品之謂也岐伯曰諸寒之而熱者取之隂熱之而寒者取之陽所謂求其屬也帝曰善服寒而反熱服熱而反寒其故何也岐伯曰治其王氣是以反也五味入胃各歸所喜攻酸先入肝苦先入心甘先入脾辛先入肺醎先入腎久而增氣物化之常也氣增而久夭之由也隂陽應象大論因其輕而揚之因其重而減之因其衰而彰之形不足者溫之以氣精不足者補之以味其髙者因而越之其下者引而竭之中滿者寫之於內其有邪者漬形以為汗五常政大論岐伯曰大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九榖肉果菜食養盡之無使過之傷其正也不盡行復如法必先歲氣無伐天和至真要大論帝曰願聞病機何如岐伯曰諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣膹鬱皆屬於肺諸濕腫滿皆屬於脾諸熱􅀢瘛皆屬於火諸痛癢瘡皆屬於心諸厥固泄皆屬於下諸痿喘嘔皆屬於上諸禁鼓栗如喪神守皆屬於火諸痓項強皆屬於濕諸逆衝上皆屬於火諸脹腹大皆屬於熱諸燥狂越皆屬於火諸暴強直皆屬於風諸病有聲鼓之如鼓皆屬於熱諸病胕腫疼酸驚駭皆屬於火諸轉反戾水液渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒諸嘔吐酸暴注下迫皆屬於熱生氣通天論陽因而上衛外者也因於寒欲如轉樞起居如驚神氣乃浮因於暑汗煩則喘喝靜則多言體若燔炭汗出而散因於濕首如褁濕熱不攘大筋緛短小筋㢮長緛短為拘㢮長為痿因於氣為腫四維相代陽氣乃竭陽氣者煩勞則張精絶辟積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汨汨乎不可止陽氣者大怒則形氣絶而血莞於上使人薄厥有傷於筋縱其若不容汗出偏沮使人偏枯汗出見濕乃生痤痱髙粱之變足生大丁受如持虛勞汗當風寒薄為皶鬱乃痤陽氣者精則養神柔則養筋開闔不得寒氣從之乃生大僂陷脈為痿留連肉腠俞氣化薄傳為善畏及為驚駭營氣不從逆於肉理乃生癰腫魄汗未盡形弱而氣爍穴俞以閉發為風瘧故風者百病之始也清靜則肉腠閉拒雖有大風苛毒弗之能害此因時之序也春傷於風邪氣留連乃為洞泄夏傷於暑秋為痎瘧秋傷於濕上逆而咳發為痿厥冬傷於寒春必溫病四時之氣更傷五臟通平虛實論黃帝問曰何為虛實岐伯對曰邪氣盛則實精氣奪則虛刺志論氣盛身寒得之傷寒氣虛身熱得之傷暑榖入多而氣少者得之有所脫血濕居下也榖入少而氣多者邪在胃及與肺也玉肌真臟論黃帝曰余聞虛實以决死生願聞其情岐伯曰五實死五虛死帝曰願聞五實五虛岐伯曰脈盛皮熱腹脹前後不通悶瞀此謂五實脈細皮寒氣少泄痢前後飲食不入此謂五虛帝曰其時有生者何也岐伯曰漿粥入胃泄注止則虛者活身汗得後痢則實者活此其候也臟氣法時論肝苦急急食甘以緩之肝欲散急食辛以散之用辛補之酸寫之心苦緩急食酸以收之心欲耎急食鹹以耎之用醎補之甘寫之脾苦濕急食苦以燥之脾欲緩急食甘以緩之用苦寫之甘補之肺苦氣上逆急食苦以泄之肺欲收急食酸以收之用酸補之辛寫之腎苦燥急食辛以潤之開腠理致津液通氣也腎欲堅急食苦以堅之用苦補之醎寫之夫邪之客於身也以勝相加至其所生而愈至其所不勝而甚至於所生而持自得其位而起必先定五臟之脈乃言間甚之時死生之期也毒藥攻邪五榖為養五果為助五畜為益五菜為充氣味合而服之以補精益氣以上皆辨病治病之總訣能精通其理方能識症擇方解㑊素玉肌真臟論冬脈太過則令人解㑊脊脈痛而少氣不欲言刺瘧論足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惴惴然熱多汗出甚食㑊素氣厥論大腸移熱於胃善食而瘦又謂之食㑊胃移熱於膽亦曰食㑊膈洞靈根結篇太陽為開開折則食廩無所輸膈洞故開折者氣不足而生病邪氣臟腑病形篇腎脈微緩為洞洞者食不化下嗌還出重強素玉機真藏論脾脈不及則令人九竅不通名曰重強齲齒靈論疾診尺篇診齲齒痛按其陽之來有過者熱在左左熱在右右熱在上上熱在下下熱繆刺論齒齲刺手陽明不已刺其脈入齒中者立已手陽明之脈貫頰入於齒中故當刺商陽穴不已則刺其痛脈之入齒中者按甲乙經注手陽明脈商陽二間三間合谷陽溪偏歷溫溜七穴主齒痛金匱跌蹶其人但能前不能却刺腨入二寸此太陽經傷也所載雜病其方俱散見於各證條內兹不復贅按病施治無遺法矣蘭臺軌範卷七
