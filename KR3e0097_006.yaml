body:
  text: 蘭臺軌範卷六吳江徐大椿撰積聚癥痞靈素靈百病始生篇黃帝問於岐伯曰夫百病之始生也皆生於風雨寒暑清濕喜怒喜怒不節則傷臟風雨則傷上清濕則傷下三部之氣所傷異類願聞其㑹岐伯曰三部之氣各不同或起於隂或起於陽請言其方喜怒不節則傷臟臟傷則病起於隂也清濕襲虛則病起於下風雨襲虛則病起於上是謂三部至於其淫泆不可勝數黃帝曰積之始生至其已成奈何岐伯曰積之始生得寒乃生四字乃成積之總訣厥乃成積也黃帝曰其成積奈何岐伯曰厥氣生足悗悗生脛寒脛寒則血氣凝澀血氣凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多飲食則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血隂絡傷則血內溢血乃溢則後血衄為陽經之血宜凉後血為隂經之血宜溫腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相摶則并合凝聚不得散而積成矣凡積未有不因血而成者卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血藴裏而不散津液澀滲著而不去而積皆成矣六元正紀大論大積大聚不可犯也衰其大半而止過則死骨空論任脈為病男子內結七疝女子帶下瘕聚息積素竒病論帝曰病脅下滿氣逆二三歲不已是為何病岐伯曰病名曰息積此不妨於食不可灸刺積為導引服藥藥不能獨治也積最宜外治伏梁靈邪氣臟腑病形篇心脈微緩為伏梁在心下上下行時唾血素腹中論帝曰人有身體髀骰䯒皆腫環臍而痛是為何病岐伯曰病名伏梁此風根也其氣溢於大腸而著於肓肓之原在臍下故環臍而痛也不可動之動之為水溺澀之病難經病有積有聚何以别之然積者隂氣也聚者陽氣也故隂沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所成也積者隂氣也其始發有常處其痛不離其部上下有所終始左右有所窮處聚者陽氣也其始發無根本上下無所留止其痛無常處故以是别知積聚也五臟之積各有名乎以何月何日得之然肝之積名曰肥氣在左脅下如覆杯有頭足心之積名曰伏梁起臍上大如臂上至心下脾之積名曰痞氣在胃脘腹大如盤肺之積名曰息賁在右脅下覆大如杯腎之積名曰賁豚發於少腹上至心下若豚狀或上或下無時金匱師曰病有奔豚有吐膿有驚怖有火邪此四部病皆從驚發得之師曰奔豚病從少腹起上衝咽喉發作欲死復還止皆從驚恐得之夫瘦人繞臍痛必有風冷榖氣不行而反下之其氣必衝不衝心下則痞問曰病有積有聚有䅽氣何謂也師曰積者臟病也終不移聚者腑病也發作有時展轉痛移為可治䅽氣者脅下痛按之則愈復發為䅽氣積聚皆有形䅽氣則無形而有氣耳病者腹滿按之不痛為虛痛者為實可下之舌黃未下者下之黃自去腹滿時減復如故此為寒當與溫藥脈緊如轉索無常者有宿食也薤不可共牛肉作羮食之成瘕病韭亦然醋合酪食之令人血瘕病源癥瘕皆由寒溫不調飲食不化與臟氣相摶結所生也其病不動者直名為癥若病雖有結瘕而可推移者名為癥瘕瘕者假也謂虛假可動也鱉癥謂腹內有癥結如鱉之形狀有食鱉觸冷不消生癥者有食諸雜物得冷不消變化而作者蝨癥人有多蝨而性好嚙之所嚙既多腑臟虛弱不能消之變化生癥患者見蝨必嚙之不能禁止時從下部出亦能斃人米癥人有好啞米轉久彌嗜啞之若不得米則胸中清水出米不消化遂生癥結其人常思米不能飲食久則斃腹內有人聲有人腹內忽有人聲或學人語而相答此乃不幸致生灾變非關經絡臟腑冷熱虛實所為也服雷丸可愈髮癥有人因飲食內誤有頭髮隨食成癥胸喉間如有蟲上下來去者是也蛟龍病三月八日蛟龍子生在芹菜上人食芹菜入腹變成蛟龍其病之狀發則如癲魚癥有人胃氣虛弱者食生魚因為冷氣所摶不能消之結成魚癥揣之有形狀如魚也蛇癥人有食蛇不消因腹內生蛇瘕也亦有蛇之精液誤入飲食內食之其狀常若饑而食則不下喉食至胸內即吐出其病在腹摸揣亦有蛇狀謂蛇瘕也酒瘕人有飲酒多而食榖少積久漸瘦遂常思酒不得則吐多睡不復能食是胃中有蟲使之然名為酒瘕也腹內有毛人因飲食內誤有毛隨食入腹則漸漸羸瘦但此病不說别有證狀常自言因食毛以知之積聚癥痞方奔豚湯金匱奔豚氣上衝胸腹痛往來寒熱此主之甘草川芎當歸各二兩半夏四兩黃芩二兩生葛五兩芍藥二兩生薑四兩甘李根白皮一升右九味以水二斗煮取五升溫服一升日三夜一服茯苓桂枝甘草大棗湯金匱發汗後臍下悸者欲作賁豚此湯主之桂枝四兩茯苓半斤甘草二兩炙大棗十五枚右四味以甘爛水一斗先煮茯苓减二升內諸藥煮取三升去渣溫服一升日三服桂枝加桂湯金匱發汗後燒針令其汗針處被寒核起而赤者必發賁豚小腹上至心灸其核上各一壯與此湯此灸法不循穴道亦甚易即桂枝湯加桂二兩備急丸金匱治寒氣冷食稽留胃中心腹滿痛大便不通大黃乾薑各二兩巴豆一兩去皮研如脂右先搗大黃乾薑為末內巴豆合搗千杵和蜜丸如豆大藏蜜器中勿泄氣候用每服三四丸暖水或酒下又主中惡心腹脹滿卒痛如錐刺氣急口噤如卒死者捧頭起灌令下咽須臾當差不差更與三丸當腹中鳴即吐利便差若口噤者須化從鼻孔用葦管吹入自下於咽此溫下之法是口噤不能服藥者亦一法貪食食多不消心腹堅滿痛治之方千金鹽一升水三升右二味煮令鹽消分三服當吐出食便差蛟龍病方金匱治春秋二時龍精帶入芹菜中人偶食之為病發時手背腹滿痛不可忍硬糖二三升日兩度服之吐出如蜥蜴三五枚差療犬肉傷金匱治食犬肉不消心下堅或腹脹口乾大渴心急發熱妄語如狂或洞下杏仁一升合皮熟研用沸湯三升和汁分三服痢下肉片大驗療食鱠傷金匱治鱠食之在心胸間不化吐復不出速下除之久成癥病橘皮一兩大黃二兩朴硝二兩右三味以水一大升煮至小升頓服即消療鱠癥金匱治食鱠多不消結為癥病馬鞭草搗汁飲之或以薑葉汁飲之一升亦消又可服藥吐之療蝨癥千金由嚙蝨在腹生長為蝨癥按此病發服水銀故篾子一枚故梳子一枚右二味各破為兩分先取一分燒灰末之又取一分以水五升煮取一升頓服前末盡少時當病出無所忌療十年痃癖方千金翼桃仁去皮尖雙仁煮熬豉乾泡去皮熬搗篩各六升蜀椒去目閉口者生搗篩三升乾薑搗篩三升右四味先搗桃仁如膏合搗千杵如乾可入少蜜和搗令可丸如酸棗大空腹酒服三丸日三仍尉法椒尉方千金翼取新盆一口受一斗者鑽底上作三十餘孔孔上布椒三合椒上布鹽鹽上安紙兩重上布冷灰一升冷灰上安熱灰一升熱灰上安熱炭火如雞子大常令盆熱底安薄氊其口以板蓋上以手捉勿令落仰卧安於腹上逐病上及痛處自捉遣移尉之冷氣及癥結皆從下部中作氣出七日一易椒鹽滿三七日百病差乃止破癖湯千金翼白术枳實炙柴胡各三兩右以水五升煮取二升分三服日三備急尉癥方千金翼吳茱茰三升以酒和煮熱布褁尉之廣濟療鱉瘕外臺白馬尿一升五合溫服之令盡差廣濟療米癥外臺其疾常欲食米若不得米則胸中出清水雞屎一升白米五合搗散用水一升頓服療米癥羸瘦至死外臺葱白兩虎口切烏梅三十枚碎右二味以水三升宿漬烏梅使得極濃清晨噉葱白隨飲烏梅汁盡頃之心腹煩欲吐即令出之三晨療之當吐出米癥差無所忌廣濟療髮癥外臺人因食誤食髮即胸間如有蟲上下惟欲飲油油一升以香澤煎之大􅀈鐒貯之安病人頭邊以口鼻臨油上勿令得飲及傳之鼻面令有香氣當呌喚取飲不得與之必疲極眠睡其髮當從口出飲油人專守視之并石灰一褁見癥出以灰粉手捉癥抽出須㬰抽盡即是髮也竒法積塊丸治癥瘕積聚癖塊蠱積京三稜莪术各用醋煨自然銅蛇含石各燒研各二兩雄黃蜈蚣各一錢二分焙研木香一錢半鐵花粉用粳米醋炒一錢辰砂沉香各八分氷片五分蘆薈天竺黃阿魏全蝎焙乾各四錢右為末用雄猪膽汁丸如桐子大每服七八分諸蟲皆效治食索粉積方用紫蘇煎濃汁加杏仁泥服之即散易簡紅丸破癥消瘕蓬术三稜橘皮青皮胡椒乾薑阿魏礬紅右水泛為丸每服六十丸薑湯下又小兒脾胃之症極有神效大七氣湯治一切癥瘕三稜莪术各煨切青皮陳皮去白木香藿香肉桂益智仁甘草各七錢五分右㕮咀每服五錢水二盞煎至一盞食前服半硫圓丸局方除積冷溫脾胃一切痃癖大便冷閉硫黃明淨好者研令極細用柳木鎚子研過半夏湯洗七次焙乾為末右等分以生薑自然汁同熬入乾蒸餅末攪和勻入臼內杵數百下圓如桐子大每服空心溫酒或生薑湯下十五丸至二十丸婦人醋湯下髮癥飲油方夏子竒疾方雄黃半兩右為末水調服之蟲自出食髮成瘕方猪脂二升酒三升右以水煮三沸溫服日三酒鱉氣鱉血鱉方直指方治平時嗜酒血入於酒為酒鱉任氣血凝於氣為氣鱉虛勞痼冷敗血雜痰為血鱉或附脅背或隱腸腹須急治之生硫黃末以老酒調下時時服之此味人多畏之不敢輕服其實性甚和緩目覩有人服數斤全無所害惟肌膚色黃而已蛇癥方千金翼白馬尾切細酒服初服五分一七次服三分一七更服二分一七不可頓服殺人蛟龍病方唐明皇雜録云有黃門奉使交廣回太醫周顧曰此人腹中有蛟龍上驚問對曰臣馳馬大庾嶺熱困且渴遂飲澗水竟腹中堅痞如石周遂以石硝雄黃煮服之立吐一物長數寸大如指視之鱗甲皆具此疾遂愈蛇瘕危氏方治面光發熱如火炙蒜汁一碗飲之吐出如蛇即愈腹內蛇癥方易簡誤食菜中蛇精成蛇瘕或食蛇肉成瘕腹中常饑食物即吐以赤足蜈蚣一條炙研末酒服血瘕方甄氏鱉甲大黃琥珀等分右三味作散酒服二錢少時惡血即下若婦人小腸中血下盡即休服也虱瘕喜食血用極舊木梳煆灰服婦人狐瘕方外臺因月水來或悲或驚或逢疾風暴雨被濕致成狐瘕精神恍惚令人月水不通胸脅腰背痛引隂中小便難嗜食欲吐如有孕狀其瘕手足成形者殺人未成者可治用新鼠一枚以新絮褁之黃泥固住入地坑中桑薪燒其上一日夜取出去絮入桂心末六銖為末酒服方寸七不過一二服當自下瓜蒂散金匱大承氣湯小承氣湯調胃承氣湯以上四方俱見傷寒保和丸丹溪枳术丸潔古皂礬平胃散感應丸上四方見通治阿魏撞氣丸方見膈吐蛇含石丸即禹餘糧丸見臌脹蟲附狐惑靈樞上膈篇蟲為下膈其詳備載膈症門蟲瘕蛟蛔厥病篇腸中有蟲瘕及蛟蛔皆不可取以小針心腸痛憹作痛腫聚往來上下行痛有休止腹熱喜渴涎出者是蛟蛔也以手聚按而堅持之無令得移以大針刺之久持之蟲不動乃出針也金匱蛔蟲之為病令人吐涎心痛發作有時毒藥不止蛔厥者當吐蛔令病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔狐感之為病狀如傷寒默默欲眠目不得閉卧起不安蝕於喉為惑蝕於隂為狐不欲飲食惡聞食臭其面目乍赤乍黑乍白此皆傷寒餘毒所結濕熱生蟲也病源九蟲者一曰伏蟲長四分二曰蛔蟲長一尺三曰白蟲長一寸四曰肉蟲狀如爛杏五曰肺蟲狀如蠶六曰胃蟲狀如蝦蟆七曰弱蟲狀如瓜瓣八曰赤蟲狀如生肉九曰蟯蟲至細微形如菜蟲伏蟲羣蟲之主也蛔蟲貫心則殺人白蟲相生子孫轉大長至四五尺亦能殺人肉蟲令人煩滿肺蟲令人咳嗽胃蟲令人嘔逆吐喜噦弱蟲又名膈蟲令人多唾赤蟲令人腸鳴蟯蟲居胴腸多則為痔極則為癩因人瘡處以生諸癰疽癬痿病疥齲蟲無所不為人亦不必盡有有亦不必盡多或偏無者此諸蟲依腸胃之間若腑臟氣實則不為害若虛則能侵蝕隨其蟲之動而能變成諸患也凡蠱毒有數種皆是變感之氣人有故造作之多取蟲蛇之類以器皿盛貯任其自相噉擊惟有一物獨在者即為之蠱便能變感隨逐酒食為人患禍患禍於他則蠱主吉利所以不羈之徒畜事之齒慝是蟲食齒至斷膿爛汁臭如屯之收故謂之慝齒蟲方甘草粉蜜湯金匱蛔蟲之為病令人吐涎心痛發作有時毒藥不止此湯主之甘草二兩粉一兩蜜四兩右以水三升煮甘草取二升去滓內粉蜜攪令和煎如薄粥溫服一升差即止烏梅丸治病者靜而時煩因臟寒蛔上入其膈為蛔厥當吐蛔烏梅三百個黃連一斤黃檗六兩乾薑十兩附子六枚泡蜀椒四兩熬去汗桂枝六兩細辛六兩人參六兩當歸四兩右十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等療蛔蟲攻心腹痛千金用石榴根搗取汁平旦服亦可水煎療蟲蝕下部千金胡粉雄黃右二味各等分為末著榖道中亦治小兒療傷寒慝病千金取生雞子小頭叩出白入漆一合熟和攪令極調當沫出更內著殼中仰吞之食頃或半日乃吐下蟲劇者再服蟲盡熱除病愈追蟲丸八陳治一切蟲積黑牽牛取頭末檳榔各八兩雷丸醋炙南木香各二兩為末茵蔯二兩大皂角苦楝皮各一兩右煎濃汁水為丸菉豆大大人每服四錢小兒三錢或二錢或一錢半量人虛實用砂糖水吞下待追去惡毒蟲積二三次方以粥補之按濃煎汁水為丸原本如此必有誤字竟將水泛丸可也下蟲丸追蟲取積苦楝皮根皮為上樹面次之去面上粗皮右為末麵糊丸彈子大如欲服藥宜戒午飯晡時預食油煎雞卵餅一二個待上床時白滚湯化下一丸至五更取下異蟲為效療寸白蟲棐子檳榔蕪荑各等分為末每二錢溫酒調服先吃燒牛肉脯後服食水㵼永除又方棐子四十九粒去皮以月上旬平旦空心服七枚日服盡蟲消成水永瘥又云食實七枚七日滿蟲化為水療濕慝蟲千金翼此症多是熱病後或久下不止或有客熱結在腹中或遇暑濕凉氣者多生此病病亦有燥慝不甚泄痢而下部瘡癢不問燥濕久則殺人為病診齒無色舌上盡白甚者滿口有瘡四肢沉重喜眠如此者為蟲下食其肛肛爛盡見五臟即死矣黃連生薑切各十兩艾葉八兩苦參四兩右四味㕮咀以水一斗煮取三升為三服日三療蛔蟲病由勞熱傷心有蟲名蛔蟲長一尺貫心則死雷丸熬橘皮桃仁各五分狼牙六分貫衆三枚蕪荑青葙子乾漆熬各四分亂髮如雞子燒殭蠶二十枚熬右十味搗篩蜜丸以飲及酒空腹服二七丸日再服療百蟲方外臺石榴皮東引者一握去瘡皮檳榔七枚右以水二升煎減半頓服欲服時先嚼鹿脯咽汁即進之每月一二三日吃藥必瘥以蟲頭向上月三五以後不效以蟲頭向下也服藥前一日莫食其蟲吃藥之後或痢出或內消皆瘥忌食生膾白酒諸冷物一月餘鶴虱散外臺療蛔蟲心痛鶴虱二分末溫酢一盞和服之蟲當出胡粉丸外臺療心痛不可忍似蛔蟲者生胡麻一合胡粉半合熬搗右二味先以猪肉脯一斤空腹啖咽汁勿咽肉後取胡粉和胡麻搜作丸以少清酒使成頓服盡十歲以上增減忌生冷猪血魚雞蒜醋等七日若是蛔蟲吐水者是也甘草㵼心湯金匱治狐惑之為病狀如傷寒默默欲眠目不閉卧起不安蝕於喉為惑蝕於隂為狐不欲飲食惡聞食臭其面目乍赤乍黑乍白蝕於上部則聲喝此湯主之蝕於下部則咽乾苦參湯洗之蝕於肛者雄黃薰之甘草四兩黃芩人參乾薑各三兩黃連一兩大棗十二枚半夏半升右七味水一斗煮取六升去滓再煎溫服一升日三服苦參湯金匱苦參一升水一斗煎取七升去渣薰洗日三雄黃金匱雄黃一味為末筒瓦二枚合之燒向肛薰之赤小豆當歸散金匱病者脈數無熱微煩默默但欲卧汗出初得之三四日目赤如鳩眼七八日目四􅗃黑若能食者膿已成也此湯主之赤小豆三升浸令芽出曝乾當歸右二味杵為散漿水服方寸七日三服療心痛欲死外臺濃搗地黃汁和麵作冷淘不用鹽服一頓蟲即出蕪荑散治蟲咬心痛欲驗之大痛不可忍或吐青黃緑水涎沫或吐蟲發有休止蕪荑雷丸各半兩乾漆碎研炒烟盡一兩右共為末每服三錢調和服諸痛頭心胃腰腹靈素靈終始篇病痛者隂也痛而以手按之不得者隂也素舉痛論視其五色黃赤為熱白為寒青黑為痛調經論實者外堅充滿不可按之按之則痛虛者聶辟氣不足按之則氣足以溫之故快然而不痛隂陽應象大論氣傷痛形氣腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也痺論痛者寒氣多也有寒故痛也頭痛靈素靈經脈篇足太陽膀胱脈動則病衝頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥督脈之别名曰長強挾膂上項散頭上下當肩脾左右别走太陽入貫膂實則脊強虛則頭重足少陽膽脈是主骨所生病者頭痛頷痛厥病篇真頭痛頭痛甚腦盡痛手足寒至節死不治素竒病論帝曰人有病頭痛以數歲不已此安得之名為何病岐伯曰當有所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛病名曰厥逆病源鬲痰風厥頭痛風痰相結上衝於頭即令頭痛數歲不已即連腦痛手足寒至節即死真頭痛亦必有痰千金卒頭痛頭痛如破非中冷又非中風是胸膈中痰厥氣上衝名為厥頭痛吐之即差頭痛方頭痛方千金翼葶藶子搗末以湯淋取汁洗頭良又方千金翼吳茱茰三升以水五升煮取三升以綿拭髮根良厥頭痛吐方外臺治痰厥頭痛但單煮茗作飲二三升許須㬰適吐吐畢又飲能如是數過劇者須吐膽汁乃止不損人石膏散寶鑑川芎石膏白芷各等分右為末每服四錢煮茶清調下此治風火頭痛之方透頂散本事方治偏正頭風夾腦風并一切頭風不問逺年近日細辛三莖瓜蒂七分丁香三粒糯米七粒腦子麝香各一黑豆大右將腦麝研細將前四味另研細然後合研令勻封好患人在左右搐一大豆許良久出涎一升許則安痛風餅子聖惠五倍子全蝎土狗各八分右為末醋丸作如錢大餅子發時再用醋潤透頂太陽穴上炙熱貼之仍用帕子縛之啜濃茶睡覺自愈止痛太陽丹竒效天南星川芎等分右為末同蓮鬚葱白搗爛作餅貼太陽痛處氣攻頭痛方竒效萆麻子乳香等分右搗爛作餅貼太陽穴上如痛止急去頂上解開頭髮出氣即去藥治頭痛方竒效用大蒜一顆去皮研取汁令病人仰卧以銅筯㸃少許滴鼻中急令搐入腦眼中淚出差玉液湯濟生治眉稜骨痛半夏六錢泡湯七次切片作一服加生薑十片水煎去渣納沉香末少許服麢犀湯濟生治暗風頭旋眼黑昏眩倦怠痰涎壅盛骨節疼痛羚羊角屑旋覆花紫苑石膏甘草炙各一兩細辛半兩前胡七錢半犀角屑二錢半右藥每服三錢加生薑三片大棗一枚水煎服祕方貼頭風熱病大黃朴硝等分右為末用井底泥揑作餅貼兩太陽穴頭風皆屬寒此獨為熱不可不備清震湯保命治頭面疙􅜀增寒拘急發熱狀如傷寒即雷頭風升麻蒼术各四錢荷葉全者一個水煎食後服楊梅毒入頭亦有此病當用治毒之方治之治頭內如蟲蛀響此名天白蟻用茶子末吹鼻中此竒病不可不知玉真圓本事方治腎氣不足氣逆上行頭痛不可忍謂之腎厥其脈舉之則弦按之則石堅硫黃二兩石膏煆通赤研半夏柴湯洗各一兩硝石一錢五分右為細末研勻生薑汁糊丸如梧子大隂乾每服二十丸或薑湯或米飲下更灸關元穴百壯茶調散局方治諸風上攻頭目昏重偏正頭疼鼻塞身重及婦人血風攻疰太陽穴疼白芷甘草羌活各二兩荆芥去梗川芎各四兩細辛去蘆一兩防風一兩半薄荷葉不見火八兩右為細末每服二錢食後茶清調下常服清頭目頭風摩散方見風門頭風有偏正之殊其病皆在少陽陽明之絡以毫針刺痛處數穴立效其外有瘡毒入頭名楊梅頭痛此乃外科之症另有治法心胃痛靈樞厥病篇厥心痛與背相控善瘈如從後觸其心傴倭者腎心痛也厥心痛痛如以錐針刺其心心痛甚者脾心痛也厥心痛色蒼蒼如死狀終日不得太息肝心痛也厥心痛卧若徒居心痛間動作痛益甚色不變肺心痛也真心痛手足凊至節心痛甚旦發夕死夕發旦死千金胸痺令人心中堅痞急痛肌中若痺絞痛如刺不能俯仰胸前皮皆痛手不得犯短氣咳唾引痛咽塞癢燥時欲嘔吐煩悶自汗出或引背痛不治數日死外臺九種心痛一蟲二注三氣四悸五食六飲七冷八熱九去來痛惡注心痛中惡心痛心腹絞刺奄奄欲絶近人患心胃痛者甚多十人之中必有二三皆係痰飲留於心下久成飲囊發作輕重疏數雖各不同而病因一轍治法以滌飲降氣為主凡病竟有時代之不同如近三十年中咳嗽吐血者十人而五余少時此病絶少亦不可解也心胃痛方栝婁薤白白酒湯金匱胸痺之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數此湯主之栝婁一枚搗薤白半斤白酒七升右三味同煮取三升分溫再服栝婁薤半夏湯金匱胸痺不得卧心痛徹背者此湯主之即前方加半夏半升枳實薤桂枝湯金匱胸痺心中痞氣氣結在胸胸滿脅下逆搶心此湯主之人參湯亦主之枳實四枚厚朴四兩薤白半斤桂枝一兩栝婁一枚搗右五味以水五升先煮枳實厚朴取二升去渣內諸藥煮數沸分溫三服人參湯金匱即理中湯茯苓杏仁甘草湯金匱胸痺胸中氣塞短氣此湯主之橘枳薑湯亦主之茯苓三兩杏仁五十枚甘草一兩右三味以水一斗煮取五升溫服一升日三不差更服橘皮枳實生薑湯金匱橘皮一升枳實三兩生薑半斤右三味以水五升煮取二升分溫再服薏苡仁附子散金匱胸痺緩急者此主之薏苡仁十五兩大附子十枚泡右二味杵為散服方寸七日三服桂枝生薑枳實湯金匱心中痞諸逆心懸痛此湯主之桂枝生薑各三兩枳實五枚右三味以水六升煮取三升分溫三服赤石脂丸金匱心痛徹背背痛徹心此主之蜀椒一兩烏頭一分泡附子半兩乾薑一兩赤脂一兩右五味末之蜜丸如梧子大先食服一丸日三服不知再加此治大寒之症九痛丸金匱治九種心疼附子三兩泡狼牙一兩炙香巴豆一兩去皮心熬研如脂人參乾薑茱茰各一兩右六味末之煉蜜丸如梧子大酒下強人初服三丸日三服弱者二丸兼治卒中惡腹脹痛口不能言又治連年積冷流注心胸痛并冷氣上衝落馬墜車血疾等皆主之忌口如常法大建中湯金匱心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛不可觸近此主之蜀椒二合去汗乾薑四兩人參二兩以水四升煮取二升去渣內膠飴一升微火煎取一升半分溫再服如一炊頃可飲粥二升後更服當一日食糜溫覆之療胸痺心痛方千金灸膻中百壯穴在鳩尾上一寸此灸神效百壯灸瘡愈再灸非一日滿百壯也尉背法千金翼治胸痺心背疼痛氣悶烏頭細辛附子羌活蜀椒桂心各一兩川芎一兩三錢半右共為散以少醋拌綿褁微火炙令暖以尉背上療心痛方外臺生油半合溫服瘥此乃治蟲痛之方海蛤丸丹溪治痰飲心痛海蛤燒灰為末過數日火毒散用瓜蔞仁研右以海蛤入瓜蔞內乾濕得所為丸每服五十丸失笑散經驗治婦人心痛氣刺不可忍五靈脂蒲黃等分每用二錢醋熬膏入水煎服此方治瘀血犯心鶴蝨散外臺胡粉丸外臺療心痛如蟲嚙方外臺蕪荑散以上四方俱見蟲門平胃散見通治半夏㵼心湯見膈吐腰痛靈樞經脈篇肝足厥隂也是動則病腰痛不可以俯仰終始篇刺諸痛者其脈皆實從腰以上者手太隂陽明皆主之從腰以下者足太隂陽明皆主之病在腰者取之膕病源腎主腰腳腎經虛損風冷乘之故腰痛也又邪客於足少隂之絡令人腰痛引小腹不可以仰息診其尺脈沉主腰背痛尺寸俱浮直下此為督脈腰強痛風濕腰痛勞傷腎氣經絡既虛或因卧濕當風風寒乘虛摶於腎腎經與血氣相擊而腰痛腎著腰痛腎主腰腳腎經虛則受風冷內有積水風水相搏浸積於腎腎氣內著不能宣通故令腰痛其痛狀身重腰冷腹重如帶五千錢如坐於水形狀如水不渴小便自利飲食如故久久變為水病腎濕故也背倭肝主筋而藏血血為隂氣為陽陽氣精則養神柔則養筋隂陽和同則血氣調適共相榮養也邪不能傷若虛則受風風寒摶於脊膂之筋冷則攣急故令背倭脅痛邪氣客於足少陽之絡令人脅痛咳汗出隂氣擊於肝寒氣客於脈中則血泣脈急引脅與小腹診其脈弦而急脅下如刀刺狀如飛尸至困不死脅痛屬足少陽不屬足厥隂腰痛方甘薑苓术湯金匱腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣裏冷濕久久得之腰以下冷痛腹重如帶五千錢甘草白术各二兩乾薑茯苓各四兩右四味以水五升煮取三升分溫三服腰中即溫青娥丸局方治腎虛為風冷所乘或處濕地或墜墮傷損或因風寒皆令腰間似有物垂墜也悉主之胡桃二十個去殼皮破故紙酒炒六兩蒜四兩熬膏杜仲薑汁炒十六兩右共為末丸如桐子大溫酒下婦人淡醋湯下三十丸加味小柴胡湯良方治傷寒脅痛柴胡二錢半夏一錢半黃芩二錢人參一錢五分牡蠣粉一錢枳殼一錢甘草一錢右作一服薑五片紅棗二枚煎服摩腰膏丹溪治老人腰痛婦人白帶附子尖烏頭尖南星各二錢半硃砂雄黃樟腦丁香各一錢半乾薑一錢麝香大者五粒右共為末蜜丸龍眼大每一丸用生薑汁化開如厚粥火上烘熱放掌上摩腰中候藥盡貼腰上即烘綿衣縛定腰熱如火間二日用一丸此法近有人專用此治形體之病凡虛人老人頗有效驗其術甚行補又此方加入倭硫黃人參鹿茸沉香水安息等大之品摩虛損及老人更妙俟又一法以麻油黃蠟為丸如胡桃大烘熱摩腰上腰上熱然後扎好一丸可用數十次腹中病亦可摩療腰痛方良方杜仲肉蓯蓉破故紙人參當歸秋石川巴㦸鹿角霜各等分右後末用猪腰子一個洗淨淡鹽湯泡過劈開兩邊中間勿斷細花開用前藥滲入另用稀絹一塊包褁綿扎外用小灌入酒少許紙封毋令走泄藥氣煮熟取食之飲醇酒三杯立愈又方竒效胡桃肉補骨脂杜仲各四兩右作二貼每貼用水二盞煎服麋茸丸本事治腎虛腰痛麋茸一兩鹿角亦可免絲子末一兩舶上茴香半兩右為末用羊腎一對酒煮爛去膜研和丸桐子大如羊腎少入酒糊佐之每服三五十丸溫酒或鹽湯下藥碁子本事方治腰腿痛氣滯牽牛不拘多少用新瓦入火煿得通紅便將牽牛頓在瓦上自然半生半熟不得撥動取末一兩入細研硫黃一錢同研勻分三分每用白麵一匙水和捍開切作碁子大五更初以水一盞煮熱連湯溫送下如住即己未住隔日再作豫嘗有此疾每發止一服痛止二神丸本事方左金丸俱見通治按腰痛屬虛者固多而因風寒痰濕氣阻血凝者亦不少一概蠻補必成痼疾不可不審腹痛金匱趺陽脈微弦法當腹滿不滿者必便難兩胠疼痛此虛寒從下上也當以溫藥服之病者腹滿按之不痛為虛痛者為實可下之舌黃者下之黃自去腹滿時減復如故此為寒當與溫藥夫中寒家喜缺其人清涕出發熱色和者善嚏中寒其人下痢以裏虛也欲嚏不能此人肚中寒夫瘦人繞臍痛必有風冷榖氣不行而反下之其氣必衝不衝者心下則痞傷寒論病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也太隂之為病腹滿而吐食不下自痢益甚時腹自痛若下之必胸中結鞕傷寒五六日腹中痛若轉氣下趣少腹者此欲自痢也腹痛方厚朴七物湯金匱病腹滿發熱十日脈浮而數飲食如故此湯主之厚朴半斤甘草大黃各三兩大棗十枚枳實五枚桂枝二兩生薑五兩右七味以水一斗煮取四升溫服八合日三服嘔者加半夏五合下痢去大黃寒多者加生薑至半斤附子粳米湯金匱腹中寒氣雷鳴切痛胸脅逆滿嘔吐此湯主之附子一枚泡半夏半升甘草一兩大棗十枚粳米半升右五味以水八升煮米熟湯成去滓溫服一升日三服蒸臍法亦可隨病所在蒸之外科寒症亦能蒸散丁香木香半夏南星川烏歸身肉桂麝氷乳香大黃硝山甲雄黃蟢窠白蔲右為粗末放麵圈內上用銅皮一片多鑽細眼用艾火灸銅皮上每日十餘火滿三百六十火病除藥味亦可因症加減其藥用燒酒薑汁等拌濕厚朴二物湯金匱痛而閉者此湯主之厚朴八兩大黃四兩枳實五枚右三味以水一斗二升先煮二味取五升內大黃煮取三升溫服一服以痢為度大黃附子湯金匱脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜此湯大黃三兩附子三枚泡細辛二兩以水五升煮取二升分溫三服強人煮取二升半分溫三服服後如人行四五里進一服黃連湯見嘔吐小建中湯見虛勞桂枝加大黃湯大柴胡湯小柴胡湯大承氣湯桂枝加芍藥湯理中湯四逆湯以上俱見傷寒蘇合丸見通治腳氣附轉筋千金諸經方有腳氣之論古人少有此疾腳氣之名金匱已載但患者少耳自永嘉南渡衣纓士人多有遭者有支法存仰道人等並留意經方偏善斯術多獲全濟又宋齊之間釋門深師述二公等諸家舊方為二十卷其腳弱一方近百餘首魏周之代蓋無此病所以姚公集驗殊不殷勤徐王撰録未以為意特以三方鼎峙風教未一霜露不均寒暑不等關西河北不識此疾自聖唐開闢無外南極之地作鎮於彼往往皆遭近來中國士大夫亦有患者良由今代風氣混同所致耳此病先從腳起因即脛腫時人號為腳氣深師云腳弱者即其義也問風毒中人隨處皆得作病何偏著於腳答曰人有五臟心脈經絡所起在手十指餘三臟經絡所起在足十趾地之寒暑風濕皆作蒸氣足常履之所以風毒之中人必先中腳久而不瘥遍及四肢腹背頭項經云次傳間傳是也凡腳氣皆感風毒所致治腳氣必兼風此乃要訣人多不即覺㑹因他病一度始發或奄然大悶經兩三日乃覺庸醫不識作餘病治莫不盡斃始起甚微飲食如故惟卒起腳屈弱不能動為異耳黃帝云緩風濕痺是也有腳氣未覺而頭項臂膞已有所苦諸處未知而心腹五內已有所困或嘔食臭腹痛下痢二便不通衝悸不欲見光精神昏憒迷忘錯亂壯熱頭痛身體酷冷疼痛轉筋頑痺緩縱百節攣急小腹不仁等症皆腳氣狀貌也亦云風毒腳氣之侯婦人亦爾又有産後取凉多中此毒其熱悶掣瘲驚悸心煩嘔吐氣上皆其候也又但覺臍下冷痞愊愊然不快小便淋瀝即是其候頑弱名緩風疼痛為濕痺熱者治以冷藥冷者療以熱藥以意消息之諸病皆然心下急氣喘不停自汗脈促嘔吐不止者死凡腳氣皆由氣實而死終無一人服藥致虛而殂故不得大補亦不可大㵼凡治病大段相同腳氣其人黑瘦者易治肥大肉厚赤白者難治瘦人肉硬肥人肉軟也外症亦同腳氣有腫者有不腫者其小腹頑痺不仁者腳多不腫小腹頑後不過三五日即令人嘔吐名腳氣入心如此者難治以腎水尅心火也初得腳弱便速灸之服竹瀝湯灸訖服八風散無不瘥者若但灸不服藥但服藥不灸後必更發腳氣當灸之穴初灸風市次伏兔次犢鼻次膝兩眼次三里次上亷次下亷次絶骨病源腳氣疼不仁由風濕毒氣與血氣相摶故疼邪在膚腠則血氣澀而皮膚厚搔之如膈衣故不仁腳氣痺攣風毒摶於經風濕乘於血故令痺攣也腳氣心腹脹急風濕毒氣從腳上入於內與臟氣相搏結聚不散故心腹脹急腳氣腫滿由風濕毒氣搏於腎經則腎氣不能宣通水液使傳於小腸反漬於皮膚故腫滿也腳氣驚悸由溫濕挾風毒初客膚腠後經腑臟與神氣相搏則心驚悸也腳氣轉筋靈樞四時氣篇轉筋於陽治其陽轉筋於隂治其隂本輸篇轉筋者立而取之可令遂已腳氣方礬石湯金匱治腳氣衝心礬石二兩以漿水一斗五升煎浸腳良第一竹瀝湯千金治兩腳痺弱或轉筋皮肉不仁腹脹起如腫按之不陷心中惡不欲食或患冷方竹瀝五升甘草秦芄葛根黃芩麻黃防己細辛桂心乾薑各一兩防風升麻各一兩半茯苓二兩附子二枚杏仁五十枚右十五味以水七升合竹瀝煮取三升分三服取汗此腳氣主方多治風之藥烏麻酒千金治風虛氣滿腳疼痺攣弱不能行烏麻五升微熬搗酒漬一宿隨所能飲之盡更作茱茰木瓜湯治腳氣衝心悶亂不識人手足脈欲絶吳茱茰半兩木瓜一兩檳榔二兩生薑五片水煎服蘇子粥養老書治老人腳氣毒悶身體不仁行履不能紫蘇子五合熬研細以水投取汁粳米四合淨洗淘右煮作粥臨熟下蘇汁調之空心食之日一服亦溫中杉木湯本事方唐柳栁州云元和十二年二月得腳氣夜半痞絶脅有塊大如石且死困塞不知人三日滎陽鄭洵美杉木湯服半日食頃大小便三次氣通塊散用杉木節一大升橘葉一升無葉以皮代之大腹檳榔七個合子碎之童子小便三大升共煮一升半分二服若一服得快痢停後服檳榔散活人書治腳腫橘葉一大握沙木一握小便一盞酒盞同以藥煎右煎數沸調檳榔末二錢食後服即前方變法木瓜散活人書治腳氣大腹皮一枚紫蘇一分乾木瓜一分甘草一分炙木香一分羌活一分右細銼為散分作三服每用白水一盞煎至半盞去滓通口服雞屎白散金匱轉筋之為病其人臂腳直脈上下行微弦轉筋入腹者雞屎白一味為散取方寸匕以水六合和溫服療轉筋方外臺以鹽一升水一升半作湯洗漬良延效療轉筋外臺并治渾身轉筋暖水稍熱於浴斛中坐浸須㬰便差如湯沃雪轉筋灸法外臺轉筋在兩臂若胸脅者灸手掌白肉際七壯在十指者灸手踝骨上七壯在脛骨者灸膝下亷筋上三壯又法灸涌泉七壯亦可灸大都七壯穴在足大母指本節內側白肉際腹脹轉筋者灸臍上一寸十四壯烏頭湯見風痺麻豆湯見水腫大活絡丹崔氏八味丸即腎氣丸俱見通治蘭臺軌範卷六
